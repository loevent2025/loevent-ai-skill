  * **Scalable user value**: Balances acquisition scale and quality
  * **Brand value uplift**: Generates industry-level influence and topics
  * **Ecosystem expansion**: Connects diverse value-chain participants
  * **Rich content value**: Continuous multi-format content distribution

  ---

  ## IV. Key Operational Principles for Mid-sized Events

  ### 4.1 Goal-setting Principles

  | Principle          | Description                        | Requirement                        |
  | ------------------ | ---------------------------------- | ---------------------------------- |
  | Balance            | Optimize between scale and quality | Do not sacrifice quality for scale |
  | Tiering            | Tiered attendee operations         | Differentiated VIP experience      |
  | Content-driven     | Content as core attraction         | Content quality first              |
  | Ecosystem Thinking | Connect value-chain roles          | Create network effects             |
  | Commercial Loop    | Ticket + sponsorship viability     | Financial sustainability           |
  | Sustainability     | Foundation for series events       | Long-term IP mindset               |

  ### 4.2 Must-do Items

  **Reasonable Agenda Design**

  * Main stage + breakouts / workshops
  * Balance depth and breadth
  * Interspersed interaction
  * Avoid information overload

  **Adequate Networking Time**

  * At least 30% free interaction time
  * Structured networking design
  * Comfortable social spaces
  * Business matchmaking system

  **Attendee Tiering**

  * VIP-exclusive experiences
  * Tiered pricing
  * Differentiated services
  * High-value user identification

  **Robust Sponsorship System**

  * Multi-level sponsorship benefits
  * Clear value delivery
  * Sponsor ROI assurance
  * Long-term partnership mindset

  **Online–Offline Integration**

  * Livestream to expand reach
  * Online interaction design
  * Secondary content distribution
  * Continuous community operation

  **Commercial Conversion Design**

  * Clear conversion paths
  * Booth traffic flow design
  * Business matchmaking support
  * Post-event follow-up mechanisms

  ### 4.3 Pitfalls to Avoid

  * Pursuing size at the expense of experience quality
  * Overloading agenda with insufficient networking time
  * Diluting sponsorship value through excessive benefits
  * Neglecting VIP-exclusive experiences
  * Ending operations immediately after the event
  * Focusing only on headcount instead of audience quality
  * Homogeneous content without differentiation
  * Neglecting post-event conversion follow-up

  ### 4.4 Key Success Factors

  | Factor                  | Weight | Requirement                 |
  | ----------------------- | ------ | --------------------------- |
  | Speaker Lineup          | ★★★★★  | Influence + content quality |
  | Content Quality         | ★★★★★  | Insightful and actionable   |
  | Attendee Quality        | ★★★★☆  | Target audience precision   |
  | Agenda Design           | ★★★★☆  | Smooth pacing & experience  |
  | Sponsorship System      | ★★★★☆  | Clear benefits & value      |
  | Communication Execution | ★★★★☆  | Early warm-up & momentum    |
  | Networking Design       | ★★★★☆  | Effective connections       |
  | On-site Execution       | ★★★★☆  | Smooth operations           |
  | Post-event Ops          | ★★★★☆  | Content & community         |

  ---

  ## V. Benchmark Adjustment Factors

  ### 5.1 Scale Coefficient (100–200 Participants)

  | Headcount | Adjustment Factor | Description           |
  | --------- | ----------------- | --------------------- |
  | 100–120   | 0.85–0.95×        | Entry-level mid-sized |
  | 120–150   | 0.95–1.05×        | Standard mid-sized    |
  | 150–180   | 1.05–1.15×        | Upper mid-sized       |
  | 180–200   | 1.15–1.25×        | Near large-scale      |

  ### 5.2 Organizer Factor

  | Organizer Type         | Adjustment Factor | Description              |
  | ---------------------- | ----------------- | ------------------------ |
  | Industry Leader Brand  | 1.3–1.5×          | Built-in traffic & trust |
  | Well-known Startup     | 1.1–1.3×          | Some brand base          |
  | New Brand, First Event | 0.7–0.9×          | Requires more investment |
  | Industry Association   | 1.2–1.4×          | Credibility endorsement  |
  | Media / Community      | 1.1–1.3×          | Communication advantage  |

  ### 5.3 Event Type Factor

  | Event Type             | Adjustment Factor | Description        |
  | ---------------------- | ----------------- | ------------------ |
  | Industry Summit        | 1.1–1.3×          | High influence     |
  | Product Launch         | 1.0–1.2×          | High attention     |
  | User Conference        | 1.0×              | Standard baseline  |
  | Technical Conference   | 0.9–1.1×          | Precise audience   |
  | Community Annual Event | 0.9–1.0×          | Community-oriented |

  ### 5.4 Regional Factor

  | Region            | Adjustment Factor | Description           |
  | ----------------- | ----------------- | --------------------- |
  | Tier-1 Cities     | 1.1–1.2×          | High audience density |
  | New Tier-1 Cities | 1.0×              | Standard baseline     |
  | Tier-2/3 Cities   | 0.8–0.9×          | Adjust downward       |
  | Overseas Events   | 0.8–1.3×          | Market-dependent      |

  ### 5.5 Industry Factor

  | Industry Heat   | Adjustment Factor | Description        |
  | --------------- | ----------------- | ------------------ |
  | Hot Trend       | 1.3–1.5×          | High attention     |
  | Steady Growth   | 1.0–1.2×          | Sustained interest |
  | Mature & Stable | 0.9–1.0×          | Standard baseline  |
  | Niche / Cold    | 0.7–0.9×          | Lower expectations |

  ---

  ## Quality Requirements

  ### Background Section Requirements

  * Industry background tightly aligned with the event theme, covering **multiple sub-sectors**
  * Insightful perspective with trend awareness
  * Organizer background clearly explains “why we can integrate this ecosystem”
  * Clear logic for time and location selection, reflecting influence and operational convenience
  * Total length: 2,000–2,500 words

  ### Objective Section Requirements

  * Each metric must be quantitatively defined, referencing mid-sized benchmarks
  * Data aligned with the 100–200 participant scale
  * Short-, mid-, and long-term goals must be progressive and mutually reinforcing
  * Balance brand exposure, user conversion, and ecosystem building
  * Reflect tiered operation thinking

  ### Value Section Requirements

  * Dual-perspective value for organizers and attendees
  * Highlight the balanced advantages of mid-sized events
  * Quantified expectations must be reasonable
  * Clear ROI logic, including direct and indirect returns
  * Sponsor value considered independently

  ### Notes

  * **Pragmatism**: Goals aligned with resources, no exaggeration
  * **Localization**: Consider regional ecosystem maturity and regulatory context
  * **Differentiation**: Highlight uniqueness and create memorable points
  * **Executability**: Goals measurable, trackable, and reviewable
  * **Series Thinking**: Build momentum for future events
  * **Business Mindset**: Focus on financial sustainability

  ---

  ## Start Work

  Based on the input parameters, generate a professional, pragmatic, and executable mid-sized event planning proposal.

  **Requirements:**

  1. Rich and in-depth background (2,000–2,500 words)
  2. Specific and quantifiable objectives (adjusted from mid-sized benchmarks)
  3. Reflect tiered operations and ecosystem thinking
  4. Rigorous, coherent logic
  5. Professional and accessible language
  6. Demonstrate the art of balance in mid-sized events



