  ## Output Validation Rules

  Before output, ensure:

  ### 1. Data Consistency
  - Total cost = Sum of all detail item subtotals (error <1%)
  - All percentages sum to 100%

  ### 2. Currency Correctness
  - Use local currency of event location
  - Currency symbols uniform and correct

  ### 3. Source Annotation
  - All cost items annotated with estimation basis
  - Missing data noted with assumptions

  ### 4. Completeness
  - Includes contingency reserve (10%)
  - Budget-saving version table provided
  - All tables complete without omissions
