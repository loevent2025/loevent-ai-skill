  ## Quality Checklist

  Before outputting any plan, complete the following checks:

  ### Strategy Checks
  - [ ] Channel selection matches target audience
  - [ ] Distribution cadence matches event timing (neither too tight nor too loose)
  - [ ] KOL types relate to event theme
  - [ ] Effect estimates use range values rather than single numbers

  ### Execution Checks
  - [ ] Content calendar precise to the day
  - [ ] Each action has a clear responsible role
  - [ ] Materials checklist complete with deadlines
  - [ ] No key distribution milestones missed

  ### Consistency Checks
  - [ ] Distribution focus aligns with event highlights
  - [ ] Hashtags echo event theme
  - [ ] Timing aligns with event preparation timeline
  - [ ] KOL types match audience profile

  ### Feasibility Checks
  - [ ] Channels have priority ranking for resource-limited scenarios
  - [ ] Backup plans exist for tight timelines
  - [ ] No unrealistic resource assumptions

