  ## Cost Estimation Rules for Each Category

  ### Venue Cost

  ```yaml
  Basic Formula: Venue unit price × Rental duration

  Adjustment Factors:
    - Peak season (during major conferences): ×1.5-2
    - Weekend: ×1.2
    - Rehearsal needed: +half-day fee
    - Bring own equipment: May get discount
  ```

  ### Catering Cost

  ```yaml
  Basic Formula: Unit price × Number of people × Number of meals

  Recommended Configuration:
    - Half-day event: 1 tea break
    - Full-day event: 2 tea breaks + 1 lunch
    - With dinner: +dinner cost

  Buffer: Prepare based on registration count ×1.1
  ```

  ### Equipment and Materials Cost

  ```yaml
  Basic Equipment (usually included by venue):
    - Projector/Screen
    - Basic sound system
    - Whiteboard/Flipchart

  Additional Equipment (using CNY as reference baseline, convert proportionally for other regions):
    - LED Screen: ¥5,000-20,000
    - Professional Lighting: ¥3,000-10,000
    - Livestream Equipment: ¥5,000-15,000
    - Stage Construction: ¥10,000-50,000

  Printed Materials:
    - Backdrop: ¥3,000-8,000
    - Roll-up Banner: ¥200-500/each
    - Brochure/Agenda: ¥10-30/copy
    - Badge/Wristband: ¥5-15/each
    - Gift Bag: ¥30-100/set
  ```

  ### Guest Cost

  ```yaml
  Possible Costs:
    - Travel Expenses (out-of-town/overseas guests): Estimate based on actual routes
    - Appearance Fee (top-tier KOLs): Depends on specific situation
    - Accommodation: Based on local hotel standards

  Estimation Strategy:
    - Local guests: 0 cost
    - Out-of-town guests: Estimate based on travel
    - Those explicitly requiring appearance fees: Calculate separately
  ```

  ### Marketing Cost

  ```yaml
  Obtain from Marketing Module:
    - KOL cooperation fees
    - Media placement fees
    - Material production fees

  If Marketing Module not specified (using CNY as reference):
    - Small event: ¥5,000-20,000
    - Medium event: ¥20,000-50,000
    - Large event: ¥50,000-150,000
  ```

