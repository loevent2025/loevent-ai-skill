  # AI Commercial Industry Knowledge Base v4

  ## Inference Master Workflow (Engine Execution Order)

  > When generating audience inference results, the engine **must follow the steps below in order**. No step may be skipped or reordered.

  ```
  Step 1: Parse event name + event theme; extract audience intent signals
        ↓
  Step 2: Cross-reference [Section 0: Event Signal Parsing Rules] to determine audience direction type
        ↓
  Step 3: Use event format + scale to validate and narrow audience tiers
        ↓
  Step 4: Use organizer industry background and product type as supplementary corrections (not the primary basis)
        ↓
  Step 5: Filter roles matching the audience direction from [Section 1: Industry Role Map]
        ↓
  Step 6: Select applicable pain points by audience identity from [Section 4: Pain Point Vocabulary];
          confirm the correct messaging tier is being used
        ↓
  Step 7: Cross-reference [Section 3: Decision Paths] to confirm each audience's position in the decision chain
        ↓
  Step 8: Cross-reference [Section 5: Event Type Validation Table] to verify alignment between audience and event format
  ```

  ---

  ## Section 0: Event Signal Parsing Rules (First Inference Dimension)

  ### Step 1: Extract Audience Intent Signals from Event Name + Theme

  The event name and theme are the organizer's explicit declaration of audience intent and are the most reliable signal source for the entire inference process. The engine must parse these two fields first before incorporating any other information.

  | Signal Category | Typical Keywords | Audience Direction |
  |---|---|---|
  | **Technical Capability Signal** | API, SDK, architecture, developer, algorithm, model, deployment, integration, engineering, DevOps, MLOps | Technical execution tier |
  | **Business Growth Signal** | Growth, marketing, customer acquisition, conversion, ROI, commercialization, brand, sales, customer success | Business decision-maker tier |
  | **Ecosystem Partnership Signal** | Ecosystem, partner, ISV, channel, alliance, co-building, open platform | Ecosystem partnership audience (BD / technical, both directions) |
  | **Vertical Industry Signal** | Finance, healthcare, manufacturing, retail, education, government, legal + AI / digitalization | Industry business specialists + IT |
  | **Strategic Decision Signal** | Summit, forum, strategy, trends, future, flagship, leadership | Senior decision-maker audience |
  | **Product Experience Signal** | Experience, launch, new product, go-live, product day, user day | Product users + market audience |
  | **Learning & Enablement Signal** | Training, workshop, hands-on, private session, in-house training + business terms | Frontline execution staff + middle management |

  > **When multiple signals appear:** Priority order is Vertical Industry Signal > Business Growth Signal > Ecosystem Partnership Signal > Technical Capability Signal.
  > Principle: The more specific the signal, the higher its priority.

  ---

  ### Step 2: Validate Audience Tiers Against Event Format + Scale

  | Event Format | Scale | Audience Tier Restrictions | Notes |
  |---|---|---|---|
  | Closed-door session / private roundtable | < 100 | **Primarily decision-makers**, execution tier as secondary | Small closed-door events do not invite frontline execution staff |
  | Summit / Forum | > 300 | Decision-makers + execution tier mixed | Large-scale events require tiered audience description by topic track |
  | Developer conference / Hackathon | Any | **Primarily technical execution tier** | Regardless of scale, developer events center on technical participants |
  | Launch event | 100–500 | Product decision-makers + media | Promotional purpose; audience skews toward evaluators and amplifiers |
  | Workshop / Hands-on camp | 30–100 | **Primarily execution tier** | Hands-on format; audience consists mainly of practitioners |
  | User conference / Customer day | 200–1,000 | Existing customers (decision-makers + end users mixed) | Aimed at retention and renewal |
  | Vertical industry forum | 100–500 | Industry business specialists + industry IT | Dominated by vertical industry signal |

  **Validation Rules:**
  - If event format is closed-door session / private roundtable and attendance < 100 → Automatically exclude all execution-tier and end-user-tier roles; audience restricted to **manager level and above**
  - If event format is Hackathon / Workshop → Automatically exclude decision-maker roles (CXO-level is not the core audience)
  - If event format and audience signal conflict → Event format takes precedence; signal serves as directional reference only

  ---

  ### Step 3: Organizer Background + Product Type as Supplementary Corrections

  > **This step serves only as a supplementary correction and must not override the inference results from the preceding two steps.**

  | Scenario | Correction Direction |
  |---|---|
  | Event name is too generic (e.g., "XX Annual Summit") with no clear extractable signal | Use product type as the primary inference basis |
  | Event signals point clearly, but the organizer's industry background shows a notable gap with those signals | Use organizer background to calibrate the audience's industry profile |
  | Event involves multiple signal categories | Use product type to help determine which signal carries higher weight |

  **Product Type Reference Table (Demoted to Auxiliary Tool):**

  | Product Type | Typical Product Form | Primary Audience Nature |
  |---|---|---|
  | A. Developer Tools / API Layer | LLM API, AI SDK, vector database | Primarily technical personnel |
  | B. AI Application Platform (B2B SaaS) | AI customer service, AI marketing, AI contract review | Business leads + IT |
  | C. Vertical Industry Solution | Healthcare AI, financial risk AI, industrial quality inspection | Industry business specialists + industry IT |
  | D. Enterprise AI Platform / Internal Platform | MLOps platform, AI middleware, private LLM deployment | AI / data teams + CTO / CIO |
  | E. Workplace Productivity / Consumer Tools | AI writing, AI meeting notes, AI translation | General workplace employees |
  | F. AI Infrastructure / Compute Layer | GPU cloud, inference acceleration, model hosting | Platform engineers, CTO, IT procurement |

  ---

  ### Signal Parsing Examples

  | Event Name | Event Theme | Extracted Signals | Format / Scale | Inferred Audience Direction |
  |---|---|---|---|---|
  | Xiaohongshu Commercial Ecosystem Private Session | Content-driven brand growth | Ecosystem partnership signal + business growth signal | Private roundtable / 50 attendees | Brand decision-makers (CMO, marketing lead) + ecosystem BD partners — execution tier filtered out |
  | Xiaohongshu Open Platform API Technical Private Session | API-driven content commercialization | Technical capability signal + ecosystem partnership signal | Private roundtable / 50 attendees | ISV technical leads, third-party service provider CTOs — engineers filtered out |
  | Financial AI Implementation Summit | Intelligent risk control and compliance practices | Vertical industry signal (finance) + business growth signal | Forum / 300 attendees | Financial industry business specialists + risk control leads + compliance officers, with IT decision-makers included |
  | AI Developer Conference | Building the next generation of agentic applications | Technical capability signal | Conference / 2,000 attendees | Engineers, architects, algorithm engineers as primary audience; CTOs / technical VPs as secondary |
  | Tencent Enterprise Digitalization Summit | AI-powered business growth | Business growth signal (organizer name is too broad — activate product type supplementary inference) | Summit / 1,000 attendees | Enterprise business VPs + IT directors; further segmentation requires specific product line context |

  ---

  ## Section 1: Industry Role Map (Filter by Audience Direction)

  ### Business Decision-Maker Tier

  | Role | Key Responsibilities | Core Concerns | Applicable Signal Categories |
  |---|---|---|---|
  | CMO / Marketing Lead | Brand growth, marketing strategy, user acquisition | ROI quantification, channel efficiency, brand impact | Business growth |
  | Business Unit VP / Division General Manager | AI's impact on business ROI, cost reduction, efficiency gains | Time to value, quantifiable business impact | Business growth, strategic decision |
  | CDO (Chief Data Officer) | Data strategy, AI implementation planning | Data quality, compliance, cross-department integration | Business growth, vertical industry |
  | Ecosystem BD Director | Partner development, channel building, ecosystem incentives | Partnership resource value, API openness | Ecosystem partnership |
  | CFO / Procurement Committee | Budget approval, vendor evaluation | TCO, pricing model, contract terms | All categories (final approval role) |

  ### Technical Decision-Maker Tier

  | Role | Key Responsibilities | Core Concerns | Applicable Signal Categories |
  |---|---|---|---|
  | CTO / Technical VP | AI technology selection, architecture decisions | Technology maturity, long-term maintenance cost | Technical capability, strategic decision |
  | CIO / IT Director | IT infrastructure, system integration, security compliance | Private deployment options, system compatibility, information security | Technical capability, ecosystem partnership |
  | AI / Algorithm Team Lead | Model selection, training and fine-tuning, performance evaluation | Model accuracy, fine-tuning cost | Technical capability |
  | Solutions Architect | Technical solution design, POC implementation | API documentation quality, SDK maturity | Technical capability, ecosystem partnership |

  ### Industry Specialist Tier

  | Role | Industry | Core Concerns | Messaging Requirements |
  |---|---|---|---|
  | Financial Risk Manager / Chief Compliance Officer | Banking, insurance, securities | Model interpretability, compliance audit trails, regulatory requirements | Must use industry business language; technical jargon is not permitted |
  | Healthcare Business Lead / Clinical Specialist | Healthcare, pharmaceuticals | Diagnostic assistance accuracy, data privacy, approval timelines | Same as above |
  | Manufacturing Production / Quality Control Lead | Manufacturing, industrial | Quality inspection standardization, anomaly traceability, production line integration | Same as above |
  | Retail / E-commerce Operations Lead | Retail, brand | Personalization recommendation accuracy, inventory forecasting, marketing automation | Same as above |
  | Industry IT Lead | All verticals | System integration complexity, data security, vendor credentials | Moderate technical language is acceptable |

  ### Technical Execution Tier

  > **Note: Roles in this tier appear only when the event format is a developer conference, Hackathon, or Workshop. They are automatically excluded from closed-door sessions and private roundtables.**

  | Role | Key Responsibilities | Core Concerns | Applicable Event Formats |
  |---|---|---|---|
  | MLOps Engineer | Model deployment, monitoring, CI/CD for ML | Model version management, A/B testing | Developer conferences, workshops |
  | Algorithm Engineer | Model training, fine-tuning, prompt engineering | Training framework compatibility, evaluation toolchain | Developer conferences, hackathons |
  | Backend Engineer (AI Integration) | API calls, service orchestration, performance optimization | API stability, concurrency capability | Hackathons, workshops |
  | Security Engineer | Model security, data masking | Prompt injection protection, audit logging | Technical summits, security-focused events |

  ### End User Tier

  > **⚠️ Exception: If the promotional focus is PLG and the event signal points to the general user direction (Direction B), end users may also serve as the core tier in large-scale events such as summits and forums.**

  | Role | Work Context | Core Pain Points | Applicable Event Formats |
  |---|---|---|---|
  | Customer Service Agent / Supervisor | E-commerce, finance, telecom | High volume of repetitive queries; complex issues still require human escalation | User conferences, training workshops |
  | Marketing Operations / Content Team | Brand, retail, media | High content volume demands; severe content homogeneity | User conferences, product experience days |
  | General Workplace Employee | All industries | Tools are too difficult to use; don't know how to formulate prompts | In-house workshops, employee enablement training |

  ### Amplification / Influence Tier

  | Role | Key Responsibilities | Core Concerns | Applicable Signal Categories |
  |---|---|---|---|
  | Industry Analyst (Gartner / IDC / similar) | Market landscape, technology trends, vendor evaluation | Market size, competitive landscape | Strategic decision, all categories |
  | Tech blogger / AI review KOL | Product reviews, in-depth technical content | Authentic product performance, differentiation highlights | Technical capability, product experience |
  | Vertical industry KOL / practitioner blogger | Industry practice sharing, tool recommendations | Real-world use cases, peer credibility | Vertical industry, learning & enablement |
  | Enterprise digitalization consultant | AI selection guidance, implementation solution design | Actual implementation case studies, industry know-how | Business growth, vertical industry |

  ---

  ## Section 2: Track Segmentation

  | Track | Corresponding Signals | Core Audience Lean | Typical Pain Point Keywords |
  |---|---|---|---|
  | Foundation Model / LLM | Technical capability signal | Algorithm researchers, model engineers | Training costs, alignment and safety, open-source vs. closed-source |
  | AI Agent / Agentic Platform | Technical capability + business growth | Product managers, solutions architects, business leads | Multi-step task reliability, human-AI collaboration boundaries |
  | MLOps / AI Infrastructure | Technical capability signal | MLOps engineers, platform engineers, CTOs | Experiment-to-production gap, low GPU utilization |
  | AI + Customer Service / Conversational AI | Business growth signal | Customer service operations directors, product managers (non-technical lead) | Low complex-issue resolution rate, knowledge base update lag |
  | AI + Marketing / MarTech | Business growth signal | CMOs, growth leads, marketing operations (non-technical lead) | Content homogeneity, low personalization recommendation accuracy |
  | AI + Data Analytics / BI | Business growth + technical capability | Data analysts, business analysts | Natural language to SQL accuracy issues, high analytics barrier to entry |
  | AI + Code / DevTools | Technical capability signal | Developers, engineering VPs (purely technical audience) | Code completion hallucinations, introduction of security vulnerabilities |
  | AI + Vertical Industry | Vertical industry signal | Industry business specialists, industry IT leads (business-led) | Difficulty acquiring industry-specific data, long regulatory approval cycles |
  | RPA + AI Automation | Business growth + learning & enablement | Process optimization managers, operations directors (non-technical lead) | Poor exception handling, difficulty quantifying ROI |

  ---

  ## Section 3: Typical Decision / Procurement Paths

  ### Path 1: Technology Evaluation-Led
  ```
  Frontline engineer discovers tool → Individual trial → Internal team advocacy
  → Technical lead evaluates → Budget request → Procurement approval
  ```
  - Timeline: 2–6 months / Key bottleneck: Documentation quality, free-to-paid conversion

  ### Path 2: Business Demand-Led
  ```
  Business unit raises requirement → IT leads vendor selection → 3–5 POCs
  → Outcome validation + compliance review → Procurement committee decision → Contract signed
  ```
  - Timeline: 6–18 months / Key bottleneck: Quantifiable POC outcomes, security and compliance requirements met

  ### Path 3: Ecosystem Partnership-Led
  ```
  BD initiates contact → Both parties evaluate partnership value → Technical integration validation
  → Partnership framework negotiation → Ecosystem agreement signed → Joint operations
  ```
  - Timeline: 3–9 months / Key bottleneck: API openness, ecosystem incentive resources

  ### Path 4: Vertical Industry Solution-Led
  ```
  Industry business specialist raises requirement → Industry IT takes the lead → Industry ISV recommendation
  → Industry-specific scenario POC → Compliance and regulatory review → Phased implementation
  ```
  - Timeline: 9–18 months / Key bottleneck: Industry reference cases, regulatory compliance proof

  ### Path 5: Strategic Leadership-Led
  ```
  Senior leader learns about trends at a summit → Dedicated task force established → External consulting and research
  → Partner selected → Phased implementation
  ```
  - Timeline: 3–12 months / Key bottleneck: Whether a first flagship case study can be produced quickly

  ---

  ## Section 4: Industry-Specific Pain Point Vocabulary

  > **Usage rule: Match the audience identity to the signal parsing results; select pain points from the corresponding tier. Cross-tier mixing is strictly prohibited.**

  ### Technical Evaluator Pain Points
  - Model hallucinations make generated outputs unreliable; business teams are unwilling to deploy
  - The gap between an experimental notebook and a production-grade API is enormous; MLOps processes are absent
  - Fine-tuning costs are high, data preparation cycles are long, and performance improvement outcomes are uncertain
  - GPU resources are constrained and utilization rates are low; inference costs remain prohibitively high
  - AI agent reliability degrades significantly on multi-step tasks; success rates drop sharply beyond five steps

  ### Business Decision-Maker Pain Points
  - AI project POC results are strong, but performance degrades at scale; investment yields no visible return
  - Cannot quantify AI ROI for management; budget approval requests are repeatedly blocked
  - Different departments are independently procuring AI tools, creating new data silos and capability silos
  - Business staff distrust AI outputs and continue to rely on manual review; efficiency gains remain limited
  - Too many AI vendors on the market; vendor evaluation is costly and decision fatigue sets in

  ### Industry Specialist Pain Points (Must Use Industry Business Language)
  - "The AI gives me a conclusion but I don't know why — if something goes wrong, I can't be held accountable" (interpretability)
  - "It works great in the demo, but breaks down the moment we use our own data" (generalization capability)
  - "Our industry's data is highly specialized — generic systems simply don't understand our scenarios" (industry fit)
  - "Policies changed, standards were updated, but the system is still running on the old logic — it's unusable" (iteration capability)
  - "Regulatory approval still isn't through, and the project has been stalled for six months" (regulatory timeline)

  ### End User Pain Points
  - Tools are too complicated; learning a new system takes days, which the daily work pace simply doesn't allow
  - The outputs still need heavy revision — it's faster to just do it myself; time savings are minimal
  - Don't know how to describe what I need; can't formulate a prompt; unsure what AI can even do
  - Afraid of making errors and being held responsible; can't use AI outputs directly — still need to verify everything manually

  ### Compliance-Side Pain Points
  - Legal liability for AI-generated content in heavily regulated industries such as finance and healthcare remains ambiguous
  - Cross-border deployment involves data transfer regulations: GDPR, China's Data Security Law, and classified protection level requirements
  - Insufficient AI decision interpretability to meet audit requirements
  - Employees using AI tools without authorization are causing data leaks; the organization has no awareness or governance controls

  ---

  ## Section 5: Event Type Validation Table

  | Event Type | Scale | Core Audience Tier | Prohibited Audience Roles | Applicable Signal Categories |
  |---|---|---|---|---|
  | Closed-door session / private roundtable | < 100 | Decision-makers (manager level and above) | ❌ Engineers, operations staff, general employees | Strategic decision, ecosystem partnership, business growth |
  | Industry Summit | > 300 | Decision-makers + execution tier mixed | No restrictions; tiered description required | All categories |
  | Developer Conference / Dev Day | 200–2,000 | Primarily technical execution tier | ❌ CFO, CMO, and other purely business roles | Technical capability |
  | Hackathon | 100–1,000 | Technical execution tier | ❌ Decision-makers (CXO is not the core audience) | Technical capability |
  | Vertical Industry Forum | 100–500 | Industry business specialists + industry IT | ❌ Generic technical roles unrelated to the industry | Vertical industry |
  | Workshop / Hands-on camp | 30–100 | Execution tier (practitioners) | ❌ Senior decision-makers (not hands-on participants) | Technical capability, learning & enablement |
  | Product launch event | 100–500 | Product decision-makers + media | No special restrictions | Product experience |
  | User conference | 200–1,000 | Existing customers (decision-makers + end users mixed) | No special restrictions | Business growth, product experience |
  | Employee in-house training / enablement workshop | 30–200 | End users + middle management | ❌ CXO-level roles | Learning & enablement |

  ---

  ## Section 6: Industry Key Metrics

  **Technical Tier Audience Focus:**
  - Model accuracy / F1 score / recall rate / inference latency (P95)
  - API availability / SLA / developer registration count / API key activation count

  **Business Decision-Maker Tier Audience Focus:**
  - Time to Value (time from contract signing to measurable outcomes)
  - Headcount replacement rate / efficiency improvement multiplier
  - Customer ARR / Net Revenue Retention / SQL conversion count

  **Industry Specialist Tier Audience Focus:**
  - Number of industry compliance certifications / regulatory approval pass rate
  - Number of reference customers in the same industry / industry scenario coverage depth

  **End User Tier Audience Focus:**
  - DAU / MAU / feature penetration rate / organic reuse rate / free-to-paid conversion rate

  ---

  ## Section 7: Competitive Landscape Reference

  **Different audiences use different reference frameworks when evaluating vendors:**

  | Audience Type | What They Are Actually Comparing | Typical Evaluation Questions |
  |---|---|---|
  | Technical evaluator | API performance / documentation quality / SDK maturity | "Compared to OpenAI's API, how does the latency and pricing stack up?" |
  | Business decision-maker | Industry implementation cases / deployment timeline / service responsiveness | "Has a company of similar scale to ours used this? What were the results?" |
  | Industry specialist | Whether the vendor truly understands the industry's scenarios and terminology | "Which comparable companies have you served? Can we speak with them?" |
  | End user | Whether it is easier to use than existing tools / learning curve | "How is this better than what I'm using now, and how long will it take to learn?" |
  | Compliance officer | Data storage location / audit logs / certifications | "Can it be privately deployed? Does data leave our environment?" |

  **Major Vendor Landscape (Engine reference only):**

  | Layer | Representative Vendors | Differentiation Keywords |
  |---|---|---|
  | Foundation model layer | OpenAI, Anthropic, Google, Baidu ERNIE, Zhipu AI, Moonshot AI | Model capability, pricing, Chinese language support, open-source |
  | AI development platform | AWS Bedrock, Azure AI, Alibaba Cloud Bailian, Volcano Engine | Cloud ecosystem lock-in, multi-model support, end-to-end platform |
  | AI Agent platform | Salesforce AgentForce, Coze, Dify, FastGPT | Low-code, toolchain breadth, enterprise-grade security |
  | MLOps tools | MLflow, Weights & Biases, Alibaba PAI, Huawei ModelArts | Experiment management, model registry, end-to-end pipeline |
  | Vertical industry solutions | Various industry ISVs | Industry know-how, proprietary data, customer relationships |
  | Workplace productivity tools | Feishu AI, DingTalk AI, Microsoft 365 Copilot, Notion AI | Ecosystem integration, low learning curve, out-of-the-box usability |