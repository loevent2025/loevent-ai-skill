  - Hook tweet ends: "Here's the breakdown 👇"
  - Middle tweets can reinforce: "This alone is worth showing up for 👆"
  - CTA tweet: end with question ("Who am I seeing there?" / "Who should I tag?") or encourage retweet ("RT if you know someone who needs this")

