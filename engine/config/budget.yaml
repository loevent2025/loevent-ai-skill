    ### 3.1 完整 Task List → Budget Subject → 赋值

    这是最终交付的主表，格式如下：

    | # | Task | Budget Subject | 低估 | 高估 | 货币 | 置信度 | AI/人工 | 是否可赞助抵扣 |
    |---|------|----------------|------|------|------|--------|---------|--------------|

    字段说明：
    - **#**：序号，从 1 开始递增，顺序与去重后的用户任务清单一致。【修改：原"用户任务清单（A 部分）"改为"去重后的用户任务清单"】
    - **Task**：用户原始任务名称（去重后保留的版本），**必须逐字保留原文，禁止改写、翻译、缩写或合并**。
    - **Budget Subject**：从数据库匹配到的预算科目名称。
      · 精确匹配或高置信度语义匹配 → 填写数据库中的 task_name。
      · API / AI 工具类任务 → 填写 AI 推断的科目名称（如"API 按量费用"、"AI 平台订阅"等）。
      · 无法匹配 → 填写 AI 推测的科目名称并在备注中标明。
      · **Budget Subject 是用于定价参考的科目映射，不影响 Task 列的原文。**
    - **低估**：经分布校准后的价格下限。不低于数据库 price_low（未匹配任务不低于 AI 参考 price_low）。
    - **高估**：经分布校准后的价格上限。不高于数据库 price_high（未匹配任务不高于 AI 参考 price_high）。
    - **低估和高估不得为空。** 每个任务必须有金额，即使是 AI 参考估价。
    - **货币**：该行金额的货币单位。根据 D3 活动地点自动确定本地货币（如中国 → CNY，香港 → HKD，美国 → USD，日本 → JPY 等）。所有行使用统一货币，不做跨币种转换。
    - **置信度**：该任务价格估算的可信程度，以 0.00–1.00 的小数输出。
      · 0.85–1.00 — 精确匹配数据库，价格直接来自数据库，可信度高。
      · 0.60–0.84 — 语义模糊匹配，价格基于相近科目推算，建议核实。
      · 0.40–0.59 — 弱匹配，价格为 AI 类比推理，需用户确认。
      · 0.00–0.39 — 未匹配，价格为 AI 行业估算，需用户替换为实际报价。
      · 若价格来自场地调研数据（F 部分）中标注为 confirmed 的实际报价，置信度直接设为 0.95。
      · 若价格来自 API / AI 工具的官方公开定价（通过搜索确认），置信度设为 0.80–0.90。
    - **AI/人工**：标记该任务在实际执行时是否可以借助 AI 工具完成，还是必须由人工执行。
      · "AI" — 该任务可以通过 AI 工具辅助或完全由 AI 完成（如文案撰写、白皮书草案、数据分析、数字证书生成、社交媒体内容产出等）。
      · "人工" — 该任务必须由真人执行，无法用 AI 替代（如MC主持人、场地搭建、餐饮服务、设备租赁安装、现场技术支持等实体操作类任务）。
      · "AI+人工" — 该任务可以 AI 辅助但仍需人工参与完成（如专题访谈需AI辅助整理但真人执行采访、技术物料可AI生成但需人工审核排版等）。
    - **是否可赞助抵扣**：见上方「规则 1：赞助抵扣字段」。

