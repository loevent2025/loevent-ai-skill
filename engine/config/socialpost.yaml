  - Speaker → full intro (title + org + core achievement + topic); natural narrative — ❌ no formatted lists
  - Agenda → detailed schedule; duration + value for each session; ❌ no table format — list format only
  - FAQ → required if event involves payment or review/approval process
  - Discussion prompts → required; 2–3 questions

