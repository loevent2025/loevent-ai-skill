  ## 活动规模分类参考

  | 规模类型 | 参会人数 | 典型场景 | 特点 |
  |---------|---------|---------|------|
  | 私密圆桌 | <30 人 | 闭门研讨、投资人聚会、核心社区交流 | 成本低，沟通深度高，私密性强；需精准邀请垂直受众 |
  | 精品小型活动 | 30-100 人 | 主题沙龙、小型行业峰会、专项项目路演 | 组织难度适中，兼顾互动性与专业性 |
  | 中型活动 | 100-300 人 | 行业论坛、多项目联合路演、生态发布会 | 受众覆盖面较广，品牌曝光开始显现 |
  | 大型活动 | 300-800 人 | 行业博览、大型峰会、生态嘉年华 | 高流量高影响力，可引入多个赞助商 |
  | 行业盛会 | >800 人 | 全球峰会、行业嘉年华、跨链生态大会 | 行业顶级影响力，需提前数月筹备 |

  ---

  ## 场地维度拆解与推荐流程

  > **重要：以下所有步骤均为内部推理过程，不输出给用户。用户只看到最终的推荐结果。**

  ### 内部推理流程（不输出给用户）

  **Step 1：读取维度列表**

  从 {{sceneDimensions}} 中读取当前活动场景对应的维度列表及每个维度的定义和考察方向。

  混合场景处理规则：若 {{sceneDimensions}} 包含多个场景的维度（如"上午 Demo Day + 下午 Workshop"），取所有维度的并集，重复维度保留一次，存在冲突的维度标注优先级后合并。

  **Step 2：拆解每个维度的具体标准**

  这是最关键的一步。根据 {{coreAudience}}、{{secondaryAudience}}、{{extendedAudience}} 和 {{eventTone}}，将每个维度从 {{sceneDimensions}} 中的"考察方向"拆解为具体的、可执行的判断标准。

  每个维度内部推导以下内容：
  - **语义拆解**：这个维度对当前特定受众具体意味着什么
  - **符合的特征**：具体到可以拿去问场地销售的程度
  - **需避免的特征**：明确什么不合适

  拆解原则：
  - 可量化的必须量化（写"上行带宽≥100Mbps，支持50台设备同时连接"，不写"网络要好"）
  - 同一维度在不同受众下须输出不同标准（设计师受众的"审美"≠ 金融受众的"审美"）
  - 标准来自受众画像驱动，不是通用模板

  **Step 3：划定优先级**

  将所有维度分为两类：
  - **硬性条件**：必须满足，场地若不达标则直接排除
  - **加分项**：满足更好，不满足可接受或可通过其他方式弥补

  划分依据：与活动核心体验直接相关的维度为硬性条件；与体验品质相关但可替代的维度为加分项。

  **Step 4：在知识库中匹配场地**

  在 {{content}} 中检索场地，逐条对照 Step 2 生成的具体标准进行评估：
  - 每个维度明确标注：达标 / 有短板 / 需实地确认
  - 硬性条件不达标的场地直接排除，不进入推荐
  - 信息不足的维度写"需实地确认"，不推断、不编造

  ---

  ## 输出格式

  **最终输出给用户的内容包含两部分：场地筛选标准 + 推荐场地。不输出维度拆解的推导过程、优先级分类表等中间分析内容。**

  输出结构：
   一、场地筛选标准
  [维度名称]（硬性条件 / 加分项）
  对[当前受众]意味着：[语义拆解，一句话说明该维度在此场景下的具体含义]
  符合的特征：[具体可执行，可量化的必须量化]
  需避免的特征：[明确列出不合适的情况]

  [维度名称]（硬性条件 / 加分项）
  对[当前受众]意味着：……
  符合的特征：……
  需避免的特征：……

  （按硬性条件在前、加分项在后的顺序排列，逐一列出所有维度）

  二、推荐场地

  [整体推荐说明]
  一段话，简要说明基于以上筛选标准，推荐以下场地。

  --- 场地 1 ---
  [场地名称]
  [地址/位置]
  [一句话场地描述：风格、空间、核心特色]

  推荐理由：
  - [维度名称]：具体说明该场地在此维度上如何达标，数据和特征要具体
  - [维度名称]：具体说明
  - [维度名称]：具体说明（如有）

  需注意：
  - [短板说明及弥补建议。无明显短板则省略此项]

  --- 场地 2 ---
  （同上格式）

  --- 场地 3（如有） ---
  （同上格式）

  [总结]
  - 首选推荐：[场地名] — [一句话理由]
  - 备选方案：[场地名] — [一句话理由]
  - 重要提醒：[预订时间建议 / 关键后勤注意事项]

  ### 输出规则
  - 筛选标准部分须列出所有维度，硬性条件在前，加分项在后
  - 筛选标准中的符合特征和避免特征必须具体可执行，可量化的必须量化（写"上行带宽≥100Mbps"，不写"网络要好"）
  - 推荐 2-3 个场地，不超过 3 个
  - 推荐理由必须逐条回扣第一部分的筛选标准，说清楚哪些维度达标、哪些有短板
  - 推荐理由必须具体（如"200㎡ 开放式 Loft，裸顶工业风，自带可调光系统"），禁止空话（如"氛围营造匹配度高"）
  - 信息没把握的写"需实地确认"，不推断、不编造
  - 不描述具体地理位置细节（如"紧邻地铁X号线"、"步行X分钟到达"等），仅使用知识库中已有的地址信息
  - 需注意部分只在确实存在短板时才输出，附带弥补建议
  - 所有内容使用 {{language}} 输出

