  ## Medium Event Cooperation Strategy Core Principles

  ### Principle 1: Find 1-2 Core Partners to Share Costs

  The key to medium events is finding **core partners willing to participate deeply and bear main costs**:

  - Core partners bear 30-50% of costs
  - Core partners receive premium benefits (keynote speech, brand co-branding, etc.)
  - Other partners serve as supplements, providing resources or minor support

  ### Principle 2: Cash + Resource Hybrid Model

  | Partner Type | Cooperation Model | Proportion |
  |---------|---------|------|
  | Core Partner | Cash sponsorship primarily | 1-2 |
  | Collaborative Partner | Cash or equivalent resources | 3-5 |
  | Supporting Partner | Resource exchange | 3-5 |

  ### Principle 3: Benefits Must Be Quantifiable and Persuasive

  Medium events need to convince sponsors with **data-driven benefits**:

  - "Brand exposure to 150 decision-makers in XX industry"
  - "20-minute keynote speech, expected to reach XX people"
  - "Pre and post-event community promotion, covering XX+ targeted users"
  - "1-on-1 business matchmaking opportunities, at least 5 target clients"

  ### Principle 4: Balance Exposure and Depth

  | Demand Type | Corresponding Benefits | Suitable Partners |
  |---------|---------|---------|
  | Brand Exposure | Main visual, booth, materials | C-facing brands/broad awareness needs |
  | Deep Connection | Speech, roundtable, targeted matchmaking | B-facing/sales-oriented enterprises |
  | Content Endorsement | Joint release, white paper, research report | Research institutes, consulting firms |

  ---

  ## 💼 Medium Event Cooperation Tier Design

  ### Tier Structure (3-4 tiers, clearly defined)

  | Tier | Quantity | Investment Form | Core Benefits |
  |------|------|---------|---------|
  | Co-host/Premier Partner | 0-1 | Bear 30-50% of costs | Brand co-presentation, opening speech, keynote (20-30min), premium booth, VIP dinner, attendee list, content co-creation rights |
  | Strategic Partner | 1-3 | Major resource/financial support | Brand exposure, speech (15-20min) or roundtable, standard booth, 5 targeted matchmaking, 5 attendance slots |
  | Supporting Partner | 3-5 | Partial resource support | Brand exposure, roundtable/showcase (10min), booth/banner, 3 attendance slots |
  | Promotion/Community Partner | 5-10 | Resource exchange | Brand exposure, 2 attendance slots, content collaboration |

  ### Tier Naming Recommendations

  **Recommended Use:**

  - "Co-organizer" / "Premier Partner"
  - "Strategic Partner"
  - "Industry Partner" / "Ecosystem Partner"
  - "Supporting Organization"
  - "Media Partner" / "Community Partner"

  **Use with Caution (must match corresponding investment):**

  - "Title Sponsor" — use only when partner bears >50% of costs
  - "Exclusive Sponsor" — ensure the category is truly exclusive

  ---

  ## Medium Event Benefits Design Menu

  ### Brand Benefits

