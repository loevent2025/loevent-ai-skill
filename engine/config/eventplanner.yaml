  ## Small Event Content Design Knowledge Base

  ### Session Duration Standards (Small Event Specific)

  | Session Type | Duration Range | Notes |
  |-------------|---------------|-------|
  | Opening Remarks | 10-15 minutes | Concise and impactful, quickly enter the topic |
  | Topic Sharing | 20-30 minutes | Control duration, leave ample discussion time |
  | Workshop | 60-90 minutes | Highly hands-on, full participation |
  | Open Networking | 30-60 minutes | Sufficient unstructured time |

  ---

  ## Small Event Core Formats

  ### [Prohibited Interaction Formats]

  The following interaction formats **must not appear** in agenda design:

  | Prohibited Format | Reason |
  |-------------------|--------|
  | Speed Dating / Speed Networking | Too mechanical; conflicts with deep connection philosophy |
  | Forced 1-on-1 rotation pairing | Rigid attendee experience, lacks autonomy |
  | Timed bell/buzzer rotation networking | Interrupts natural conversation flow |

  **Design Principle**: All networking sessions should maintain a natural, free-flowing atmosphere — avoid forced structured pairing mechanisms.

  ### 1. Cocktail-Style Meetup: The Classic Small Event Format

  **Opening Social + Topic Sharing + Open Networking (preferred format for small events)**

  #### Why the cocktail-style meetup is the soul of small events:

  - Breaks down barriers between attendees
  - Every attendee has the opportunity to build connections
  - Generates authentic interaction around shared interests
  - Creates a relaxed yet valuable community atmosphere

  #### Cocktail-Style Meetup Design Essentials:

  - **Venue Setup**: Standing cocktail tables to promote free-flowing conversation
  - **Catering**: Light refreshments and beverages to create a relaxed atmosphere
  - **MC Facilitation**: MC shares project highlights briefly, leaving ample networking time
  - **Topic Design**: Related to the project but easy to understand and discuss
  - **Time Allocation**: Networking time exceeds 60%; sharing is concise

  #### Cocktail-Style Meetup Design Framework:

  ```
  Opening Social (20-30 minutes): Free networking, light refreshments for icebreaking
  ↓
  Topic Sharing (15-20 minutes): MC introduces project/topic essentials
  ↓
  Q&A Interaction (10 minutes): Brief Q&A to spark discussion interest
  ↓
  Open Networking (30-40 minutes): Deep conversations, building authentic connections
  ```

  **Event Type Name**: Cocktail-Style Meetup / Standing Social Gathering

  This format emphasizes fluidity and openness. The standing layout encourages attendees to actively move and engage in diverse conversations. Light refreshments lower the social barrier — this is the most suitable small event format for professional community networking and project promotion.

  ---

  ### 2. Deep Workshop (Hands-On Small Event)

  #### Workshop Design Essentials:

  - **Clear Deliverables**: Each attendee takes away concrete results
  - **Group Collaboration**: Groups of 3-5 for deep collaboration
  - **Facilitator Ratio**: 1 facilitator/teaching assistant per 10-15 participants
  - **Hands-On Focus**: Hands-on time accounts for 60%+
  - **Outcome Showcase**: Groups share results, cross-learning

  #### Workshop Time Structure:

  ```
  Introduction (10 minutes): Goal description, methodology overview
  ↓
  Demonstration (15 minutes): Facilitator demonstrates key steps
  ↓
  Hands-On (45-60 minutes): Group practice, facilitator circulating guidance
  ↓
  Showcase (20 minutes): Groups present outcomes
  ↓
  Summary (10 minutes): Key takeaways, follow-up resources
  ```

  ---

  ### 3. Lightning Talk Series

  #### Why lightning talks suit small gatherings:

  - Lightweight content that doesn't consume too much networking time
  - Multiple speakers, diverse perspectives, maintaining freshness
  - Lowers the sharing barrier, encouraging more participation
  - Fast pace, high energy, prevents lulls

  #### Lightning Talk Design Essentials:

  - **Time Control**: Strictly 5-10 minutes per person; stop when time is up
  - **Quantity Control**: 3-5 is ideal, no more than 6
  - **Topic Diversity**: Different angles, experiences, and viewpoints
  - **No Q&A**: No questions after talks — save for the networking session
  - **Encourage Newcomers**: Prioritize inviting first-time community speakers

  #### Lightning Talk Organization Framework:

  ```
  MC Transition (2 minutes): Introduce rules and speakers
  ↓
  Lightning Talk 1 (5-10 minutes): First speaker
  ↓
  Quick Transition (30 seconds): MC introduces next speaker
  ↓
  Lightning Talks 2-4 (5-10 minutes each): Subsequent speakers
  ↓
  MC Wrap-Up (2 minutes): Summarize highlights, guide into networking
  ```

  #### Lightning Talk Topic Solicitation Tips:

  - Launch community solicitation 2-3 weeks in advance
  - Provide topic direction references to lower preparation barriers
  - Set up a simple submission form for titles and abstracts
  - Organizers proactively invite 1-2 "seed speakers" to set the tone

  ---

