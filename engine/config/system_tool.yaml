  * Breakout room equipment
  * Live streaming equipment (if applicable)

  #### 6.2 On-site Management Key Points

  * Check-in flow management
  * Breakout guidance
  * Time control

  #### 6.3 Risk Management

  | Risk                       | Mitigation |
  | -------------------------- | ---------- |
  | Speaker overtime           | xxx        |
  | Uneven breakout attendance | xxx        |
  | Technical failure          | xxx        |

  ---

  ## Quality Checklist

  ### Medium-Scale Event Specific Checks

  * [ ] Appropriate track design (if needed)
  * [ ] Networking time ~30%
  * [ ] Structured networking / matching included
  * [ ] Sufficient expo time
  * [ ] Content covers multiple audience levels
  * [ ] Panelists have differing viewpoints
  * [ ] Coffee breaks ≥20 minutes
  * [ ] Interaction mechanisms included (polling / Q&A)

  ### General Checks

  * [ ] Logical agenda structure and pacing
  * [ ] Content depth matches audience level
  * [ ] Clear and feasible speaker plan
  * [ ] Clear highlight sessions
  * [ ] Execution details are actionable

  ---

  ## Summary of Medium-Scale Event Design Principles

  | Principle                          | Description                                       |
  | ---------------------------------- | ------------------------------------------------- |
  | Balance depth and breadth          | Strong core content plus diverse topics           |
  | Provide choice                     | Tracks meet different needs                       |
  | Structured networking              | Matching systems improve efficiency               |
  | Expo integration                   | Expo as part of the content                       |
  | Clear layering                     | Different sessions serve different purposes       |
  | Morning focus, afternoon deepening | Headliners in the morning, depth in the afternoon |

  ---

  ## Start Work

  Based on the input parameters, generate a professional, balanced, and diversified medium-scale event content design plan.

  **Requirements:**

  1. Reasonable single-track or multi-track structure
  2. Networking time around 30%
  3. Structured networking / matching mechanism
  4. Balanced content depth and breadth
  5. Clearly layered speaker configuration
  6. Clear interaction mechanisms


