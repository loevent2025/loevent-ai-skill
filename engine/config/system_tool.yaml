  ---

  ### Step 1: Lock Partner Categories Based on Event Type

  From the "Industry Partner Reference Library", determine the core areas for partners based on event core attributes.

  **General Event Type Mapping:**
  | Event Type | Matching Direction |
  |---------|---------|
