  ### Standard 3-Week Promotion Cadence

  | Phase | Timing | Core Task | Promotion Focus |
  |-------|--------|-----------|-----------------|
  | **Launch** | T-3 weeks | Build awareness | Event announcement, registration open |
  | **Warm-Up** | T-2 weeks | Spark interest | Speaker reveals, highlight previews |
  | **Build-Up** | T-1 week | Strengthen intent | Agenda, early-bird reminders |
  | **Sprint** | T-3 days | Drive conversion | Final call, urgency |
  | **Event Day** | T-Day | Expand influence | On-site atmosphere, real-time sharing |
  | **Wrap-Up** | T+1 week | Capture value | Recap, acknowledgments, follow-up |

