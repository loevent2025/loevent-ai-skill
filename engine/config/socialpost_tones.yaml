guest_profile: |
  ## `guest_profile` — Speaker-Focused Copy

  ### Content Structure Requirements (Speaker Focus)

  This copy positions the **speaker as the absolute protagonist**. The core narrative logic is: *because this speaker is exceptional and rare, you should attend this event.*

  ---

  ### Part 1: Opening (Create Impact)

  **Goal:** Establish the speaker's authority in as few words as possible, giving readers the immediate impression of "this person is impressive."

  **Approach:**
  - Speaker name + single most impactful title or achievement
  - Choose the one label most likely to inspire awe or curiosity in your target audience
  - Reinforce with numbers, accolades, or industry standing

  **Examples:**
  - "Li Ming — AI entrepreneur who has appeared on Forbes 30 Under 30 three consecutive times"
  - "Wang Fang — growth strategist who has driven 1B+ GMV through private domain channels"

  **Avoid:**
  - Stacking multiple titles that dilute focus
  - Referencing awards or institutions unfamiliar to the audience
  - Hollow adjectives such as "renowned," "veteran," or "well-known"

  ---

  ### Part 2: Body (Build Deep Credibility)

  **Goal:** Through detailed background, move readers from "seems impressive" to "genuinely believes they're impressive."

  **Approach:** Expand on 2–3 of the most persuasive dimensions below:

  **1. Career Track** — Career highlights
  - Notable companies or institutions where the speaker has worked
  - Key roles held
  - Landmark projects completed

  **2. Achievement Track** — Quantifiable, verifiable results
  - Performance metrics (revenue, growth rate, user base, etc.)
  - Awards and honors received
  - Publications, patents, or notable works

  **3. Influence Track** — Evidence of industry standing
  - Coverage by authoritative media outlets
  - Individuals or enterprises the speaker has influenced
  - Industry reputation and peer recognition

  **4. Scarcity Track** — Why this speaker is rarely accessible
  - What caliber of events they typically appear at
  - Consulting or appearance fees
  - How limited their availability is

  **Example Paragraph:**
  *"Li Ming founded AI company XXX in 2018, achieving 0-to-$10M revenue within three years and securing three consecutive funding rounds from Sequoia and Hillhouse. He has delivered keynote addresses at Stanford University and Tsinghua University, and his AI commercialization methodology was featured in Harvard Business Review. His one-on-one consulting fee now exceeds ¥50,000/hour, and he accepts no more than 10 external speaking engagements per year."*

  **Avoid:**
  - Titles without context or story
  - Stories without supporting data
  - Achievements irrelevant to the target audience

  ---

  ### Part 3: Supporting Content (Present What Will Be Shared)

  **Goal:** Tell readers what the speaker will share at the event, connecting "impressive person" to "relevant to me."

  **Approach:**
  - Translate agenda items into the speaker's sharing topics
  - Emphasize that this content represents the speaker's proprietary methodology or first-hand experience
  - Highlight practical applicability and specificity

  **Suggested Phrasing:**
  - "At this event, [Speaker] will publicly share for the first time..."
  - "[Speaker] will bring their first-hand insights from [field], including..."
  - "You will have the opportunity to hear [Speaker] personally break down..."

  **Example Paragraph:**
  *"At this closed-door session, Li Ming will break down XXX company's 0-to-$10M growth playbook for the first time. He will share: 1) How to identify product-market fit for AI products; 2) Three critical decisions in early team building; 3) Negotiation details during fundraising that no textbook covers. This content comes from five years of hands-on entrepreneurial experience and has never been shared publicly."*

  **Avoid:**
  - Listing agenda titles without explaining their value
  - Content that appears generic rather than proprietary
  - Content that misaligns with the speaker's established profile

  ---

  ### Part 4: Closing (Drive Action)

  **Goal:** Create urgency and scarcity to prompt immediate registration.

  **Approach:**
  - Emphasize the rare opportunity to interact directly with this expert
  - Highlight scarcity (seat count, event frequency, format)
  - Clear call-to-action (CTA)

  **Suggested Phrasing:**
  - "This is one of the few opportunities this year to engage with [Speaker] in person"
  - "Limited to [number] seats — registration closes when full"
  - "A live Q&A session will be held, giving you the chance to ask [Speaker] directly"

  **Avoid:**
  - Absent or unclear CTA
  - Overly promotional tone that undermines credibility
  - A closing section longer than the body

  ---

  ### Overall Writing Principles

  1. **The speaker is the absolute protagonist** — Every paragraph should relate to the speaker; all other elements serve as supporting context.
  2. **Authority over likability** — The copy's tone should inspire awe and admiration.
  3. **Specific over abstract** — Use numbers, names, and events instead of adjectives.
  4. **Target audience perspective** — Emphasize achievements with the greatest impact on your specific audience.
  5. **Handling other elements:**
     - Agenda → Transform into "content the speaker will share"
     - Event purpose → Use to explain "why this speaker was invited"
     - Trending topics → If relevant, reflect the "speaker's unique perspective on the trend"

  ---

  ### Module: Speaker Introduction Strategy

  Analyze speaker information, assess authority level, and apply the corresponding strategy:

  **Authority Assessment Dimensions:**
  - Title level: CEO/Founder/VP > Director > Manager > Specialist
  - Company recognition: Top-tier tech/unicorn > Listed company > Growth-stage > Early-stage startup
  - Achievement verifiability: Specific numbers/awards/publications > Descriptive achievements > No clear achievements
  - Information completeness: Background + achievements + expertise all present > Partial info > Sparse info

  **Authority-Based Strategies:**

  **[High Authority]** (Senior executive at major company + specific achievements + complete information)
  → Speaker featured upfront: Named in opening as the core attraction
  → Detailed introduction: 3–5 sentences covering full background and achievements
  → Authority endorsement: "Recognized expert in [field]," "Industry thought leader"
  → Proportion of copy: 40–50%
  → Example: "Tencent Cloud AI VP Dr. Zhang Wei leads the main session"

  **[Mid-Level Authority]** (Industry veteran + partial achievements + basic information)
  → Speaker introduced mid-copy: Introduced after context is established
  → Moderate introduction: 2–3 sentences covering background and key achievement
  → Expertise emphasis: "10 years of experience," "Senior expert"
  → Proportion of copy: 25–35%
  → Example: "Inviting senior AI architect Li Ming to share hands-on experience"

  **[Low / Unknown Authority]** (Insufficient information or low recognition)
  → Speaker placed last: Agenda and value featured first
  → Brief mention: One sentence
  → Role framing: "Practitioner," "Frontline professional"
  → Compensation: Strengthen the event's own value; emphasize company background
  → Proportion of copy: 15–20%

  **Multiple Speakers:**
  - 1 speaker: Detailed introduction; core selling point
  - 2–3 speakers: Full introduction for most authoritative; brief mention of others
  - 4–6 speakers: Collective framing + name-drop Top 2
  - 6+ speakers: Aggregate with a number + only name the 1–2 most prominent

  ---

event_agenda: |
  ## `event_agenda` — Agenda-Focused Copy

  ### Content Structure Requirements (Agenda Focus)

  This copy positions the **agenda as the absolute protagonist**. The core narrative logic is: *because this event's content is systematic, substantive, and actionable, you should attend.*

  ---

  ### Part 1: Opening (Clarify the Topic and Value)

  **Goal:** Within 5 seconds, let readers know "what this event covers" and "what I will learn."

  **Approach:**
  - Clearly state the event topic
  - Indicate the scope or framework of the content
  - Summarize the core value proposition in one sentence

  **Examples:**
  - "Systematically master the underlying logic and practical methods of private domain operations from scratch"
  - "In one day, complete the full competency map for AI product managers"
  - "End-to-end training covering acquisition, conversion, retention, and growth"

  **Avoid:**
  - Vague topics that leave readers confused
  - Topics with no value promise
  - Overuse of superlatives like "top-tier," "best," or "industry-first"

  ---

  ### Part 2: Body (Expand on Agenda Highlights)

  **Goal:** Make readers feel "there's so much to learn" and clearly understand what each section helps them solve.

  **Approach:** Choose one or combine the following:

  **Method A: Modular Breakdown**
  Divide the agenda into key modules. For each, explain:
  - Module topic
  - Specific content covered
  - Problem solved or capability gained upon completion

  **Method B: Problem-Oriented Breakdown**
  Start from target audience pain points; show how the agenda addresses each:
  - Pain point 1 → Corresponding agenda content
  - Pain point 2 → Corresponding agenda content

  **Method C: Learning Path Breakdown**
  Expand by logical learning sequence; emphasize the systematic approach:
  - What to learn first (build foundations)
  - What to learn next (develop frameworks)
  - What to learn last (practical application)

  **Example Paragraph (Method A):**

  *"This training program is structured into 4 core modules:*

  ***Module 1: Mindset Reset***
  *Break common misconceptions about private domain operations and establish a sound foundational logic. You'll understand why 90% of private domain efforts become intrusive, and how leading practitioners think differently.*

  ***Module 2: Traffic Acquisition***
  *Five proven private domain lead generation methods and a funnel design for converting public traffic to private channels. Each method includes a complete SOP and case study ready for immediate implementation.*

  ***Module 3: User Engagement***
  *User segmentation frameworks, tagging systems, and automated outreach strategies. After this module, you'll know how to make users feel understood rather than disturbed.*

  ***Module 4: Conversion and Closing***
  *The psychology of private domain sales, script design, and the different approaches for community vs. one-on-one conversion. Learn how to craft an offer users can't refuse."*

  **Avoid:**
  - Listing titles without explaining value
  - Abstract content with no apparent practicality
  - Modules with no logical relationship to each other
  - Content that appears freely available online

  ---

  ### Part 3: Supporting Content (Speaker Endorsement)

  **Goal:** Use the speaker's credentials to add credibility to the agenda content, assuring readers the material is reliable.

  **Approach:**
  - Position the speaker as the content designer and facilitator
  - Emphasize the speaker's first-hand experience in the topic area
  - Clarify that content stems from the speaker's direct practice, not secondary sources

  **Suggested Phrasing:**
  - "The above content was designed and will be delivered by [Speaker], who has [background] in this domain..."
  - "Each module is led by an instructor with deep, first-hand expertise in that area..."
  - "This methodology comes from [Speaker]'s direct experience at [company/project]..."

  **Example Paragraph:**
  *"This training program is led by Li Ming, former Head of Private Domain at ByteDance. Li Ming built Douyin e-commerce's private domain system from the ground up, reaching 50 million private domain users in 18 months and generating over ¥1B in GMV. Every methodology in this program is drawn from his first-hand ByteDance experience, much of which is being shared publicly for the first time."*

  **Avoid:**
  - Speaker introduction unrelated to the agenda content
  - Speaker introduction that is so long it overshadows the agenda
  - Credentials without content-specific endorsement

  ---

  ### Part 4: Closing (Drive Action)

  **Goal:** Reinforce the sense of value and certainty; drive registration.

  **Approach:**
  - Summarize what participants will gain or how they will improve
  - Emphasize the comprehensiveness and cohesiveness of the content
  - Clear CTA

  **Suggested Phrasing:**
  - "In one day, systematically master the complete methodology for [topic]"
  - "After completing these [number] modules, you will be able to..."
  - "No more piecing together fragmented knowledge — this time, we connect the entire chain for you"

  **Avoid:**
  - A weak, trailing close
  - Overpromising outcomes
  - Absent CTA

  ---

  ### Overall Writing Principles

  1. **Content is the absolute protagonist** — Every paragraph should relate to "what you learn, how you learn, and what you gain."
  2. **Practical value over prestige** — The copy's tone should make readers feel "this is so useful — I want to learn."
  3. **Systematic over fragmented** — Emphasize the structure and logic of the content, not isolated highlights.
  4. **Handling other elements:**
     - Speaker → Serves as credibility endorsement for the agenda content
     - Event purpose → Used to explain the rationale behind the agenda design
     - Trending topics → If relevant, explain how certain agenda items respond to current trends

  ---

  ### Module: Agenda Presentation Strategy

  Analyze the event agenda and determine the presentation format based on complexity and characteristics:

  **Step 1: Assess Agenda Complexity**

  - **Simple agenda (1–2 items):** Deeply explore the value of the single topic; explain why it matters and what it delivers
  - **Moderate agenda (3–5 items):** Highlight all key points + describe 1–2 in detail; emphasize "rich content" and "comprehensive coverage"
  - **Complex agenda (6+ items):** Aggregate framing — "Covers X major modules," "X+ featured sessions" — detail only the Top 3 most compelling topics

  **Step 2: Identify Special Sessions**

  - **Workshop / hands-on / practice sessions:** Emphasize "not just listening — you'll practice in real time" and "walk away with tangible outputs"
  - **Panel discussion / Q&A / open dialogue:** Emphasize "face-to-face with experts — ask anything" and "direct, close-range exchange"
  - **Matchmaking / demo / pitch / resource sessions:** Emphasize "forge partnerships on the spot" and "find resources and collaborators"

  **Step 3: Adjust by Content Length**

  - Short post: Feature only the single most compelling agenda item + "and much more"
  - Medium post: Highlight 2–3 core topics; emojis may be used for bullet points
  - Long post: Present a complete agenda timeline or detailed descriptions of Top 5 topics

  ---

event_purpose: |
  ## `event_purpose` — Purpose-Focused Copy

  ### Content Structure Requirements (Purpose Focus)

  This copy positions the **event's purpose and value proposition as the core**. The narrative logic is: *because you have this problem / desire this outcome, and this event can help you solve it / achieve it, you should attend.*

  ---

  ### Part 1: Opening (Create Resonance)

  **Goal:** Make readers feel "this is describing exactly me" right from the opening.

  **Approach:** Choose one:

  **Method A: Pain Point Entry**
  - Describe a specific struggle the target audience is experiencing
  - Use concrete scenarios and details
  - Make readers feel "seen"

  **Method B: Vision Entry**
  - Paint a picture of the state the audience aspires to
  - Use vivid, evocative imagery
  - Create a sense of aspiration

  **Method C: Contrast Entry**
  - Describe the gap between the ideal and the current reality
  - Name the anxiety this gap creates
  - Hint that a path exists to close it

  **Example (Pain Point Entry):**
  *"Do you find yourself in this situation: you've taken courses, saved countless articles, yet when you return to work, you still don't know where to start? You watch others build thriving private domain operations, but the moment you try, you end up becoming a mass-message bot?"*

  **Example (Vision Entry):**
  *"Imagine this scenario: your users don't just tolerate your messages — they proactively reach out to chat, buy, and recommend you to friends. Your private domain isn't a cost center; it's a revenue engine that delivers even when you're not watching."*

  **Example (Contrast Entry):**
  *"Everyone says private domain is the most reliable growth channel, yet yours shows no signs of life. Others achieve high user stickiness while yours either goes silent or churns. Where does the gap come from?"*

  **Avoid:**
  - Vague pain points that stay on the surface
  - Overpromised visions that lose credibility
  - Scenarios that don't reflect the audience's actual situation

  ---

  ### Part 2: Body (Present the Solution)

  **Goal:** Clearly articulate how the event helps readers solve their problem or realize their vision.

  **Approach:**

  1. **Problem Diagnosis** — Identify the true root cause
     - It's not that you're not trying hard enough — it's that...
     - The reason most people fail is...
     - At its core, this problem is about...

  2. **Solution** — How the event will help
     - We will help you...
     - You will gain...
     - The event has been specifically designed to...

  3. **Outcome Promise** — What will change after participation
     - After this program, you will be able to...
     - Participants consistently find that...
     - Following this event, your [area] will...

  **Example Paragraph:**
  *"Most people struggle with private domain not because they lack effort, but because they fundamentally misunderstand what it is. Those who treat private domain as a 'free reach channel' will always come across as intrusive. Those who view users as targets will always get blocked.*

  *This event is designed to rebuild your understanding of private domain from the ground up. You'll gain clarity on what private domain truly is, what users actually need, and how to achieve conversion without triggering resistance.*

  *You'll leave with a complete private domain operations SOP — covering acquisition, engagement, and conversion. More importantly, your mindset will shift. You'll begin thinking genuinely from the user's perspective, which is the foundation of doing private domain well."*

  **Avoid:**
  - Identifying problems without offering solutions
  - Proposing solutions without defining outcomes
  - Solutions so vague they sound like empty claims

  ---

  ### Part 3: Supporting Content (Methods and Pathway)

  **Goal:** Explain how the speaker and agenda support the achievement of the stated purpose.

  **Approach:**
  - Speaker as "guide": Explain why they are qualified to lead you to the goal
  - Agenda as "roadmap": Explain the learning pathway designed to get you there

  **Example Paragraph:**
  *"To genuinely help you solve this challenge, we've invited Li Ming — a practitioner with a track record of 8-figure private domain results — as your lead instructor. Over two days, he will guide you through the complete journey from 'mindset reset → strategy development → hands-on execution.'*

  *Day One focuses on clarity and strategy — helping you think it through. Day Two focuses on methods and execution — helping you get it done. Every session includes practical exercises to ensure you don't just understand the material, but can actually apply it."*

  **Avoid:**
  - Speaker/agenda introductions disconnected from the stated purpose
  - Overextended introductions that overshadow the core message

  ---

  ### Part 4: Closing (Call to Action)

  **Goal:** Extend an invitation; make readers feel this event is meant for them.

  **Approach:**
  - Reconnect with the opening pain point or vision
  - Emphasize the sense of "doing this together"
  - Clear CTA

  **Suggested Phrasing:**
  - "If you also want to [achieve the vision], join us"
  - "Stop figuring it out alone — this time, we'll tackle it with you"
  - "Change starts here. Are you in?"

  **Avoid:**
  - Closing that fails to reconnect with the opening
  - Unclear CTA

  ---

  ### Overall Writing Principles

  1. **Purpose/vision is the absolute protagonist** — The entire copy should make readers feel "this event understands me and can help me."
  2. **Emotional connection over information delivery** — The primary goal of this copy style is to move people, not just inform them.
  3. **"You" is more important than "we"** — Use second person extensively; make readers feel you're speaking directly to them.
  4. **Handling other elements:**
     - Speaker → A guide toward achieving the purpose
     - Agenda → The pathway and method for achieving the purpose
     - Trending topics → If relevant, use to underscore the urgency of the purpose

  ---

  ### Module: Event Purpose and Value Proposition

  Analyze the event purpose, extract key elements, and construct the value proposition:

  **Step 1: Identify Target Audience**
  Look for "help [audience]," "provide [audience] with," "targeting [audience]"
  → If found: Extract the target audience; address them directly in the opening
  → Example: "Attention, SME owners!"

  **Step 2: Identify Pain Points**
  Look for "solve [problem]," "challenges," "difficulties," "bottlenecks"
  → If found: Extract the pain point; use pain point resonance in the opening
  → Examples: "Still struggling with [issue]?" / "How long has [problem] been holding you back?"

  **Step 3: Identify the Solution**
  Look for "provide [method]," "teach [skill]," "learn [ability]"
  → If found: Extract as the core promise
  → Example: "Step-by-step guidance from zero to launch"

  **Step 4: Select Narrative Framework**

  **[Problem-Solution Model]** (Pain point present + solution present)
  Template: "Still struggling with [pain point]? [Event name] helps you [solution]"

  **[Opportunity Model]** (Contains "opportunity," "trend," or "emerging market")
  Template: "Seize [opportunity] — [Event name] helps you achieve [goal]"

  **[Vision-Driven Model]** (Default for all other cases)
  Template: "Committed to [vision], [Event name] sincerely invites [target audience]"

  ---

focus_hot: |
  ## `focus_hot` — Trending Topic–Focused Copy

  ### Content Structure Requirements (Trending Topic Focus)

  This copy positions **a trending topic or industry development** as the core selling point. The narrative logic is: *because this trend is happening right now, and this event will help you seize the opportunity or navigate the challenge, you need to act immediately.*

  ---

  ### Part 1: Opening (Introduce the Trend)

  **Goal:** Use a trending event or industry shift to capture attention and create a "this is relevant to me" sense of urgency.

  **Approach:**
  - Briefly describe the trending event or development
  - Explain why it is critically important right now
  - Hint that the reader's interests are directly affected

  **Trend Types and Entry Styles:**

  **Industry Major Events**
  - "[Company] just announced..."
  - "Last week, something significant happened in [industry]..."
  - "Latest data shows..."

  **Policy / Technology Shifts**
  - "A new policy/technology is transforming..."
  - "Starting next month..."
  - "The emergence of [X] means..."

  **Inflection Points in Trends**
  - "More and more people are starting to..."
  - "[X] is becoming the new [Y]..."
  - "The industry is undergoing..."

  **Examples:**
  *"A year after ChatGPT's launch, AI is reshaping every industry at a pace that has exceeded all expectations. Last week, Sora's release once again redefined our understanding of AI capabilities. One question is unavoidable: in this AI revolution, will you be among those replaced — or among those who wield AI?"*

  *"The window of opportunity for private domain growth is closing. WeChat's latest account suspension policies, users' declining tolerance for marketing messages, and the steady rise in customer acquisition costs — all of these signals point to one conclusion: the era of unchecked growth is over. Going forward, only those who truly understand private domain will survive."*

  **Avoid:**
  - Forcing a connection between the trend and the event topic
  - A trend introduction that exceeds 25% of the total copy length
  - Inciting fear rather than creating urgency

  ---

  ### Part 2: Body (Connect the Event to the Trend)

  **Goal:** Clearly explain how this event helps readers navigate or capitalize on the trend.

  **Approach:**

  1. **Establish the connection** — Explain the relationship between the event and the trend
     - To help you navigate this shift, we have...
     - It is against this backdrop that we launched...
     - This event will focus on...

  2. **Opportunity/challenge analysis** — Go one level deeper
     - What opportunities does this trend create?
     - What is the cost of inaction?
     - How long is the window open?

  3. **Event value proposition** — What will participants gain?
     - You will learn...
     - You will master...
     - You will obtain...

  **Example Paragraph:**
  *"Faced with the impact of AI, most people either panic or choose to look away. But the smartest players are already taking action — they're learning how to use AI as a force multiplier for their capabilities, not a threat to their livelihoods.*

  *For this event, we've brought together three practitioners who have already rebuilt their workflows with AI. They will share:*
  - *Which skills are depreciating in the age of AI, and which are appreciating*
  - *How to use AI tools to increase efficiency on repetitive tasks by 5–10x*
  - *How ordinary professionals can capture career opportunities in the AI adoption wave*

  *We believe that investing one day today to understand AI is worth more than spending a year playing catch-up later."*

  **Avoid:**
  - Event content disconnected from the trend
  - Excessive amplification of fear and anxiety
  - Overpromised outcomes

  ---

  ### Part 3: Supporting Content (Speaker and Agenda Relevance to the Trend)

  **Goal:** Show how the speaker and agenda are directly tied to the featured trend.

  **Approach:**
  - Speaker as "trend authority": Explain why they are qualified to interpret this trend
  - Agenda as "trend response": Describe which agenda items directly address the trend

  **Example Paragraph:**
  *"This event's lead speaker, Li Ming, is one of China's earliest practitioners to apply AI in real-world work scenarios. He increased his team's productivity by 300% in three months using AI tools, and his methodology has since been adopted by several Fortune 500 companies.*

  *The event agenda has been designed specifically around 'how AI is reshaping the way we work,' including:*
  - *9:00–10:30 | AI Capability Map: Which jobs are being transformed by AI*
  - *10:45–12:00 | Live Demo: 10 real-world use cases for AI-driven productivity*
  - *14:00–16:00 | Workshop: Design your own AI workflow"*

  **Avoid:**
  - Speaker introduction unrelated to the trend
  - Agenda that appears generic rather than a direct response to the trend

  ---

  ### Part 4: Closing (Create Urgency)

  **Goal:** Reinforce the "act now" imperative; drive immediate registration.

  **Approach:**
  - Reconnect with the time-sensitive nature of the trend
  - Emphasize the scarcity of the window or opportunity
  - Clear CTA

  **Suggested Phrasing:**
  - "Trends don't wait. Can you afford to?"
  - "Rather than feeling anxious, take action. This event is your first step."
  - "Seize this window — don't let the opportunity slip past"
  - "Six months from now, you'll be glad you made this decision today"

  **Avoid:**
  - A weak, ineffective close
  - Excessive fear-mongering
  - Unclear CTA

  ---

  ### Overall Writing Principles

  1. **The trend is the absolute protagonist** — The copy should make readers feel the pulse and urgency of the moment.
  2. **Urgency over fear** — The goal is to motivate action, not manufacture anxiety.
  3. **Timeliness is the core** — Emphasize "why now," and what will be missed if they wait.
  4. **Handling other elements:**
     - Speaker → Expert interpreter / early adopter of the trend
     - Agenda → In-depth content responding to the trend
     - Purpose → Help participants capitalize on the opportunity

  ---

  ### Module: Trend Relevance Integration Strategy

  Assess the relevance between the trend and the event, and determine the integration approach:

  **Relevance Assessment Criteria:**
  - Keyword overlap between the trend and the event topic
  - Temporal proximity between the trend and the event date
  - Geographic alignment between the trend and the event location

  **Relevance-Based Strategies:**

  **[Highly Relevant]** (Keyword overlap + temporal proximity + geographic alignment)
  → Placement: Opening hook (within first 50 characters)
  → Role: Grab attention + establish event necessity
  → Example: "Following Shenzhen's release of new AI policies, the enterprise transformation window has arrived..."

  **[Moderately Relevant]** (Partial match)
  → Placement: Mid-copy (within the event value section)
  → Role: Strengthen the argument
  → Example: "Against the backdrop of rapid AI development, mastering hands-on skills is critical..."

  **[Weakly Relevant]** (Some keyword overlap but not strong)
  → Placement: End of post (tag section)
  → Role: Increase search visibility
  → Example: #AITrends #DigitalTransformation

  **[Not Relevant]**
  → Do not use the trend; avoid forced associations

  **Trend Type Handling:**

  - **Policy benefit trends** → Position as macro backdrop; emphasize "window of opportunity" and "policy tailwinds"
  - **Industry event trends** → Use as a timely entry point; leverage the moment to introduce the event
  - **Technology breakthrough trends** → Reinforce the event's cutting-edge relevance
  - **Market data and trend statistics** → Use as social proof; strengthen persuasiveness
  - **Innovative format trends** → Position as a differentiating highlight of the event

  ---

basic_information: |
  ## `basic_information` — Event-Focused Copy

  ### Content Structure Requirements (Event Focus)

  This copy positions the **event itself as the absolute protagonist**. The narrative logic is: *because this event is distinctive, valuable, and rare, you should attend.*

  ---

  ### Part 1: Opening (Event Positioning and Distinctiveness)

  **Goal:** Give readers an immediate sense that "this is a different kind of event," generating curiosity and anticipation.

  **Approach:**
  - State the event's unique positioning or format
  - Summarize the event's core value proposition in one sentence
  - Highlight the event's scarcity or differentiating characteristics

  **Entry Styles:**

  **Method A: Distinctive Format**
  - Highlight the scarcity of the format (closed-door sessions, executive peer groups, deep-dive workshops, etc.)
  - Explain the unique value this format delivers

  **Method B: Brand Credibility**
  - Emphasize the brand's influence and track record
  - Use historical data or testimonials to build trust

  **Method C: Community Value**
  - Highlight the caliber and selectivity of participants
  - Underscore the value of "who you'll be with"

  **Examples:**
  - "This is not an ordinary sharing session — it's a closed-door conversation with only 30 participants."
  - "The Founder Late-Night Forum has run for 50 consecutive editions, reaching over 2,000 entrepreneurs."
  - "An executive peer group with a ¥100K annual membership fee, now opening 3 trial seats to the public."
  - "A private dinner exclusively for business owners with annual revenues exceeding ¥100M."

  **Avoid:**
  - Vague event positioning without clear differentiation
  - Highlighting format without explaining its value
  - Overclaiming that erodes credibility

  ---

  ### Part 2: Body (Detailed Event Value)

  **Goal:** Help readers deeply understand "what makes this event great," moving from "feels different" to "convinced it's worth attending."

  **Approach:** Expand on 2–3 of the most persuasive dimensions below:

  **1. Format Value** — The unique experience the event's format enables
  - What advantages does this format offer?
  - What distinctive experience do participants gain?
  - How does it fundamentally differ from typical events?

  **2. Brand Value** — The event's history and reputation
  - How many editions or years has it run?
  - Testimonials and feedback from past participants
  - What outcomes or impact has it produced?

  **3. Community Value** — The value participants bring to each other
  - Who attended past editions?
  - What networking opportunities exist at the event?
  - What kind of meaningful connections can be built?

  **4. Experience Value** — The craftsmanship and details of the event
  - What is distinctive about the venue or setting?
  - What intentional design choices are evident in the agenda?
  - Are there unique interactive sessions or rituals?

  **5. Scarcity Value** — Why this is a rare opportunity
  - Event frequency (only X times per year)
  - Participation requirements (application or referral required)
  - Seat limitations (limited to X participants)

  **Example Paragraph:**
  *"The Founder Late-Night Forum is not a lecture event — it is a genuine deep dialogue. There's no stage and no audience. There's only a round table. Everyone is a participant, not a spectator.*

  *Regarding participants: We apply a strict vetting process — participants must be active founders, with company revenues exceeding ¥5M, and genuinely willing to share both their challenges and their wins. Over 50 editions, more than 1,000 founders have participated, including several who later became unicorn founders.*

  *Regarding the experience: For each edition, we choose a distinctive venue — perhaps a tea house on a hilltop or a private dining room in a historic alley. We believe the environment shapes the depth of the conversation.*

  *Participants frequently tell us that this is the place where they said things they'd never told anyone else — and heard truths no one had ever told them."*

  **Avoid:**
  - Format descriptions without explaining their value
  - Vague, generic content lacking specific detail
  - Overclaiming that undermines credibility

  ---

  ### Part 3: Supporting Content (The Role of Speaker and Agenda)

  **Goal:** Explain how the speaker and agenda serve the event's overall value, positioning them as "value-adding components," not the main attraction.

  **Approach:**
  - Speaker as "part of the event experience": Explain how the speaker fits into the event's distinctive format
  - Agenda as "part of the experience": Explain how the agenda design serves the event's core value

  **Suggested Phrasing:**
  - "For this edition, we've invited [Speaker] as a dialogue guest to join us in..."
  - "The agenda has been carefully crafted to ensure every participant can..."
  - "Beyond [Speaker]'s contribution, the event also includes..."

  **Example Paragraph:**
  *"For this edition of the Founder Late-Night Forum, we've invited serial entrepreneur Li Ming as our facilitation guest. But unlike a traditional event, Li Ming isn't here to 'lecture' — he joins the table as an equal participant in open dialogue.*

  *The agenda unfolds in three parts:*
  - *Icebreaker: Each person shares their single biggest current challenge in 3 minutes*
  - *Deep Dialogue: A 2-hour roundtable discussion around shared themes*
  - *Open Networking: Move to the terrace for continued conversations over drinks*

  *We're not optimizing for information density. We're optimizing for depth of dialogue."*

  **Avoid:**
  - Speaker/agenda introductions that overshadow the event
  - Content that clashes with the established event tone
  - Overlong descriptions that interrupt reading flow

  ---

  ### Part 4: Closing (Invitation to Join)

  **Goal:** Extend an invitation; make readers feel a sense of privilege in being chosen; drive registration.

  **Approach:**
  - Reconnect with the event's distinctive value
  - Emphasize the meaning of "joining this community"
  - Clear CTA + scarcity reminder

  **Suggested Phrasing:**
  - "If you share this vision for what an event can be, we welcome your application"
  - "We're not optimizing for headcount — we're looking for the right people"
  - "This edition opens [number] seats only; registration requires review"
  - "We look forward to meeting you in person at [location]"

  **Example Paragraph:**
  *"The Founder Late-Night Forum doesn't scale for size. It exists to find the right people.*

  *If you are a founder in the trenches. If you crave genuine, deep dialogue over surface-level small talk. If you're willing to open up and to truly listen — we'd love to have you.*

  *This edition opens 20 seats only. Registration requires a brief questionnaire; we will confirm within 48 hours.*

  *We look forward to seeing you at the table."*

  **Avoid:**
  - A closing that feels overly sales-driven
  - Closing that fails to echo the opening event positioning
  - Unclear CTA or vague entry requirements

  ---

  ### Overall Writing Principles

  1. **The event is the absolute protagonist** — Speaker, agenda, and purpose all serve as supporting elements for the event's own value.
  2. **Distinctiveness over information density** — The copy's tone should make readers feel "this event is different."
  3. **Experience over functionality** — Emphasize how participation feels, not just what knowledge is gained.
  4. **Exclusivity over mass appeal** — Make readers feel the value of being "selected," not "welcome to everyone."
  5. **Handling other elements:**
     - Speaker → A component of the event experience
     - Agenda → A reflection of the event's design philosophy
     - Purpose → The founding vision and mission behind the event
     - Trending topics → If relevant, explain how the event responds to current needs

  ---

  ### Module: Event Characteristics Assessment Strategy

  Analyze the event and assess its distinguishing qualities to apply the appropriate strategy:

  **Event Characteristics Assessment Matrix:**

  | Dimension | High Value | Moderate Value | Standard Value |
  |-----------|-----------|----------------|----------------|
  | Format Scarcity | Closed-door / executive peer group / deep-dive workshop | Small salon / roundtable | Open lecture / large conference |
  | Brand Equity | 10+ editions with testimonials and data | 3–10 editions | First edition / new brand |
  | Participant Selectivity | Clear vetting criteria | Paid admission threshold | Free and open |
  | Experience Design | Distinctive venue + ceremonial elements | Some signature sessions | Standard agenda flow |

  **Characteristics-Based Strategies:**

  **[High Event Value]** (Scarce format + brand equity + selective access)
  - Event featured upfront: Opening emphasizes the event itself
  - Full expansion: Cover format, brand, community, and experience dimensions
  - Tone: Exclusivity, scarcity, and curated experience
  - Proportion: Event introduction accounts for 50–60% of copy

  **[Moderate Event Value]** (Some standout dimensions)
  - Event introduced mid-copy: Open with value proposition, then expand on event characteristics
  - Selective expansion: Focus on the 1–2 most compelling dimensions
  - Tone: Professional, premium
  - Proportion: Event introduction accounts for 30–40% of copy

  **[Standard Event Value]** (No clear differentiation)
  - Event placed last: Lead with agenda or speaker; event details serve as foundational information
  - Brief mention: 1–2 sentences on event format
  - Compensatory strategy: Strengthen other focal areas (speaker / agenda / purpose / trending topic)
  - Proportion: Event introduction accounts for 15–20% of copy

  ---

professional_tone: |
  ### `professional_tone` — Professional & Formal

  **Best For:** Corporate conferences, industry summits, academic symposiums, product launches, B2B events

  **Language Characteristics:**
  - Voice: Primarily third person ("this event," "attending speakers")
  - Vocabulary: Industry terminology, professional language, formal expression
  - Sentence structure: Structured, logically clear, high information density
  - Tone: Authoritative, credible, expert

  **Writing Rules:**

  1. Opening hook style:
     - ✅ "The annual [industry] summit — not to be missed"
     - ✅ "Industry leaders converge to discuss the future of [topic]"
     - ❌ Avoid colloquialisms and internet slang

  2. Value expression style:
     - ✅ "In-depth analysis of industry trends and emerging opportunities"
     - ✅ "Build high-quality connections with industry decision-makers"
     - ✅ "Gain cutting-edge insights and actionable methodologies"
     - ❌ Avoid casual exclamations

  3. Outcome description style:
     - ✅ "Connect with 50+ senior executives from leading enterprises"
     - ✅ "Access high-value industry research reports"
     - ✅ "Participate in closed-door roundtable discussions"
     - ❌ Avoid overly casual phrasing

  4. Emoji usage:
     - Density: Approximately 1 emoji per 50–60 words
     - Preferred: 📅 📍 ⏰ 💼 📊 🎯 ✨ 🏆
     - Avoid: Overly emotional emojis such as 🔥 💔 😭 🤩
     - Short version: 3–5 | Medium: 8–12 | Long: 12–18

  **Style Comparison:**

  | Casual | Professional & Formal |
  |--------|----------------------|
  | 🔥 You can't afford to miss this! | 📊 The annual [industry] summit — registration now open |
  | Only 30 spots left, grab yours fast! | Seats are limited — early registration is recommended |

  ---

friendly_tone: |
  ### `friendly_tone` — Warm & Welcoming

  **Best For:** Community meetups, offline social events, workshops, interest groups, fan gatherings

  **Language Characteristics:**
  - Voice: Primarily first person ("we," "together," "you")
  - Vocabulary: Everyday language, warm expressions, inviting tone
  - Sentence structure: Conversational, interactive, naturally flowing
  - Tone: Enthusiastic, genuine, warm

  **Writing Rules:**

  1. Opening hook style:
     - ✅ "Want to spend your weekend doing something great?"
     - ✅ "It's been a while — we're getting together again!"
     - ✅ "Want to meet people who truly get you?"
     - ✅ "We've been waiting for you — this event is perfect for you"

  2. Value expression style:
     - ✅ "Have great conversations and make new friends"
     - ✅ "We've prepared lots of surprises for you to discover"
     - ✅ "Coming solo is totally fine — everyone here is super welcoming"
     - ✅ "No need to be shy — we've got your back"

  3. Outcome description style:
     - ✅ "Meet 30+ people who are on the same wavelength"
     - ✅ "Leave with great memories and new contacts"
     - ✅ "A small gift for every attendee~"
     - ✅ "You might just meet your new partner in crime"

  4. Emoji usage:
     - Density: Approximately 1 emoji per 30–40 words
     - Preferred: 🥳 💕 ✨ 🤗 😊 🎉 👋 💫 🌟 ❤️
     - May include: Soft punctuation ~ and conversational particles
     - Short version: 5–8 | Medium: 12–16 | Long: 18–22

  **Style Comparison:**

  | Standard | Warm & Welcoming |
  |----------|-----------------|
  | Connect with 50+ industry leaders | Meet 50+ genuinely interesting people~ |
  | Click the link to secure your seat → | Come register — we're saving a spot for you~ 💕 |

  ---

educational_tone: |
  ### `educational_tone` — Educational & Instructional

  **Best For:** Training programs, skill workshops, knowledge-sharing sessions, growth bootcamps, learning-focused events

  **Language Characteristics:**
  - Voice: Primarily second person ("you will learn," "help you")
  - Vocabulary: Learning outcome-oriented, skills-based, value-specific
  - Sentence structure: Problem-solution format, pain point to gain
  - Tone: Professional without being cold; strongly instructional

  **Writing Rules:**

  1. Opening hook style:
     - ✅ "Still struggling with [pain point]? This event has the answer"
     - ✅ "Ready to systematically master [skill]? Here's your chance"
     - ✅ "3 hours — from novice to confident practitioner"
     - ✅ "Skills you can apply immediately — that's what real expertise looks like"

  2. Value expression style:
     - ✅ "Leave with an actionable methodology and a practical toolkit"
     - ✅ "Master the core principles of [skill] from scratch"
     - ✅ "Avoid the mistakes 90% of beginners make"
     - ✅ "Post-session Q&A and assignment feedback included"

  3. Outcome description style (emphasize learning outcomes):
     - ✅ "Master 3 techniques you can implement immediately"
     - ✅ "Walk away with a complete [topic] learning roadmap"
     - ✅ "Take home a resource pack and templates worth ¥[X]"
     - ✅ "Receive a [certificate/badge] upon completion"

  4. Emoji usage:
     - Density: Approximately 1 emoji per 35–45 words
     - Preferred: 📚 💡 🎯 ✅ 📝 🔑 💪 📈 🎓 ✨
     - Emphasize learning and growth-related emojis
     - Short version: 4–6 | Medium: 10–14 | Long: 15–20

  **Recommended additions for long-form versions:**
  - Course outline / learning modules
  - Instructor profile (emphasizing teaching experience)
  - Participant results and testimonials
  - Audience description and fit criteria

  **Style Comparison:**

  | Standard | Educational & Instructional |
  |----------|---------------------------|
  | Connect with 50+ industry leaders | Learn from 5 experienced practitioners |
  | 🔥 You can't afford to miss this! | 💡 Want to master [skill] fast? Don't miss this session |

  ---

humorous_tone: |
  ### `humorous_tone` — Light & Humorous

  **Best For:** Youth-oriented events, creative markets, fun competitions, parties, entertainment events

  **Language Characteristics:**
  - Voice: Flexible; leans colloquial
  - Vocabulary: Trending references, popular memes, self-deprecating humor
  - Sentence structure: Subverted expectations, witty commentary, exaggeration
  - Tone: Casual, entertaining, playfully irreverent but tasteful

  **Writing Rules:**

  1. Opening hook style:
     - ✅ "No plans this weekend? Here — let us cure your decision fatigue"
     - ✅ "Working hard deserves a reward. This weekend — on us"
     - ✅ "Socially anxious? Don't worry — this event was made for you"
     - ✅ "Your wallet: where are you going? You: somewhere worth it"

  2. Value expression style:
     - ✅ "Show up and you're family. Don't show up and... well, you haven't seen this yet"
     - ✅ "So fun you'll forget to post (but you'll absolutely post)"
     - ✅ "Guaranteed laughs — if not, we owe you one"
     - ✅ "Better than binge-watching, more enriching than doomscrolling"

  3. Outcome description style:
     - ✅ "Leave with joy, new friends, and content for your feed (the complete package)"
     - ✅ "A great backdrop for your next post — your moment to shine"
     - ✅ "Mystery prizes — could be yours?"
     - ✅ "Free snacks on deck — legendary perk, honestly"

  4. Emoji usage:
     - Density: Approximately 1 emoji per 25–35 words
     - Preferred: 😂 🤣 💀 😎 🔥 👀 🎉 🎊 🤪 ✌️ 🫠
     - May include playful emoticons: (｀・ω・´) ╮(╯▽╰)╭
     - Short version: 6–10 | Medium: 15–20 | Long: 22–28

  **Important Notes:**
  - Humor should be tasteful — never offensive or crude
  - Reference only widely understood memes
  - Core information (time, location) must remain clear and accurate
  - Urgency can be communicated humorously, but don't lose the urgency itself

  **Style Comparison:**

  | Standard | Light & Humorous |
  |----------|-----------------|
  | Only 30 spots remaining | Only 30 slots left — first come, first served. Latecomers: see you next time |
  | High-energy atmosphere | The happiness level is dangerously elevated. Neighbors may file a noise complaint |
# ============================================
# Stage — 活动宣传阶段策略
# ============================================

warmup: |
  ## `warmup` — 预热期文案策略

  ### 阶段定位
  制造悬念，建立期待感。信息是故意不完整的，目的是吊胃口。
  核心目标：认知（Awareness）— 让人知道有这件事。

  ---

  ### 数据真实性规则（所有阶段通用）
  - ✅ 所有具体信息（日期、地点、主题、嘉宾、议程、票价、人数等）必须来自已提供的真实数据
  - ✅ 未提供的信息，一律不提及、不编造、不用 "TBD" 占位
  - ❌ 绝对禁止编造不存在的嘉宾名字、虚构议程内容、杜撰参会数据

  ### 语气特征
  - 悬念式、提问式开头
  - 预告性措辞，留白空间大
  - 轻松但有吸引力
  - 不要一次性把所有信息都给出来

  ### 信息密度
  低（30-40%的信息释放量）。只释放核心信息（主题、日期、地点），不展开嘉宾详情、议程细节。

  ### 典型 CTA
  - "Mark your calendar"
  - "Stay tuned for more"
  - "Something big is coming"
  - "敬请期待"
  - "先把时间留好"

  ### 内容策略
  - 只释放核心信息（主题、日期、地点）
  - 不展开嘉宾详情、议程细节
  - 可使用"猜猜谁会来"等悬念钩子，但前提是活动确实有嘉宾数据
  - 配合 hashtag 建立话题标签
  - 留下想象空间，让读者产生好奇心

  ### 与不同内容焦点的交叉效果

  | Content Focus | warmup 阶段文案风格 |
  |---------------|-------------------|
  | guest_profile（嘉宾） | 只释放线索不揭晓身份，用成就暗示而非直接公布。示例："猜猜这位连续创业者是谁？线索：Ta 曾在……"。如果嘉宾数据中只有一位，不要暗示有多位。 |
  | event_agenda（议程） | 只透露议题方向或关键词，不展开细节。示例："我们准备了一个你绝对不想错过的话题……""X大主题即将揭晓"。具体数字必须与实际议程数据一致，无数据不要编造数字。 |
  | event_purpose（活动目的） | 用目标受众的痛点或渴望开场，引发"这跟我有关"。此类型允许使用提问式开头。 |
  | basic_information（基础信息） | 只释放最基础的三要素：主题+日期+城市。禁止释放票价、完整地址等详情。 |

  ### 绝对禁止
  - ❌ 在预热期就把完整议程、全部嘉宾列表、详细价值主张全部铺出来
  - ❌ 使用紧迫性语言（"名额有限"、"即将截止"等属于后面阶段）
  - ❌ 长篇大论的详细介绍，预热期文案应保持精简
  - ❌ 编造未提供的任何具体信息

active: |
  ## `active` — 正式宣发期文案策略

  ### 阶段定位
  信息全面铺开，这是内容产出最密集、持续时间最长的主力阶段。
  核心目标：兴趣+转化（Interest → Conversion）— 让人想来。

  ---

  ### 数据真实性规则（所有阶段通用）
  - ✅ 所有具体信息（日期、地点、主题、嘉宾、议程、票价、人数等）必须来自已提供的真实数据
  - ✅ 未提供的信息，一律不提及、不编造、不用 "TBD" 占位
  - ❌ 绝对禁止编造不存在的嘉宾名字、虚构议程内容、杜撰参会数据
  - ⚠️ 此阶段信息释放量最大，是最容易发生编造的阶段——务必严格遵守

  ### 语气特征
  - 从容、自信、信息丰富
  - 专业且有说服力
  - 适合深度内容展开
  - 用数据和事实建立可信度

  ### 信息密度
  高（70-100%的信息释放量）。可以充分展开所有细节，但仅限于已提供的数据。

  ### 典型 CTA
  - "Register now"
  - "Learn more"
  - "Secure your spot"
  - "立即报名"
  - "了解详情"
  - "锁定席位"

  ### 内容策略
  - 嘉宾逐个官宣，附详细背景介绍（仅使用提供的嘉宾数据）
  - 议程分模块释放，每次聚焦一个亮点（仅使用提供的议程数据）
  - 如有票务信息，可官宣早鸟票/优惠窗口
  - 赞助商合作官宣（仅在有赞助商数据时）
  - 参会价值详细阐述
  - 如有往期活动数据，可作为社会证明

  ### 与不同内容焦点的交叉效果

  | Content Focus | active 阶段文案风格 |
  |---------------|-------------------|
  | guest_profile（嘉宾） | 正式官宣，完整背景+分享主题+为什么值得听。可逐个官宣，每条聚焦一位嘉宾。所有嘉宾信息必须来自提供的数据。 |
  | event_agenda（议程） | 分模块释放议程亮点，将议程转化为参会者收获而非流水账。数字和领域必须与实际议程数据一致。 |
  | event_purpose（活动目的） | 具体阐述"参加你能得到什么"，用数字和实例支撑。如有往期数据可引入社会证明。 |
  | basic_information（基础信息） | 所有基础信息完整释放：时间地点票价报名方式。结构清晰地列出所有实用信息，突出活动独特定位或规模。票价信息仅在有票务数据时呈现。 |

  ### 绝对禁止
  - ❌ 信息模糊不清，正式宣发期需要给出完整、可信的信息
  - ❌ 过度使用紧迫性语言（那是倒计时和最后召集的工具）
  - ❌ 忽略社会证明（数据、往期成果、嘉宾背景等——但仅限有数据支撑时）
  - ❌ 编造任何未提供的信息，包括虚构嘉宾背景细节、杜撰议程内容、假造参会人数

countdown: |
  ## `countdown` — 倒计时期文案策略

  ### 阶段定位
  时间压力登场。内容不再是全新的，而是把之前发过的亮点重新包装 + 时间紧迫感。
  核心目标：紧迫（Urgency）— 让人怕错过。

  ---

  ### 数据真实性规则（所有阶段通用）
  - ✅ 所有具体信息必须来自已提供的真实数据
  - ✅ 未提供的信息，一律不提及、不编造
  - ❌ 绝对禁止编造不存在的任何具体信息

  ### 倒计时天数
  距离活动的天数已由系统计算好并通过 days_until_event 提供，直接使用该数值，禁止自行计算或编造天数。

  ### ⚠️ 紧迫感真实性约束（本阶段关键规则）

  紧迫感必须建立在真实的约束条件上，绝对禁止制造虚假紧迫感。

  **可以无条件使用的紧迫感来源（永远真实）：**
  - ✅ 时间倒计时：使用 days_until_event 提供的天数，如"还剩 X 天"
  - ✅ 时间节点提醒："下周就是活动日了""这个周末见"——基于真实日期推算

  **必须有数据支撑才能使用的紧迫感来源：**
  - ⚠️ 名额/席位稀缺："仅剩 X 个席位""名额即将售罄"——仅当活动有明确的人数上限时才可使用。如果活动未设人数限制，禁止使用任何名额相关的稀缺表达
  - ⚠️ 价格变动："早鸟价即将结束""价格即将上调"——仅当有票务数据时才可使用
  - ⚠️ 已报名人数："已有 X 人报名"——仅当有真实报名数据时才可使用，不可编造数字

  **绝对禁止的虚假紧迫感：**
  - ❌ 活动未设人数限制却说"名额有限""仅剩少量席位"
  - ❌ 活动免费却暗示"价格即将变动"
  - ❌ 编造报名人数（"已有500人报名"但无数据支撑）
  - ❌ 虚构截止日期（"明天就截止"但实际没有报名截止日）

  **无名额限制时的替代策略：**
  当活动没有人数限制时，倒计时阶段的紧迫感完全依靠时间维度，根据 days_until_event 选择合适的表述：
  - days_until_event > 14："还有 X 天——提前规划你的行程"
  - days_until_event 7-14："下周就要开始了，你的日程安排好了吗？"
  - days_until_event 3-7："这周就是活动日了，别忘了来"
  - days_until_event 1-2："明天/后天见！现在报名还来得及"
  - days_until_event ≤ 0："今天就是活动日——最后机会"
  - 聚焦于"错过内容的遗憾"而非"错过名额的紧迫"

  ### 语气特征
  - 紧迫、有能量感
  - FOMO（Fear of Missing Out）驱动
  - 数字化表达（倒计时天数、剩余名额——名额仅在有数据时使用）
  - 语言节奏加快，段落更短

  ### 信息密度
  中（聚焦 2-3 个核心卖点反复强化）。不需要展开新内容，而是把最大的亮点配合时间压力重新包装。

  ### 典型 CTA

  **有名额限制时：**
  - "还剩 X 天，席位即将售罄 — 立即报名"
  - "倒计时 X 天！名额有限，别再犹豫"

  **无名额限制时（根据 days_until_event 调整表述）：**
  - "还剩 X 天 — 现在就报名"
  - "倒计时 X 天！别忘了来"

  （以上 X 均使用 days_until_event 的值，不可编造）

  ### 内容策略
  - 文案开头插入倒计时数字（使用 days_until_event 的值）
  - 重新包装此前的亮点内容，叠加时间压力
  - 如有真实报名数据，可强调"已有 X 人报名"作为社会证明
  - 如活动有人数上限，可突出稀缺性（限额、即将满员）
  - 如活动无人数限制，聚焦时间紧迫和内容价值
  - 语言节奏加快，段落更短

  ### 与不同内容焦点的交叉效果

  | Content Focus | countdown 阶段文案风格 |
  |---------------|---------------------|
  | guest_profile（嘉宾） | 嘉宾成为倒计时的锚点——"还有 X 天就能现场听 [嘉宾] 分享，你确定要错过？"（X 使用 days_until_event 的值）。不要再次完整介绍嘉宾背景，假设读者已知道。嘉宾名必须来自已提供的数据。 |
  | event_agenda（议程） | 不再展示全部议程，只挑1-2个最强session反复强化。示例："倒计时 X 天！光这一场 session 就值回票价"。禁止再次列出完整议程流水。 |
  | event_purpose（活动目的） | 将价值转化为"错过的损失"——FOMO驱动。如有真实报名数据可使用"已有X人报名，你还在观望？"。禁止再次从零解释活动目的。 |
  | basic_information（基础信息） | 倒计时数字+时间成为主角。如有人数限制可加"仅剩X席"，无限制则不提名额。禁止再次完整列出所有基础信息。 |

  ### 绝对禁止
  - ❌ 像正式宣发期一样从头介绍活动（读者已经看过完整信息了）
  - ❌ 引入全新的内容点（这个阶段是复用+加压，不是发布新信息）
  - ❌ 使用悬念式写法（悬念属于预热期，这个阶段需要直接明了）
  - ❌ 在活动无人数限制时使用名额稀缺类表达
  - ❌ 在活动免费时暗示价格变动
  - ❌ 编造报名人数或虚构任何数据制造紧迫感
  - ❌ 编造倒计时天数，必须使用 days_until_event 提供的值

lastcall: |
  ## `lastcall` — 最后召集文案策略

  ### 阶段定位
  砍掉所有铺垫，只剩一个信息——立刻行动。信息极度精简，压力拉满。
  核心目标：行动（Action）— 让人立刻行动。

  ---

  ### 数据真实性规则（所有阶段通用）
  - ✅ 所有具体信息必须来自已提供的真实数据
  - ✅ 未提供的信息，一律不提及、不编造
  - ❌ 绝对禁止编造不存在的任何具体信息

  ### 倒计时天数
  距离活动的天数已由系统计算好并通过 days_until_event 提供，直接使用该数值，禁止自行计算或编造。如果 days_until_event 不足1天，可用小时级表达（如"最后X小时"）。

  ### ⚠️ 紧迫感真实性约束（本阶段关键规则）

  最后召集阶段施压感最强，因此真实性约束也最重要。所有施压必须基于真实约束条件。

  **可以无条件使用的紧迫感来源（永远真实）：**
  - ✅ 时间截止："今晚截止""最后X小时""明天就是活动日了"（使用 days_until_event 的值）
  - ✅ 时间紧迫的事实陈述："报名通道即将关闭"（如果确实有报名截止时间）

  **必须有数据支撑才能使用的紧迫感来源：**
  - ⚠️ 名额稀缺："最后 X 个名额"——仅当活动有明确人数上限时可用
  - ⚠️ 价格相关："最后的优惠价"——仅当有票务数据时可用

  **绝对禁止的虚假紧迫感：**
  - ❌ 活动未设人数限制却说"最后X个名额"
  - ❌ 编造截止时间或截止条件
  - ❌ 虚构任何数字用于施压

  **无名额限制时的替代策略：**
  当活动没有人数限制时，lastcall 的施压完全依靠时间维度，根据 days_until_event 选择合适的表述：
  - days_until_event ≤ 0："今天就是活动日——最后机会报名"
  - days_until_event = 1："明天就是活动日了——现在报名还来得及"
  - days_until_event = 2-3："还有 X 天！别错过 [活动主题]"
  - days_until_event > 3：聚焦"即将到来"+"立即锁定席位"
  - 聚焦"时间窗口即将关闭"而非"名额即将用完"

  ### 语气特征
  - 极度直接，无废话
  - 施压感最强
  - 紧急通知的语气
  - 每个字都在推动行动

  ### 信息密度
  极高但极简（一个核心卖点 + 行动指令）。文案长度显著缩短，但每个字的信息密度最高。

  ### 典型 CTA

  **有名额限制时：**
  - "最后 X 个名额 🚨 今晚截止"
  - "最后机会，名额即将清零"

  **无名额限制时（根据 days_until_event 调整表述）：**
  - "还有 X 天 🚨 现在报名"
  - "错过等下次"
  - "Now or never"

  ### 内容策略
  - 文案长度显著缩短（信息密度最高但篇幅最短）
  - 只保留一个核心信息 + CTA
  - 不再展开细节描述
  - 可使用感叹号等强调手段
  - 报名链接/二维码直接置顶
  - 如有人数上限数据，可使用剩余名额施压；如无，只用时间施压

  ### 与不同内容焦点的交叉效果

  | Content Focus | lastcall 阶段文案风格 |
  |---------------|---------------------|
  | guest_profile（嘉宾） | 嘉宾名即施压工具，一句话定胜负。示例："最后机会见到 [嘉宾]——还有 X 天"。禁止任何背景介绍、铺垫。嘉宾名必须来自已提供的数据。X 使用 days_until_event。 |
  | event_agenda（议程） | 议程不再是重点，只用一句话数字概括。示例："X 场深度分享，还有 Y 天就开始"。禁止任何议程详情展开。数字必须与实际议程一致。Y 使用 days_until_event。 |
  | event_purpose（活动目的） | 一句话带核心价值+立即行动。示例："最后机会获取 [核心价值]——还有 X 天"。禁止展开价值列表。X 使用 days_until_event。 |
  | basic_information（基础信息） | 只剩日期+报名入口，其他全部砍掉。示例："还有 X 天！立即报名"。禁止任何详情展开。X 使用 days_until_event。 |

  ### 绝对禁止
  - ❌ 长篇大论展开细节（这个阶段每个字都是行动指令）
  - ❌ 使用悬念式/提问式写法（没有时间让读者思考了）
  - ❌ 引入新信息或新卖点（只用最强的那一个）
  - ❌ 弱化紧迫感的措辞（"有空可以看看"、"感兴趣的话"等）
  - ❌ 在活动无人数限制时使用名额稀缺类表达（"最后X个名额"等）
  - ❌ 编造截止时间、名额数量或任何数据
  - ❌ 编造倒计时天数/小时数，必须使用 days_until_event 提供的值