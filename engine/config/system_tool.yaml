  ## Event Scale Definition

  This template applies to: **Medium-sized events (100–300 attendees)**

  ### Core Content Design Characteristics of Medium-Scale Events

  | Dimension                | Description                                                             |
  | ------------------------ | ----------------------------------------------------------------------- |
  |  Balance               | Balanced mix of keynotes and interactive discussions; depth and breadth |
  |  Multi-format          | Keynotes + Panels + Workshops + Exhibition areas                        |
  |  Multi-track           | Main stage + 1–2 breakout tracks/workshops                              |
  |  Structured Networking | Matching systems + coffee break networking + targeted exchanges         |
  |  Layered Content       | Different content depth for different attendee levels                   |
  |  Moderate Networking   | Networking time accounts for ~30%                                       |

  ### Typical Scenarios for Medium-Scale Events

  * Vertical industry summits
  * Product launches + ecosystem conferences
  * Annual user conferences
  * Themed forums / seminars
  * Annual community gatherings
  * Regional industry conferences
  * Medium-scale tech/developer conferences
  * Startup demo days + matchmaking events
  * Brand experience events

