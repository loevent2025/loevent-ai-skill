  ## Input Parameter Descriptions

  - **Event Name**, **Target Audience**, **Organizer**, **Event Theme**, **Event Location**
  - **Expected Attendees**, **Event Type**, **Event Flow**, **Organizer Profile**
  - **Company Introduction**, **Venue Information**, **content**, **user_input**, **language**

  ### Reference Content & User Requirements

  Same rules as other templates.

  ---

  ## [Currency Requirement]

  - All budget amounts must use the local currency of the event location (location)
  - Examples: Mainland China uses CNY/¥, US uses USD/$, Japan uses JPY/¥, Europe uses EUR/€

  ---

  ## Scale Definition

  This template applies to: **Small-Scale Events (approximately 50 people, generally no more than 80)**

  ### Small Event Partnership Characteristics

  | Dimension | Description |
  |-----------|-------------|
  | Partnership Goals | Cost sharing, community mutual aid, resource sharing |
  | Partnership Model | Primarily resource exchange; minimal cash sponsorship |
  | Partnership Relationship | Equal collaboration, long-term partnership, community co-building |
  | Partner Count | 8-15 |
  | Benefits Design | Simple and practical; primarily brand exposure |

  ---

  ## Small Event Partnership Strategy Core Principles

  ### Principle 1: Resource Exchange Over Cash Sponsorship

  Small events should use **resource exchange** as the core partnership model:
  - Venue exchange (provide exposure for free/discounted venue)
  - Material exchange (catering, gifts, supplies support)
  - Content exchange (speaker resource sharing)
  - Promotion exchange (mutual community/media cross-promotion)

  ### Principle 2: Few but Quality Partners

  | Partner Type | Count | Partnership Model |
  |-------------|-------|-------------------|
  | Venue Partner | 1 | Venue support/discount |
  | Material Support | 1-2 | Catering/gifts/prizes |
  | Content/Speaker Support | 1-2 | Speaker referrals/content co-creation |
  | Promotion Support | 5-10 | Community distribution/media coverage |
  | **Total** | **8-15** | - |

  ### Principle 3: Avoid Competitor Partnerships

  Strictly exclude organizations that directly compete with the organizer or core audience.

  ---

  ## Small Event Partnership Tiers (Only 2-3 tiers, simple and clear)

  | Tier | Count | Contribution | Core Benefits |
  |------|-------|-------------|---------------|
  | Supporting Partner | 1-2 | Venue/major material support | Brand exposure, opening remarks (3 min), speaker seat, attendee list |
  | Collaborating Partner | 2-3 | Partial material/resource support | Brand exposure, attendance seats, content collaboration |
  | Promotion Partner | 5-10 | Promotion resources | Brand exposure, event coverage |

  ### Prohibited Tier Names (inappropriate for small events)

  - "Title Sponsor", "Strategic Partner", "Diamond/Platinum/Gold Sponsor", "Co-Organizer" (unless truly involved in planning)

  ### Recommended Tier Names

  - "Venue Support Partner", "Catering/Gift Support", "Content Collaboration Partner", "Promotion Support Partner", "Collaborating Unit"

  ---

  ## Small Event Sponsorship Benefits Framework

  Benefits categories: Brand Benefits, Content Benefits, Networking Benefits, Promotion Benefits — each with design principles, constraints, and 2-4 specific benefits per category.

  ---

  ## Small Event Output Format

  ### Chapter Structure

  #### Chapter 1: Partnership Strategy Overview
  - 1.1 Event Positioning and Partnership Goals
  - 1.2 Partner Tier Plan

  #### Chapter 2: Partner Recommendations
  - 2.1 Venue partnership direction
  - 2.2 Material support direction
  - 2.3 Content/promotion support

  #### Chapter 3: Benefits Proposal
  - 3.1 Benefits detail per tier
  - 3.2 Benefits comparison table (concise, 2-3 rows)

  #### Chapter 4: Execution Recommendations
  - 4.1 Priority ranking (Venue → Material → Promotion)
  - 4.2 Outreach messaging suggestions (emphasize "targeted audience")
  - 4.3 Important notes

  ---

  ## Quality Checklist

  - [ ] Total partners within 8-15 range
  - [ ] No large-event tier names used
  - [ ] Benefits are resource-exchange-oriented, not cash-oriented
  - [ ] Deep connection value emphasized
  - [ ] No more than 3 tiers
  - [ ] No inflated exposure promises
  - [ ] No recommended partners compete with organizer or core attendees


