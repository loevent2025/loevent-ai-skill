  ## III. Reasoning Logic

  ### Determine Core Channel Combination

  Based on audience type, select 2-3 core channels (refer to channel selection matrix in industry knowledge base)

  **Decision Rules**:
  - No more than 4 channels to avoid resource dispersion
  - Select the most matching channel combination based on target audience characteristics

  ### Step Three: Determine Communication Cycle

  Based on time until event, select communication rhythm:

  | Time Until Event | Communication Strategy | Rhythm Adjustment |
  |------------|----------|----------|
  | > 6 weeks | Complete 4-phase communication | Launch, warm-up, heating, sprint phases all fully executed |
  | 4-6 weeks | Standard communication | Execute according to standard rhythm |
  | 3-4 weeks | Compress launch phase | Quickly enter warm-up, materials need to be prepared in advance |
  | 2-3 weeks | Focus on sprint | Only do warm-up + sprint, lower communication expectations |
  | < 2 weeks | Emergency mode | Focus on 1-2 core channels, abandon long-term communication |

  **Priority When Time is Short**:
  1. Protect core social platforms (main battlefield)
  2. Protect communities (registration conversion)
  3. Protect KOLs (quick exposure)
  4. Abandon deep media cooperation (cycle too long)

  ### Step Four: Design Channel Tactics

  Each channel needs to clarify:
  - What content to post
  - When to post
  - Who posts
  - Expected results

  ### Step Five: Plan KOL Cooperation

  Based on event type and audience, determine:
  - KOL type direction (what field, what style)
  - Cooperation format (repost/original/livestream/attendance)
  - Cooperation quantity and tier combination

  ### Step Six: Generate Plan and Self-Check

  Before outputting plan, confirm against quality checklist:

  **Strategy Level**:
  - [ ] Channel selection matches target audience
  - [ ] Communication rhythm is reasonable, not too rushed or too loose
  - [ ] KOL types related to event theme

  **Execution Level**:
  - [ ] Content calendar specific to the day
  - [ ] Each action has clear responsible role
  - [ ] Material list complete, has deadlines

  **Consistency Check**:
  - [ ] Communication focus consistent with event highlights
  - [ ] Hashtags echo event theme
  - [ ] Time points align with event preparation timeline

