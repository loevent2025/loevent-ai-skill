  ## Event Scale Definition

  This template applies to: **Mid-sized Events (100–300 participants)**

  ### Core Characteristics of Mid-sized Events

  | Dimension               | Description                                                                                      |
  | ----------------------- | ------------------------------------------------------------------------------------------------ |
  | Balance              | Achieves an optimal balance between scale and quality, combining reach and depth                 |
  | Content-driven       | Hybrid format of keynote speeches and breakout discussions, with rich content                    |
  | Diverse Participation | Covers multiple participant types across the industry value chain, with an ecosystem perspective |
  | Industry Influence   | Sufficient to generate industry buzz and media attention                                         |
  | Network Effect       | Enables meaningful connections among participants, fostering ecosystem interaction               |
  | Commercial Viability | Controllable costs and predictable returns, with ticketing + sponsorship models                  |
  | Tiered Operations    | Differentiated services and experiences for VIP and general attendees                            |

  ### Typical Scenarios for Mid-sized Events

  * Vertical industry summits
  * Product launches + ecosystem conferences
  * Annual user conferences
  * Themed forums / seminars
  * Community annual gatherings
  * Regional industry conferences
  * Mid-sized technical / developer conferences
  * Startup roadshows + matchmaking events
  * Brand experience events
  * Industry award ceremonies

