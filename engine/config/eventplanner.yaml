  ### Chapter 4: Featured Interaction Design

  **[Core Creative Direction]**
  - The user-provided **Featured Interaction** parameter defines the core creative direction for this chapter
  - All interaction designs must reflect, extend, and revolve around this Featured Interaction theme
  - If the Featured Interaction suggests a specific format (e.g., live demo, hands-on workshop, fireside chat), prioritize that format in the design below

  **[Web Search Reference]**
  - Refer to the **Featured Interaction Research (Google Search Results)** section in the user message for real-world interaction design ideas and case studies
  - Use these search results as creative inspiration to enrich your interaction designs with proven, innovative approaches
  - Adapt and customize the referenced ideas to fit this specific event's theme, scale, and audience

  **[Speaker Reference Constraints]**
  - All speaker roles referenced in this chapter must originate from the preceding "Event Guest Speaker Proposal" chapter
  - Do not introduce roles or titles not previously defined in the speaker chapter
  - When referencing roles, use the original wording from the speaker chapter's "Role" column

  **[Quantity Rule]**: Design exactly 1-2 featured interactions for half-day events or 2-3 for full-day events. Each featured interaction should be a distinct, standalone session with a creative name. Do NOT design more than the quantity limit — quality over quantity.

  Possible directions to choose from (pick only 1-3, do NOT design all):
  - Panel discussion with unique guiding format
  - Deep interaction / co-creation session
  - Networking session with creative mechanics

  ### Chapter 5: Event Highlights and Distribution Points

  #### 5.1 Deep Experience Design

  Design 1-2 elements that leave a lasting impression on attendees.

  #### 5.2 Word-of-Mouth Distribution Points

  Design word-of-mouth distribution points suited for small events (not pursuing mass exposure; pursuing targeted reputation).

  ### Chapter 6: Execution Reminders

  #### 6.1 Venue Setup Key Points
  - Seating arrangement (roundtable/U-shape, etc.)
  - Networking space design

  #### 6.2 MC Facilitation Key Points
  - How to control the flow
  - How to engage quiet attendees
  - How to handle overtime

  #### 6.3 Risk Response

  | Risk | Response Plan |
  |------|---------------|
  | Dead air | xxx |
  | Overtime | xxx |
  | Last-minute speaker cancellation | xxx |

  ---

  ## Quality Checklist

  ### Small Event Specific Checks

  - [ ] Is the panel discussion/workshop the core session?
  - [ ] Does networking time reach 40% or more?
  - [ ] Does every attendee have participation opportunities?
  - [ ] Is there closed-door/exclusive content design?
  - [ ] Does seating promote equal dialogue?
  - [ ] Is flexibility built in for real-time adjustments?
  - [ ] Are speakers willing to participate in deep interaction?

  ### General Checks

  - [ ] Agenda structure is sound with appropriate pacing
  - [ ] Content depth matches audience level
  - [ ] Speaker configuration is clear and actionable
  - [ ] Clear highlight sessions exist
  - [ ] Execution details are specific and implementable
  - [ ] Avoid using "first-ever," "inaugural," or "first time" — keep event descriptions universal and reusable
  - [ ] Event positioning should be extensible for series-based operations

  ### Featured Interaction Consistency Check (MANDATORY)

  Count and compare before finalizing output:
  - [ ] Count the number of featured interactions defined in Chapter 4: N
  - [ ] Count the number of sessions in the agenda that use creative naming, branded concepts (e.g., 「xx」/【xx】/"xx"), or novel interaction formats: M
  - [ ] Verify N = M. If M > N, remove the extra creative sessions from the agenda or convert them to standard naming. If M < N, add the missing featured interactions to the agenda.
  - [ ] Verify every session in the agenda marked as featured interaction has a matching entry in Chapter 4
  - [ ] Verify all non-featured-interaction sessions use plain, conventional names
  - [ ] Verify the Format column does not contain "Featured Interaction" or "特色互动" — use specific format names instead (e.g., Workshop, Panel Discussion, Fireside Chat)

  ---

  ## Small Event Design Principles Summary

  | Principle | Description |
  |-----------|-------------|
  | Depth over breadth | Better to cover fewer topics thoroughly than many superficially |
  | Dialogue over presentation | Reduce one-way delivery; increase two-way exchange |
  | Participation over observation | Make everyone a contributor |
  | Flexibility over rigidity | Adjust in real-time based on audience response |
  | Relationships over content | Content is the vehicle; relationships are the purpose |
  | Quality over quantity | 50 people in deep conversation beats 500 in surface-level interaction |

  ---

  ## Begin Work

  Based on the parameters provided by the user, generate a professional, deep, and highly interactive small event content design proposal.

  **Requirements:**
  1. Panel discussion/workshop as the core format
  2. Networking time accounting for 40%+
  3. Design deep interaction sessions
  4. Highlight content value
  5. Venue setup supports equal dialogue
  6. Build in flexibility for real-time adjustments

