  | [Session 2] | X people | Keynote/Panel/Host, etc. | Brief core requirements |
  | ... | ... | ... | ... |

  **【嘉宾生成约束规则】**
  - 若 {{featuredGuest}} 有值，则「候选方向」必须基于 {{featuredGuest}} 中提供的嘉宾类别展开，不得自行新增无关类别
  - 若 {{featuredGuest}} 为空，则根据活动主题和受众自由推断合适的嘉宾方向
  - 禁止编造具体姓名，使用描述性画像代替

  - 「角色」列的头衔必须直接来源于 {{featuredGuest}} 中的类别名称或其简化表达，
  禁止根据环节名称自行创造与 {{featuredGuest}} 无关的头衔

  ### 3.2 Detailed Speaker Recommendations for Each Session

  #### [Session 1 Name] - Speaker Recommendations

  **Speaker Requirements: X people**

  **Recommendation Plan Table**

  | Candidate Direction | Speaker Profile Description | Recommendation Reason | Specific Candidate Examples | Invitation Difficulty |
  |----------|-------------|----------|-------------|----------|
  | Direction 1 | Position/Background/Field/Representative works/Influence | Why suitable/What value can bring/Alignment with theme | CEO of XX Company/Founder of XX Project | High/Medium/Low |
  | Direction 2 | Position/Background/Field/Representative works/Influence | Why suitable/What value can bring/Alignment with theme | Partner at XX Institution/XX Expert | High/Medium/Low |

  **Speaker Recommendation Explanation**

  Explain in detail with 2-3 paragraphs:

  **Direction 1: [Candidate Direction Name]**

  - **Profile details**: Detailed description of this type of speaker's background, experience, achievements, influence scope
  - **Match analysis**: Why is this type of speaker most suitable for this session? What unique value can they bring? What are the alignment points with event theme and target audience?
  - **Specific examples**: List 2-3 specific candidates matching the profile, explain their representativeness
  - **Invitation strategy**: How to invite this type of speaker? What resources or relationships needed? How long expected to take?

  **Direction 2: [Candidate Direction Name]**

  - **Profile details**: Detailed description of this type of speaker's background, experience, achievements, influence scope
  - **Match analysis**: Why is this type of speaker suitable as backup? What are their advantages and differences from Direction 1?
  - **Specific examples**: List 2-3 specific candidates matching the profile
  - **Invitation strategy**: Invitation difficulty and feasibility analysis

  **Special Notes**

  - For panel discussions, explain how 4 speakers form a diverse and complementary configuration
  - For opening remarks, explain why this level of speaker was chosen
  - If there are special requirements, explain here

  ---

  ## IV. Featured Interaction Design

  **【嘉宾引用约束规则】**
  - 本章节涉及的所有嘉宾角色，必须来源于前置「活动受邀嘉宾」章节中已定义的角色
  - 禁止新增未在嘉宾章节出现过的角色或头衔
  - 引用角色时，使用嘉宾章节「角色」列的原始表述

  Refer to the featured interaction design in the industry knowledge base.

  ---

  ## V. Event Highlights and Shareable Moments

  ### 5.1 Memorable Moment Design

  List 1-3 designs that leave deep impressions on attendees, such as launch ceremonies, surprise sessions, unique experiences, etc.

  ### 5.2 Shareable Moment Planning

  List 1-3 content points suitable for social media sharing, such as quotable lines, visual impact, interactive moments, etc.

  ---

  ## VI. Execution Reminders

  ### 6.1 Technical Equipment Reminders

  - **Screen projection demo**: If event involves projection sessions (speech PPT, Demo presentation, video playback, etc.), please bring your own HDMI cable, venue may not provide
  - **Backup plan**: Recommend also preparing Type-C to HDMI adapter to accommodate different devices

  ### 6.2 Risk Contingency Plan

  | Risk Description | Response Plan |
  |---------|---------|
  | Risk 1 | Contingency 1 |
  | Risk 2 | Contingency 2 |

  ---

  ## Quality Checklist

  Before output, ensure:

  ### Agenda Reasonableness

  - Session design matches event format (online/offline/hybrid)
  - Online events have adjusted session durations and interaction methods
  - Hybrid events have specified how online audience can participate
  - Total duration matches user input event duration
  - Short sessions (opening, introductory) controlled within 15-30 minutes
  - Long sessions (keynote, demo, discussion) controlled within 1 hour
  - Full-day events schedule one tea break/rest (usually in afternoon)
  - Social time at least 20%
  - Has clear climax session

  ### Content Relevance

  - Content depth matches core audience level
  - Session design serves event objectives
  - Industry-specific elements reasonably integrated
  - Speaker profiles clear and match session requirements

  ### Execution Feasibility

  - Session transitions natural, not abrupt
  - Speaker recommendation directions clear and feasible
  - Buffer time reserved for contingencies
  - Interaction design specific and executable

  ### Highlight Check

  - At least 1 "memorable moment" session
  - Has shareable content/moments
  - Attendees have concrete takeaways

  ### Text Description Completeness

  - Agenda has clear overall description
  - Each session has detailed text description
  - Explained why arranged this way
  - Highlighted event pacing and highlights

