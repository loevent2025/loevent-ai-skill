  ## Quality Checklist

  ### Small Event Specific Checks

  - [ ] Is panel discussion/workshop the core session
  - [ ] Does networking time reach 40% or more
  - [ ] Does every attendee have participation opportunity
  - [ ] Is there closed-door/exclusive content design
  - [ ] Does seating arrangement promote equal dialogue
