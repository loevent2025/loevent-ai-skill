  | VIP Seating |  Front row/main table |  Priority area | - | - |
  | Targeted Matchmaking | 10 target guests | 5 target guests | 2 target guests | - |
  | Attendee List |  Complete version |  Desensitized version |  Industry distribution | - |
  | VIP Dinner/Social |  Priority invitation |  Invitation | - | - |
  | Follow-up Community |  Admin privileges |  Priority entry |  Entry qualification |  Entry qualification |

  ### Promotion Benefits

  | Benefit Item | Premier/Co-host | Strategic Partner | Supporting Partner | Promotion Partner |
  |-------|-------------|---------|---------|---------|
  | Event Announcement |  Joint release |  Key mention |  List mention |  Repost mutual promotion |
  | Event Coverage |  In-depth mention |  Key mention |  List mention |  Media coverage |
  | Community Push |  3+ times |  2 times |  1 time |  Mutual promotion |
  | Content Authorization |  Priority use |  Can use |  Can use |  Can use |

  ---

  ##  Medium Event Output Format

  ### Chapter Structure

  #### Chapter 1: Cooperation Strategy Overview

  - 1.1 Cooperation Goal Positioning
    - Explain core objectives (cost sharing primarily/brand endorsement/resource integration)
    - Quantifiable goals (e.g., seek 1 core partner to bear 30% costs + 3-5 resource supporting partners)
  - 1.2 Partner Tier Planning
    - List quantity, investment requirements, core benefits for each tier in table format
    - Explain differentiated value between tiers

  #### Chapter 2: Partner Recommendations

  - 2.1 Core Partner Direction (Premier/Co-host level)
    - Target profile: What type of enterprise is suitable as core partner
    - Recommended directions: 3-5 specific institution names or types
    - Cooperation entry points: Why they would be interested
    - Expected investment and return analysis
  - 2.2 Strategic Partner Direction
    - Recommend by industry/type grouping
    - 2-3 specific directions per group
  - 2.3 Supporting Partner Direction
    - Material support (refreshments, gifts, prizes)
    - Venue/equipment support
    - Content/guest support
  - 2.4 Media and Community Partners
    - Industry media recommendations
    - Vertical community recommendations
    - Resource exchange method explanation
  - 2.5 Regional Adaptation Notes
    - Local partner proportion recommendations
    - Regional special resource tips

  #### Chapter 3: Benefits Plan Details

  - 3.1 Benefits Details by Tier
    - Detail all benefits separately by tier
    - Quantify each benefit (e.g., "Logo size not less than XxX cm", "Speech duration 20 minutes")
  - 3.2 Benefits Comparison Summary Table
    - Complete comparison table, convenient for external display
  - 3.3 Optional Value-added Benefits
    - List optional benefit options that can be provided additionally

  #### Chapter 4: Execution Recommendations

  - 4.1 BD Priority Ranking
    - First priority: Core partners (who/why)
    - Second priority: Strategic partners (in order)
    - Third priority: Resource partners
  - 4.2 Communication Strategy Recommendations
    - Core partners: Customized proposal, senior-level engagement
    - Strategic partners: Standard proposal + flexible adjustment
    - Resource partners: Clear exchange conditions
  - 4.3 Cooperation Copy Examples
    - 2-3 social media cooperation copy examples
    - Script key points tips
  - 4.4 Risk Alerts and Considerations
    - Timeline requirements
    - Benefits fulfillment considerations
    - Common issue responses

  ---

  ##  Medium Event Quality Checklist

  ### Required Checks

  - [ ] Total number of partners within 9-19 range
  - [ ] Set core partner tier with reasonable investment requirements
  - [ ] Benefits are data-driven and quantifiable (attendance, duration, size, frequency, etc.)
  - [ ] Clear differences between tier benefits, clear value perception
  - [ ] Includes both cash + resource cooperation models
  - [ ] Promotion benefits are specific and executable

  ### Tier Checks

  - [ ] Number of tiers is 3-4, not exceeding 5
  - [ ] Tier names match investment (neither inflated nor undervalued)
  - [ ] Reasonable quantity per tier (core tier 0-1, strategic tier 1-3, support tier 3-5, promotion tier 3-5)

  ### Benefits Checks

  - [ ] Core partners have "exclusive" or "top priority" benefits
  - [ ] Reasonable allocation of core benefits like speeches/booths
  - [ ] No "benefit inflation" (low investment receiving high-value benefits)
  - [ ] Resource exchange partners' benefits match contributions

  ### Prohibited Items

  - [ ] Do not promise unfulfillable benefits
  - [ ] Do not use vague expressions (such as "massive exposure", "widespread promotion")
  - [ ] Do not set more than 5 tiers
  - [ ] Do not give core speech benefits to resource exchange partners

  ---

  ## Example Output Reference

  ### Partner Invitation Script Examples

  **Core Partner Invitation:**

  > We are preparing [Event Name], expecting to invite 150 [audience description] to participate. As a [partner positioning description] in the industry, we hope to invite your company as a co-organizer for deep participation. Core benefits include: brand co-presentation, 20-minute keynote speech, premium booth, targeted matchmaking with 10 target clients, etc. We have prepared a customized cooperation proposal and look forward to detailed communication with you.

  **Strategic Partner Invitation:**

  > [Event Name] will be held on [date] at [location], focusing on [theme], with approximately 150 [audience description] participating. We have prepared 15-minute speech opportunities, standard booth, 5 targeted matchmaking opportunities and other benefits for strategic partners. If interested, we can arrange detailed communication.

  ### Social Media Cooperation Copy Examples

  **Co-organizer:**

  > We are pleased to announce [Partner Name] as co-organizer of [Event Name]! As a leading enterprise in [partner field], [Partner Name] will share cutting-edge insights on [theme] at the event. Looking forward to seeing everyone on [date]!

  **Strategic Partner:**

  > Thank you [Partner Name] for becoming a strategic partner of [Event Name]! [Partner Name] will bring exciting sharing on [theme] at the event and set up a booth on-site. Looking forward to exchanges with everyone.

