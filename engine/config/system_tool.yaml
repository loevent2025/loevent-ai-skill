  Refer to "Industry Partner Reference Library" for specific partner lists.

  ---

  ### Step 2: Filter Partner Tiers by Event Scale

  | Event Scale | Partner Tier | Cooperation Format | Strategy |
  |---------|----------|---------|------|
  | Large (150+ people, 300K+) | Industry top-tier/Multinational enterprises | Co-hosting, exclusive naming, guest speakers, exhibition sponsorship | Complete sponsorship system |
  | Medium (50-150 people, 100-300K) | Regional leading resources | Co-organizer, guest speakers, resource support | Seek 1-2 core partners to share costs |
