  | 09:00-09:30 | Check-in + Morning Social | 30min | Casual networking |
  | 09:30-09:40 | Previous Day Recap | 10min | MC bridging |
  | 09:40-10:40 | Workshop Session | 60min | Hands-on practice |
  | 10:40-11:00 | Tea Break | 20min | Cross-group exchange |
  | 11:00-11:40 | Outcome Showcase | 40min | Group presentations |
  | 11:40-12:00 | Summary + Group Photo | 20min | Closing |
  | 12:00-13:30 | Lunch + Open Networking | 90min | Deep social |

  ---

  ## Mid-Scale Event Interaction Design

  ### Conference Interaction Formats

  | Interaction Type | Applicable Session | Notes |
  |-----------------|-------------------|-------|
  | Live Polling | Presentations/Panels | App or show of hands |
  | Comment Wall | Throughout event | Real-time display |
  | Q&A Collection | Post-presentation | App-based questions + upvoting |
  | Check-in Photo | Tea breaks/Exhibition | Designated photo spots |
  | Raffle | Before closing | Boost engagement |

  ### Networking Facilitation Mechanisms

  | Mechanism | Description |
  |-----------|-------------|
  | Badge Tags | Mark role/interests for easy icebreaking |
  | Business Matching | Systematic matching + fixed time slots |
  | Themed Lunch Tables | Grouped by topic |
  | Exhibition Passport | Stamp collection to encourage booth visits |
  | Community Sub-Groups | Interest-based sub-communities |

  ---

  ## Mid-Scale Event Pacing Control

  ### Energy Curve Design

  ```
  09:00 Check-in: Low energy (gradual warm-up)
  ↓
  09:30 Opening: Energy rising (strong opening)
  ↓
  10:30 Keynotes: High energy (core content)
  ↓
  11:00 Tea Break: Energy adjustment (social relaxation)
  ↓
  11:30 Panel: High energy (morning climax)
  ↓
  12:00 Lunch: Low energy (rest and recharge)
  ↓
  14:00 Breakout Sessions: Medium energy (deep content)
  ↓
  15:30 Tea Break: Energy adjustment
  ↓
  16:00 Panel Discussion: Energy rising
  ↓
  17:00 Closing: High energy (final highlight)
  ↓
  17:30 Party: Relaxed energy (open networking)
  ```

  ### Mid-Scale Event Pacing Key Points

  | Principle | Description |
  |-----------|-------------|
  | Morning marquee | Schedule top speakers in the morning |
  | Smooth afternoon | Start with lighter content post-lunch |
  | Track selection | Give attendees choices |
  | Ample breaks | Tea breaks ≥20 minutes |
  | Strong closing | End with a powerful sense of accomplishment |

  ---

  ## Mid-Scale Event Speaker Configuration

  ### Recommended Speaker Counts

  | Event Duration | Recommended Count | Notes |
  |---------------|------------------|-------|
  | Half-day | 6-10 | 2-3 presentations + 4-5 panelists |
  | Full-day single-track | 10-15 | 4-5 presentations + 2 panels |
  | Full-day multi-track | 15-25 | Including breakout session speakers |

  ### Speaker Tier Configuration

  | Tier | Count | Role | Notes |
  |------|-------|------|-------|
  | Marquee Speakers | 1-2 | Opening/closing keynotes | Industry top figures |
  | Core Speakers | 3-5 | Keynotes/panel moderators | Domain experts |
  | Professional Speakers | 5-10 | Panels/breakout sessions | Front-line practitioners |
  | MCs | 2-3 | Main stage and breakout rooms | Strong moderation ability |

  ### Panel Speaker Configuration Principles

  **Optimal 4-5 Person Panel:**

  - 1 industry leader (anchor)
  - 2 experts from different backgrounds (perspective exchange)
  - 1 emerging voice/challenger (fresh perspective)
  - 1 moderator (process control)

  ---

  ## Thinking Order vs Output Order

  **CRITICAL**: Your internal thinking order and your output order are DIFFERENT.

  **Step 1 — Think first (do NOT output yet)**: Internally decide the exact featured interactions for Chapter 4. Determine their names, formats, and quantity based on event duration:
  - Half-day event (3-4 hours): 1-2 featured interactions
  - Full-day event (6-9 hours): 2-3 featured interactions
  - Multi-day event: 2-3 featured interactions per day
  Hold these in mind before writing any output.

  **Step 2 — Output in document order**: Now write the full document starting from Chapter 1 (Event Agenda). When writing the agenda, embed the pre-decided featured interactions as named sessions. All other sessions must use standard naming and formats.

  This ensures the agenda and Chapter 4 are perfectly consistent because you already know the featured interactions before writing the agenda.

  ## Output Structure

  ### Event Agenda

  **[Fixed Title — Do Not Modify]** → `{{title_agenda}}`

  **[Output Rules]**
  - **Single-day events**: Output one agenda table
  - **Multi-day events**: All days merged into one table with column-spanning date separator header rows (e.g., Day 1 - Date · Day Theme); header rows use colspan or bold to span all columns, formatted as follows:

  | **Day 1 - [Date] · [Day Theme]** | | | |
  | Session Name | Start Time | End Time | Format |
  | ... | XX:XX | XX:XX | ... |
  | **Day 2 - [Date] · [Day Theme]** | | | |
  | Session Name | Start Time | End Time | Format |
  | ... | XX:XX | XX:XX | ... |

  **Breakout Session Agenda (if applicable)**

  | Time | Track A | Track B |
  |------|---------|---------|
  | XX:XX-XX:XX | [Session] | [Session] |

  **[Featured Interaction in Agenda — CRITICAL RULES]**

  **Rule 1 — One-to-one consistency**: The agenda and Chapter 4 must be strictly consistent. Every featured interaction in Chapter 4 MUST appear in the agenda as a named session, and every creative/interactive session in the agenda MUST be defined in Chapter 4. If a session uses creative naming, branded concepts, or novel interaction mechanics, it MUST have a corresponding entry in Chapter 4. If it doesn't exist in Chapter 4, it should NOT appear in the agenda as a creative session.

  **Rule 2 — Regular sessions use standard format**: All sessions that are NOT defined in Chapter 4 as featured interactions must use plain, conventional event session formats and naming (e.g., keynote, panel, tea break, lunch, opening remarks, closing). Do not add creative interaction mechanics, branded concepts, or artistic naming to these regular sessions.

  **Rule 3 — Quantity control**: The total number of featured interaction sessions in the agenda must exactly match the number defined in Chapter 4. For reference: half-day events should have 1-2, full-day events 2-3, multi-day events 2-3 per day. All remaining sessions must be standard formats. If you count more creative/interactive sessions in the agenda than what Chapter 4 defines, you are violating this rule.

  **Rule 4 — Format column must use specific format descriptors**: The Format column in the agenda table must always use concrete session format names (e.g., Workshop, Panel Discussion, Keynote, Fireside Chat, Lightning Talk, Networking, etc.). Do NOT use generic labels like "Featured Interaction" or "特色互动" in the Format column — always specify the actual interaction format.

  ---

  ### Agenda Description

  #### Event Attendee Profile

  **[Fixed Title — Do Not Modify]** → `{{title_attendee_profile}}`

  | Tier | Audience Type | Proportion | Core Needs | Attendance Value |
  |------|--------------|------------|------------|------------------|
  | Core Audience | xxx | 60% | xxx | xxx |
  | Secondary Audience | xxx | 25% | xxx | xxx |
  | Extended Audience | xxx | 15% | xxx | xxx |

  **[Audience Type Guidelines]**
