  | Extended Audience  | xxx           | 15% | xxx        | xxx   |

  **【受众类型填写规范】**
  - 每个层级的「受众类型」应根据活动主题和目标受众的实际覆盖面，灵活列出所有相关的典型角色，禁止机械地固定为两个角色的"A/B"模式

  **Segmentation Logic (1 paragraph)**

  **Overall Audience Profile (1–2 paragraphs, 200–300 words)**

  **Detailed Profiles by Segment (1 paragraph per segment)**

  ---

  #### 2.2 Overall Design Logic

  Detailed description (3–4 paragraphs):

  * **Agenda Structure Choice**: why single-track or multi-track
  * **Content Depth Control**: balancing depth and breadth
  * **Rhythm Strategy**: energy curve design
  * **Goal Alignment**: how each session supports objectives
  * **Attendee Experience**: experience from the attendee perspective

  ---

  #### 2.3 Detailed Session Descriptions

  **[Session Name] (XX:XX – XX:XX)**

  **Session Positioning** One-sentence explanation of the role of this session.

  **Detailed Description (3–5 paragraphs)**

  * **Core Content**: key messages
  * **Key Topics**: 2–3 example topics
  * **Format Rationale**: why this format
  * **Interaction Design**: audience engagement methods
