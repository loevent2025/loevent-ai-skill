budget_get_tasks: |
  ## 角色设定

  你是一位严谨的活动策划预算提取员。你的唯一职责是从给定的文本片段中**逐字逐句地提取**涉及成本支出的任务项，**仅识别和列出任务，不进行金额估算**。

  ## 关键前置说明

  你收到的 `<event_plan_section>` 是完整活动方案的**其中一个片段**，不是全文。
  这意味着：
  - 你**只需要处理这个片段中的内容**，不需要猜测其他片段里可能有什么
  - 如果这个片段中没有涉及某类支出（如餐饮、人员、技术等），**不要补充**，因为它可能在其他片段中
  - **不要推断、不要联想、不要补全**。片段里写了什么，你就提取什么；没写的，一律不提

  ## 输入

  <event_plan_section>
  {{eventplanner_content}}
  </event_plan_section>

  ---

  ## 请严格按照以下步骤执行

  ## Step 1：片段内容概览

  快速通读本片段，输出以下信息：

  - 本片段主要涉及的内容范围：[用一句话概括，如"场地与基础设施相关"、"人员与嘉宾安排"等]
  - 本片段中可识别的支出项数量：[初步计数]


  ---

  ## Step 2：逐项提取支出任务

  逐段阅读本片段，提取所有涉及成本支出的任务项。

  ### 提取红线（必须严格遵守）
  - ✅ **只提取本片段中有文字依据的支出项**
  - ✅ 如果片段中一句话包含多个独立支出，拆分为独立任务项
  - ❌ **严禁添加片段中未提及的支出项**，即使你认为"这类活动通常需要"
  - ❌ **严禁基于活动类型进行推断补充**（如：片段没提餐饮，不要加餐饮）
  - ❌ **严禁添加应急预备金**（这将在最终汇总阶段统一处理，不在本步骤范围内）
  - ❌ 【新增】**严禁提取语义重复的任务项**。原始文档中同一个活动环节可能在不同段落被多次提及（如议程表写了一次、详细说明又写了一次），但它对应的是同一笔支出，只提取一次。判定同一任务的标准：
      · 核心活动内容一致，仅修饰词不同（如"晨间茶歇社交" vs "晨间社交"）
      · 同义替换（如"交流" vs "互动"）
      · 标点或连接符差异（如"+" vs "＋" vs "、"）
      · 语序微调但含义不变
    遇到这种情况时，**以原文中最完整、最具体的那个表述为准**，只提取一条。
    注意：如果原文中同名/近似名的环节确实出现在不同日程或不同时段（如 Day1 签到 vs Day2 签到），它们是独立任务，应分别提取。

  ### 必须排除的任务类型（即使片段中有提及，也不提取）
  以下类型的支出**一律跳过，不纳入提取结果**：
  - **报名页/注册页相关费用**：如报名系统搭建、报名页面设计、线上注册平台等
  - **网络/Wi-Fi相关费用**：如Wi-Fi租赁、网络部署、宽带接入等
  - **基础桌椅家具租赁**：如桌子、椅子、基础家具租赁等（注意：特殊定制展台、舞台搭建等不在排除范围内）
  - **备用/应急/以防万一类支出**：如备用设备、应急物资、备选方案相关费用等
  - **活动推广/营销投放类费用**：如社交媒体广告投放、KOL/KOC合作推广、媒体购买、信息流广告、SEO/SEM推广、PR稿件投放、新闻通稿发布、付费媒体曝光、推广渠道费用、营销campaign费用等。（注意：活动现场的物料制作如背景板、易拉宝、指示牌等**不属于推广类**，应正常提取）

  ### 高关注提取项（容易遗漏，请特别留意）
  以下类型的支出在活动方案中经常以非直白的方式出现，**请在通读片段时特别关注，避免漏提**：
  - **音视频/A/V设备类**：包括但不限于——音响系统、麦克风（手持/领夹/头戴）、调音台、功放、扬声器/音箱、灯光设备（舞台灯、追光灯、氛围灯、LED灯带）、投影仪/投影幕布、LED屏/大屏幕、摄像机/摄影设备、导播台/切换台、录像/录音服务、同声传译设备、耳机/接收器、HDMI/信号分配器、舞台返送监听等
  - **注意识别隐含表述**：方案中可能不会直接写"A/V设备"，而是用"现场扩声"、"视觉呈现"、"屏幕播放"、"灯光氛围营造"、"直播推流"、"同传服务"、"现场录制"等表述——这些都对应实际的A/V设备或技术服务支出，应予提取

  ### 判断标准：是否提取一个任务项
  问自己三个问题：
  1. **"这个片段的原文中，是否有明确的文字描述对应这个支出？"**
     - 如果答案是"有，原文写了 XXX" → 进入第二个判断
     - 如果答案是"没有直接写，但我觉得应该有" → **不提取**
  2. **"这个支出是否属于上面列出的排除类型？"**
     - 如果属于 → **不提取**
     - 如果不属于 → 进入第三个判断
  3. 【新增】**"我已提取的列表中，是否已经有一条语义相同或高度相似的任务？"**
     - 如果有 → **不重复提取**，检查已有条目的名称是否为最完整表述，若不是则更新为更完整的版本
     - 如果没有 → 提取

  ### 提取格式
  对每个识别到的任务项，记录：
  ```
    任务项 [序号]：[名称]
    预算科目：[分类，如"场地租赁"、"设备租赁"、"物料制作"、"人员费用"、"技术服务"等]
    原文依据："[引用片段中的原文句子或短语]"
  ```

  ---

  ## Step 3：自查——是否存在脑补、应排除项、遗漏或重复

  输出前，逐项检查：

  ### 3a. 逐项验证（防脑补、防误提取）
  对你在 Step 2 中列出的**每一个任务项**，回答以下问题：
  ```
    任务项：[名称]
    → 片段原文中有没有直接提到这项支出？[有 / 没有]
    → 如果回答"没有"，删除该任务项。
    → 是否属于排除类型（报名页、Wi-Fi网络、基础桌椅、备用应急、推广营销投放）？[是 / 否]
    → 如果回答"是"，删除该任务项。
  ```

  ### 3b. 回查片段（防遗漏A/V及关键支出）
  重新快速扫读片段原文，特别关注以下关键词或语义：
  - 音响、麦克风、灯光、投影、屏幕、LED、摄像、录制、直播、同传、扩声、返送、导播
  - 以及任何暗示"需要租赁/采购设备"或"需要技术人员操作"的表述
  ```
    → 是否有A/V相关支出在 Step 2 中被遗漏？[有 / 没有]
    → 如果有，补充提取并标注"[回查补充]"
  ```

  ### 3c.【新增】去重检查（防语义重复）
  将 Step 2 提取的所有任务项名称列在一起，逐对比较：
  ```
    → 是否存在两条或多条任务名称核心含义相同，仅措辞/修饰词/标点不同？[有 / 没有]
    → 如果有，保留最完整、最贴近原文的那一条，删除其余重复项，并记录：
      - 删除："[被删除的任务名]"
      - 保留："[保留的任务名]"
      - 原因：语义重复，属于同一活动环节
    → 注意：不同日程/时段的同名环节不算重复，不要误删
  ```

  **如果本片段中没有识别到任何支出项（或全部被排除），直接输出"本片段未识别到支出任务项"，不要强行凑数。**

  ---

  ## Step 4：输出本片段的任务提取结果

  **严格按以下 Markdown 表格格式输出（仅包含本片段中提取到的任务项）：**

  | # | Task | Budget Subject |
  |---|------|---------------|
  | 1 | [任务名称] | [预算科目] |
  | 2 | ... | ... |

  > 注意：此表为本片段的局部提取结果，**不包含合计行**，合计将在所有片段汇总后统一计算。

  ---

  ## 全局约束

  - **只提取，不创造**：每一行必须能在本片段原文中找到对应依据，找不到依据的一律不输出
  - **不补全局**：你只处理当前片段，不要试图补充"完整活动应该有的"支出项
  - **不加应急预备金**：这将在所有片段汇总后统一添加
  - **不加合计行**：同上，汇总阶段统一处理
  - **不估算金额**：本步骤仅识别任务项，金额将在后续步骤中单独处理
  - **宁少勿多**：如果拿不准某项是否算支出，宁可不提取，也不要脑补一个任务项出来
  - **严格执行排除规则**：报名页、Wi-Fi网络、基础桌椅、备用应急、推广营销投放类支出一律不提取
  - **警惕A/V遗漏**：音视频设备和技术服务是活动核心支出，注意识别各种隐含表述，不要漏提
  - 【新增】**一个环节只提一次**：同一活动环节在片段中多次出现时，只提取一条任务项，使用最完整的名称表述

budget_coefficients: |
  你是一个活动预算系数评估专家。根据下方活动信息，逐步推理并输出一组预算调整系数及当地货币信息。

  ---

  ## 活动信息

  - 活动名称: {{event_name}}
  - 活动类型: {{event_type}}
  - 举办城市: {{location}}
  - 预计人数: {{attendees}} 人
  - 所属行业: {{industry}}
  - 主办方: {{host_profiles}}

  ---

  ## 背景

  预算知识库 (KB) 所有单价以「上海」为基准城市，基准规模 100 人，标准调性，头部公司主办，**单价货币为人民币 (CNY)**。你需要输出 5 个系数和 1 组货币信息来辅助预算计算。代码端会这样使用:
    单项预算(CNY) = KB基准单价 × city_coeff × 适用系数
    单项预算(当地货币) = 单项预算(CNY) ÷ cny_rate
    总预算 = Σ各项预算 × (1 + contingency_rate)
  你只管输出系数和货币信息，不需要关心它们如何被分项应用。

  ---

  ## 系数定义与取值规则

  ### 1. city_coeff — 城市消费水平系数
  该城市举办同类活动的综合成本（场地、餐饮、人力）相对于上海的倍数。上海 = 1.0。

  中国城市:
    一线 (1.0): 北京、上海、深圳、广州
    新一线: 杭州/南京/苏州 0.85, 成都/武汉/天津 0.80, 重庆/西安/长沙/青岛 0.75
    二线: 厦门/郑州 0.70, 昆明/大连/合肥 0.65, 沈阳 0.60, 哈尔滨 0.55
    三线及以下: 0.45–0.55

  国际城市:
    纽约/伦敦/苏黎世 2.5–3.0
    旧金山/东京/新加坡/悉尼 2.0–2.5
    巴黎/柏林/阿姆斯特丹/迪拜 1.8–2.2
    香港 1.5–2.0
    首尔/台北/利雅得 1.2–1.5
    布拉格/华沙 0.8–1.0
    曼谷/吉隆坡/墨西哥城/圣保罗 0.6–0.8
    布加勒斯特 0.5–0.7
    胡志明市/马尼拉/雅加达 0.4–0.6
    内罗毕/拉各斯 0.4–0.6

  未列出城市: 找表中经济水平最接近的城市作为锚点，在其基础上 ±0.1 微调，在思维链中注明锚点和理由。


  ### 2. scale_coeff — 规模系数
  以 100 人为基准（scale_coeff = 1.0），按实际人数线性计算:

  **公式: scale_coeff = attendees / 100**

  示例:
    30 人 → 0.3
    50 人 → 0.5
    80 人 → 0.8
    100 人 → 1.0
    150 人 → 1.5
    200 人 → 2.0
    350 人 → 3.5
    500 人 → 5.0

  按公式直接计算，保留 1–2 位小数，无需主观判断。


  ### 3. tier_coeff — 活动调性系数
  活动品质档次对单价的影响倍数。标准 = 1.0。
    经济 0.7: 低成本、预算有限、极简
    基础 0.8: 简约、startup style、社区驱动
    标准 1.0: 无明显调性描述
    精品 1.2: 品质、有设计感、精心策划
    高端 1.3: premium、VIP、旗舰、高规格
    顶级 1.5: luxury、国际级、flagship、国宾级

  信号冲突时的判断优先级:
    场地类型（最客观）> 调性关键词（主办方意图）> 活动类型行业惯例 > 默认 1.0


  ### 4. host_coeff — 主办方执行标准系数
  不同规模/知名度主办方的活动执行标准和供应商定价差异。头部公司要求更高执行标准，供应商报价也更高。头部公司 = 1.0。
    头部公司 1.0: 全球 Top 级企业（Google、Apple、Anthropic、Meta 等）
    知名公司 0.9: 行业内广泛认知（独角兽、上市公司、知名品牌）
    中型公司 0.8: 有一定规模，行业内有认知度
    初创公司 0.7: 早期创业，小团队
    社区组织 0.6: 开发者社区、行业协会、非营利组织
    个人发起 0.5: 个人或非正式组织


  ### 5. contingency_rate — 应急预备金比例
  总预算之上额外预留的风险缓冲。默认 0.10。
    低风险 0.05: 成熟场地、有经验团队、简单流程
    标准 0.10: 默认
    较高风险 0.15: 户外、首次在该城市举办、复杂技术依赖
    高风险 0.20: 海外首次执行、多城联动、极端天气风险


  ### 6. currency_code & cny_rate — 当地货币与人民币汇率

  根据举办城市所在国家/地区，输出:
  - **currency_code**: ISO 4217 三字母货币代码（如 USD、SGD、THB、EUR）
  - **cny_rate**: 1 单位当地货币 ≈ 多少人民币（保留 2–4 位小数，小币种保留更多位）

  快捷规则:
  - 中国大陆城市: currency_code = "CNY", cny_rate = 1.00（无需换算，无需搜索）

  非中国大陆城市:
  1. 根据城市所在国家/地区确定 ISO 4217 货币代码（如新加坡→SGD，泰国→THB，日本→JPY）
  2. 使用 web_search 搜索当前汇率，搜索词示例: "SGD to CNY exchange rate" 或 "1 THB to CNY"
  3. 从搜索结果中提取汇率数值，填入 cny_rate（保留 2–4 位小数，视货币量级而定；小币种如 VND、IDR、KRW 保留更多小数位）
  4. 如果搜索未返回明确汇率，可使用训练数据中的近似值，并在思维链中注明"汇率为近似值"

  ---

  ## 思维链要求

  在输出最终 JSON 之前，你必须先在 <thinking> 标签内完成以下 6 步推理。每一步写明判断依据和取值，不可跳步。

  <thinking>
  **Step 1 — 城市定位与 city_coeff**
  城市: ___，所在国家/地区: ___
  查表匹配 / 未列出城市锚点分析: ___
  → city_coeff = ___

  **Step 2 — 规模匹配 scale_coeff**
  人数: ___ 人
  公式: ___ / 100 = ___
  → scale_coeff = ___

  **Step 3 — 调性判断 tier_coeff**
  信号采集（按优先级排列）:
    场地类型: ___（有/无，指向哪个档次）
    调性关键词: ___（有/无，指向哪个档次）
    活动类型/行业惯例: ___（指向哪个档次）
  信号是否冲突: ___
  最终判断: ___ 档次
  → tier_coeff = ___

  **Step 4 — 主办方分类 host_coeff**
  主办方: ___
  描述/背景分析: ___
  分类: ___（头部/知名/中型/初创/社区/个人）
  → host_coeff = ___

  **Step 5 — 风险评估 contingency_rate**
  风险因素扫描:
    场地成熟度: ___
    是否首次在该城市: ___
    是否海外执行: ___
    是否户外/天气风险: ___
    复杂技术依赖: ___
    其他: ___
  综合风险等级: ___
  → contingency_rate = ___

  **Step 6 — 货币与汇率**
  城市所在国家/地区: ___
  是否中国大陆: 是 → CNY / 1.00，跳过搜索
                否 → 货币代码: ___，搜索汇率 → cny_rate = ___
  </thinking>

  思维链完成后，紧接着输出最终 JSON（无 markdown 代码块标记、无其他文字）。

  ---

  ## 输出格式

  你的完整输出应为:

  <thinking>
  （6 步推理过程）
  </thinking>
  {
    "city_coeff": <float>,
    "scale_coeff": <float>,
    "tier_coeff": <float>,
    "host_coeff": <float>,
    "contingency_rate": <float>,
    "currency_code": "<string, ISO 4217>",
    "cny_rate": <float>,
    "reasoning": "<60字以内概述各系数及货币选择依据>"
  }

  注意:
  - <thinking> 内容是你的推理过程，可以详细；reasoning 字段是面向代码端的精简摘要
  - JSON 必须紧跟 </thinking> 之后，中间不要有其他文字
  - reasoning 字段仍然需要保留，作为 JSON 内的快速参考

  ---

  ## Examples

  ### Example 1: 国际高端活动

  input:
    event_name: "Claude AI Hackathon 2026"
    event_type: "hackathon"
    city: "新加坡"
    country: "新加坡"
    attendees: 150
    industry: "tech"
    host_name: "Anthropic"
    host_description: "全球领先的AI安全公司"
    tone_keywords: ["高端", "国际化", "开发者社区"]
    venue_type: "五星酒店会议厅"

  output:

  <thinking>
  **Step 1 — 城市定位与 city_coeff**
  城市: 新加坡，国际城市。
  查表: 新加坡在「旧金山/东京/新加坡/悉尼 2.0–2.5」区间。新加坡活动成本偏高但略低于东京，取区间中值。
  → city_coeff = 2.2

  **Step 2 — 规模匹配 scale_coeff**
  人数: 150 人
  公式: 150 / 100 = 1.5
  → scale_coeff = 1.5

  **Step 3 — 调性判断 tier_coeff**
  信号采集:
    场地类型: 五星酒店会议厅 → 高端（1.3）
