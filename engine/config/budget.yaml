    ## 第二阶段：分布分析与校准
    ─────────────────────────────────

    ### 步骤 2a — 计算历史目标分布
    {% if historical_budgets %}
    历史预算数据已提供。请按以下步骤从中提取类别分布：
    1. 识别历史预算中的每一行项目，提取其**类别**和**金额**。
    2. 按类别汇总金额，计算每个类别占总金额的百分比。
    3. 多份历史预算 → 取各类别百分比的平均值 → 作为「目标分布」。
    4. 单份历史预算 → 直接使用其分布。
    5. 将目标分布作为第二阶段校准的基准。
    {% else %}
    **无历史预算数据。跳过分布校准步骤。**
    直接使用第一阶段匹配到的数据库价格区间作为最终输出，不做分布调整。
    在信号清单 3.4 中标注：「无历史预算参考，价格未经分布校准，建议用户上传历史预算以获得更精准的估算。」
    {% endif %}

    {% if historical_budgets %}
    ### 步骤 2b — 计算原始估算分布
    - 每个任务取中间价 = (price_low + price_high) / 2。
    - 计价单位为「每人」的任务，需乘以参会人数 {{attendee_count}} 换算为总价。
    - 按类别汇总，计算各类别占总额的百分比 → 「原始分布」。

    ### 步骤 2c — 识别偏差
    - 偏差 = 目标分布[类别] − 原始分布[类别]。
    - |偏差| > 5 个百分点 → 标记"需要调整"。

    ### 步骤 2d — 校准价格
    - 占比偏高的类别（原始% > 目标%）→ 推荐价向 price_low 靠拢。
    - 占比偏低的类别（原始% < 目标%）→ 推荐价向 price_high 靠拢。
    - 调整公式：
        调整比率 = 目标百分比 / 原始百分比
        校准价格 = 中间价 × 调整比率
    - 约束：校准价格必须在 [price_low, price_high] 区间内。
      超出则钳位到边界，标注「⚠ 已钳位」。
    - 多个类别钳位且分布仍无法匹配 → 标记为结构性偏差，向用户报告。
    {% endif %}

    本阶段为内部推理步骤，不需要单独输出表格，校准结果直接用于第三阶段。

