  ## Content Expansion Guidance

  **⭐ Focus expansion principle:** All sections must align with {{primary_focus}} narrative thread.

  **Opening trust-building technique:**
  - Don't just name the org — approach from the focus angle to explain credibility
  - Use concrete data (events hosted, attendees served, years in industry) to build authority
  - Let focus entry lead; then transition naturally to org intro

  **Core value expansion technique:**
  - Each benefit point must include specific value explanation — not just a label
