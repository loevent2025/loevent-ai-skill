  ## Medium-Scale Event Content Design Knowledge Base

  ### Agenda Duration Standards (Medium-Scale Events)

  | Session Type        | Duration Range | Notes                                      |
  | ------------------- | -------------- | ------------------------------------------ |
  | Check-in / Warm-up  | 30–45 minutes  | Includes early refreshments / expo preview |
  | Opening Remarks     | 15–20 minutes  | Organizer + key guests                     |
  | Keynote             | 30–45 minutes  | Core content delivery                      |
  | Panel Discussion    | 45–60 minutes  | 4–5 guests + moderator                     |
  | Breakout / Workshop | 60–90 minutes  | In-depth vertical content                  |
  | Coffee Break        | 20–30 minutes  | Includes expo visits                       |
  | Lunch               | 60–90 minutes  | Includes free networking                   |
  | Business Matching   | 30–60 minutes  | Structured 1-on-1                          |
  | Networking          | 60–90 minutes  | Cocktail / dinner networking               |

  ---

  ## Medium-Scale Event Agenda Structures

  ### Structure Selection Guide

  | Event Duration     | Recommended Structure | Notes                            |
  | ------------------ | --------------------- | -------------------------------- |
  | Half-day (3–4 hrs) | Single-track          | Main stage focused, no breakouts |
  | Full day (7–8 hrs) | 1+1 or 1+2            | Main stage + 1–2 breakouts       |
  | 1.5 days           | 1+2 + workshops       | Richer content options           |

  ### Single-Track Structure (Half-day / Compact Full-day)

  Suitable for 100–150 people with a focused theme

  ```
  Main Stage (All Attendees)
  ├── Opening + Keynotes
  ├── Panel Discussion
  ├── Coffee Break + Expo
  ├── Thematic Talks
  ├── Interactive Q&A
  └── Networking
  ```

  ### 1+1 Track Structure (Standard Full Day)

  Suitable for 150–200 people with segmented needs

  ```
  Morning: Main Stage (All Attendees)
  ├── Opening + Keynotes
  ├── Headline Talk
  └── Panel Discussion

  Lunch + Expo

  Afternoon: Parallel Tracks
  ├── Main Stage Track: Industry / Strategy
  └── Breakout Track: Technology / Practice

  Convergence:
  ├── Closing Keynote
  └── Networking / Dinner
  ```

  ### 1+2 Track Structure (Content-Rich Full Day)

  Suitable for 180–200 people with diverse topics

  ```
  Morning: Main Stage (All Attendees)
  ├── Opening + Keynote
  └── Headline Panel

  Lunch + Expo + Business Matching

  Afternoon: Three Parallel Tracks
  ├── Track A: Strategy / Industry
  ├── Track B: Technology / Product
  └── Track C: Workshop / Hands-on

  Convergence:
  ├── Key Takeaways Summary
  └── After Party
  ```

  ---

  ## Core Formats of Medium-Scale Events

  ### 1. Keynotes

  #### Characteristics of Medium-Scale Event Keynotes:

  * Ideal length: 30–45 minutes (including Q&A)
  * 2–3 keynotes per half day
  * At least one “headline” speaker to anchor the agenda

  #### Quality Assurance:

  * Advance review of slides and content
  * Clear time requirements
  * Speaker bios and intro scripts prepared
  * Technical rehearsals (especially demos)

  ---

  ### 2. Panel Discussions

  #### Panel Design for Medium-Scale Events:

  * 4–5 panelists + 1 moderator
  * 45–60 minutes (including audience Q&A)
  * Encourage differentiated and contrasting viewpoints
  * Reserve 15 minutes for audience interaction

  #### Panel Topic Structure:

  ```
  Opening Question (5 min): One-sentence viewpoint from each panelist
  ↓
  Core Topic 1 (15 min): In-depth discussion
  ↓
  Core Topic 2 (15 min): Viewpoint collision
  ↓
  Rapid-fire Q&A (10 min): Light interaction
  ↓
  Audience Q&A (15 min): Open engagement
  ```

  ---

  ### 3. Breakout Sessions

  #### Breakout Design Principles:

  * Clear topic differentiation
  * Dedicated moderator for each session
  * Capacity control (30–60 people per session)
  * Clear guidance on session selection

  #### Breakout Session Types:

  | Type           | Suitable Content                     | Format                            |
  | -------------- | ------------------------------------ | --------------------------------- |
  | Thematic Talks | Deep technical / professional topics | 2–3 talks + Q&A                   |
  | Roundtable     | Experience sharing / debate          | Roundtable + open discussion      |
  | Workshop       | Hands-on, output-oriented            | Instruction + practice + showcase |
  | Case Sharing   | Best practices / retrospectives      | Multiple cases + commentary       |

  ---

  ### 4. Exhibition / Demo Area

  #### Exhibition Design for Medium-Scale Events:

  * 5–15 booths recommended
  * Integrated with coffee breaks
  * Guided traffic flow through expo area
  * Fixed demo time slots

  #### Exhibition Time Allocation:

  * Check-in period: free browsing
  * Coffee breaks: focused visits
  * Dedicated sessions: product demos

  ---

  ### 5. Business Matching (Networking Sessions)

  #### Matching Mechanism Design:

  * Collect needs in advance (during registration)
  * System-based matching recommendations
  * Fixed time slots for 1-on-1 meetings
  * 10–15 minutes per meeting

  #### Matching Time Allocation:

  * 30–60 minutes after lunch
  * Or extended afternoon coffee break

  ---

