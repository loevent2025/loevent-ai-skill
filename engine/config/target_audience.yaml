target_audience_web3: |
  # Web3 Industry Knowledge Base v3

  ## Inference Master Workflow (Engine Execution Order)

  > When generating audience inference results, the engine **must follow the steps below in order**. No step may be skipped or reordered.

  ```
  Step 1: Parse event name + event theme; extract audience intent signals
        ↓
  Step 2: Cross-reference [Section 0: Event Signal Parsing Rules] to determine audience direction type
        ↓
  Step 3: Use event format + scale to validate and narrow audience tiers
        ↓
  Step 4: Apply [Section 0: Market Cycle Awareness] to assess audience mindset in the current cycle; adjust messaging direction
        ↓
  Step 5: Use organizer background and product type as supplementary corrections (not the primary basis)
        ↓
  Step 6: Cross-reference [Section 2: Track Segmentation] to confirm track classification; further narrow the audience scope
        ↓
  Step 7: Filter roles matching the audience direction from [Section 1: Industry Role Map]
        ↓
  Step 8: Select applicable pain points by audience identity from [Section 4: Pain Point Vocabulary]
        ↓
  Step 9: Cross-reference [Section 3: Decision Paths] to confirm each audience's position in the decision chain
        ↓
  Step 10: Cross-reference [Section 6: Event Type Validation Table] to verify alignment between audience and event format
  ```

  ---

  ## Section 0: Event Signal Parsing Rules (First Inference Dimension)

  ### Step 1: Extract Audience Intent Signals from Event Name + Theme

  The event name and theme are the organizer's explicit declaration of audience intent and are the most reliable signal source for the entire inference process. The engine must parse these two fields first before incorporating any other information.

  **Web3-Specific Signal Categories:**

  | Signal Category | Typical Keywords | Audience Direction |
  |---|---|---|
  | **Developer Technical Signal** | Hackathon, developer, contract, SDK, RPC, ZK, Layer, protocol, DevRel, Build, deployment, toolchain | Technical developer tier |
  | **Investment & Fundraising Signal** | Demo Day, Pitch, fundraising, investor, VC, portfolio, roadshow, valuation, track analysis | Project Founders + investors |
  | **Ecosystem Partnership Signal** | Ecosystem, partner, BD, token listing, market making, Grant, open platform, co-building | Ecosystem execution tier (BD, project teams) |
  | **Community Operations Signal** | Community, Meetup, AMA, governance, DAO, contributor, airdrop, Discord, Telegram | Community operators + user-tier audience |
  | **Institutional Compliance Signal** | Institution, RWA, compliance, regulation, custody, legal, MiCA, KYC, traditional finance | Institutional compliance teams + legal advisors |
  | **Strategic Trends Signal** | Summit, forum, trends, future, industry leaders, flagship | Senior decision-maker audience |
  | **User Growth Signal** | User growth, TVL growth, acquisition, retention, growth hacking, on-chain user acquisition | Growth operations audience |
  | **Security & Compliance Signal** | Audit, security, Bug Bounty, vulnerability, attack/defense, privacy, censorship resistance | Security researchers + compliance roles |

  > **When multiple signals appear in the name and theme:** Priority order is
  > Institutional Compliance Signal > Investment & Fundraising Signal > Ecosystem Partnership Signal > Developer Technical Signal > Community Operations Signal
  > Principle: The more specific and vertically focused the signal, the higher its priority.

  ---

  ### Step 2: Validate Audience Tiers Against Event Format + Scale

  Event signals determine audience direction; **event format and scale determine audience tier**. Both must be used together.

  | Event Format | Scale | Audience Tier Restrictions | Notes |
  |---|---|---|---|
  | Closed-door session / private roundtable | < 100 | **Primarily decision-makers**, execution tier as secondary | Small closed-door events do not invite entry-level execution staff |
  | Summit / Forum | > 300 | Decision-makers + execution tier mixed | Large-scale events require tiered description by topic track |
  | Hackathon | 100–1,000 | **Primarily technical development tier** | Regardless of scale, developer events center on technical participants |
  | Demo Day / Pitch Day | 50–300 | Project Founders + investors | Fundraising matchmaking context; decision-makers appear on both sides |
  | Side Event / Satellite | 50–200 | Vertical track execution tier | Precision networking; dominated by track signals |
  | Community Meetup | 20–100 | **User tier + community tier** | Localized; targeting real users and community members |
  | Workshop / Technical Session | 20–80 | **Technical execution tier** | Hands-on work; decision-makers are not the core audience |
  | Governance Forum | 50–200 | DAO contributors + token holders | Specific to decentralized governance contexts |
  | Institutional Closed-Door Session | 20–80 | Traditional institutional decision-makers | Compliance audience; financial institution format |

  **Hard Filter Rules:**
  - Event is a closed-door session / private roundtable with attendance < 100 → Automatically exclude engineers, operations executors, and general users; **retain only manager level and above**
  - Event is a Hackathon / Workshop → Automatically exclude Founders, investors, and CXO-level pure decision-making roles
  - Event is an institutional closed-door session → Automatically exclude on-chain retail participants, individual developers, and similar non-institutional roles

  ---

  ### Step 3: Market Cycle Awareness (Web3-Specific Dimension)

  > **The Web3 industry is highly sensitive to market cycles.** The same event faces entirely different audience mindsets in a bull market versus a bear market. The engine must incorporate cycle awareness in Step 4 to adjust the messaging direction.

  | Cycle | Overall Audience Mindset | Primary Concerns | Messaging Adjustment |
  |---|---|---|---|
  | **Bull Market** | Optimistic, FOMO-driven, fast decision-making | How to participate faster / position earlier / seize opportunities | Emphasize speed, scarcity of opportunity, early-mover advantage |
  | **Bear Market** | Cautious, defensive, seeking certainty | How to survive / achieve compliance / reduce costs | Emphasize security, compliance, long-term value, cost control |
  | **Sideways / Volatile Market** | Experienced players holding steady / newcomers watching — significant audience bifurcation | Fundamentals vs. speculation divergence | Emphasize fundamentals, real user data, sustainability |

  **Cycle Assessment Method (Engine Reference):**
  - Event name / theme contains "opportunity," "early-stage," "growth," "bull market positioning" → Leans bull market mindset
  - Contains "compliance," "security," "sustainable," "long-term," "building" → Leans bear market mindset
  - No clear lean → Default to sideways market; messaging should emphasize long-term value and fundamentals

  ---

  ### Step 4: Organizer Background + Product Type as Supplementary Corrections

  > **This step serves only as a supplementary correction and must not override the inference results from the preceding three steps.**
  > Product type is no longer the primary dimension — in the Web3 world, the same organizer (e.g., an exchange, a wallet, a public chain) may host entirely different events targeting developers, institutions, or retail users. Product type alone cannot distinguish the specific audience intent of each event.

  **When to Apply Supplementary Corrections:**

  | Scenario | Correction Direction |
  |---|---|
  | Event name is too generic (e.g., "XX Crypto Summit") with unclear signals | Use product type as the primary inference basis |
  | Event signals are clear, but the organizer background shows a notable gap with those signals | Use organizer background to calibrate the audience's depth of crypto knowledge |
  | Event involves multiple signal categories | Use product type to help determine which signal carries higher weight |

  **Product Type Reference Table (Demoted to Auxiliary Tool):**

  | Product Type | Typical Product Form | Primary Audience Nature | Crypto Knowledge Depth |
  |---|---|---|---|
  | A. Developer Infrastructure | RPC nodes, smart contract frameworks, cross-chain bridge SDKs | Smart contract developers, protocol engineers | Very deep |
  | B. Protocol / DeFi Products | DEX, lending protocols, liquidity management | On-chain users, liquidity providers, quant teams | Deep |
  | C. Consumer DApp / Wallet | Wallet apps, NFT marketplaces, blockchain games | General crypto users, Web2 newcomers | Shallow to moderate |
  | D. Project Services / Ecosystem Services | Audit firms, market makers, compliance consultants, launchpads | Project Founders, BD managers, legal counsel | Moderate to deep |
  | E. Institutional / Enterprise Services | Compliant custody, institutional-grade API, RWA issuance | Traditional financial institutions, compliance lawyers | Shallow (but with financial depth) |
  | F. DAO Tools / Governance Platforms | Proposal tools, treasury management, multi-sig platforms | DAO contributors, governance researchers | Moderate to deep |

  ---

  ### Signal Parsing Examples

  | Event Name | Event Theme | Extracted Signals | Format / Scale | Market Cycle | Inferred Audience Direction |
  |---|---|---|---|---|---|
  | ETH Ecosystem Developer Hackathon | Building the next-generation DeFi protocol on L2 | Developer technical signal | Hackathon / 500 attendees | Sideways | Smart contract engineers, protocol researchers, DevRels — Founders and investors filtered out |
  | Web3 Institutional Asset Summit | RWA compliance pathways and institutional custody practices | Institutional compliance signal | Closed-door / 60 attendees | Bear market | Traditional finance compliance officers, asset managers, regulatory advisors — emphasize security and compliance messaging |
  | Crypto Investment Demo Day | The most promising early-stage projects of 2026 | Investment & fundraising signal | Demo Day / 150 attendees | Bull market | Project Founders + Crypto Fund GPs — emphasize opportunity scarcity and early-mover advantage |
  | DAO Governance Forum | Sustainable pathways for decentralized governance | Community operations signal | Governance forum / 100 attendees | Sideways | DAO core contributors, governance researchers, legal advisors — emphasize transparency and sustainability |
  | XX Public Chain Annual Summit | (Broad theme, signals unclear) | No clear signal; activate product type supplementary inference | Summit / 2,000 attendees | — | Combined with product type (Type A public chain): infer developer + Founder + investor mixed audience |

  ---

  ## Section 1: Industry Role Map (Filter by Audience Direction)

  > Roles below are grouped by **audience direction type**. Use the signal parsing results from Section 0 to filter applicable roles.

  ### Decision-Maker Tier

  | Role | Key Responsibilities | Core Concerns | Applicable Signal Categories | Typical Event Contexts |
  |---|---|---|---|---|
  | Project Founder / Co-founder | Fundraising, product direction, Tokenomics design | Ecosystem support depth, Grant resources, strategic partnership value | Investment & fundraising, ecosystem partnership | Roadshows, Demo Days |
  | Crypto Fund Partner / GP | Investment decisions, portfolio management, track analysis | Team background, on-chain data, Tokenomics soundness | Investment & fundraising, strategic trends | Investment summits, Demo Days |
  | Exchange BD Director | Token listing evaluation, traffic partnerships, ecosystem incentives | Project momentum, community scale, liquidity resources | Ecosystem partnership | Project matchmaking sessions, partner days |
  | Traditional Institution Head / Chief Compliance Officer | Regulatory access, asset custody, regulatory dialogue | Regulatory compliance proof, audit credentials, data security | Institutional compliance | Institutional summits, regulatory forums |
  | DAO Core Contributor / Multi-sig Holder | Proposal voting, treasury allocation, strategic partnerships | Proposal transparency, execution traceability, community consensus | Community operations | Governance summits, community conferences |

  ### Execution Tier

  | Role | Key Responsibilities | Core Concerns | Applicable Signal Categories | Typical Event Contexts |
  |---|---|---|---|---|
  | BD / Business Development Manager | Project partnerships, channel development, exchange coordination | Partnership efficiency, resource exchange value | Ecosystem partnership | Meetups, Side Events |
  | Community Lead | Discord / Telegram management, AMA planning | Community growth tools, engagement maintenance strategies | Community operations | Community conferences, operations summits |
  | Growth Lead | Airdrop strategy, referral incentives, on-chain user acquisition | On-chain user quality, acquisition cost, retention metrics | User growth | Growth sharing sessions |
  | Marketing / PR Lead | KOL partnerships, media relations, brand narrative | Verified KOL conversion data, media coverage breadth | Ecosystem partnership, strategic trends | Brand launches, media days |
  | Tokenomics Designer | Token model design, incentive mechanisms, vesting schedules | Economic model sustainability, sell-pressure management | Developer technical, investment & fundraising | Technical workshops |

  ### Technical Development Tier

  > **Note: Roles in this tier appear only when the event format is a Hackathon, Workshop, or developer conference. They are automatically excluded from closed-door sessions and institutional summits.**

  | Role | Key Responsibilities | Core Concerns | Applicable Signal Categories | Typical Event Contexts |
  |---|---|---|---|---|
  | Smart Contract Engineer (Solidity / Rust / Move) | Contract writing, deployment, upgrades | Toolchain completeness, documentation quality, community support | Developer technical | Hackathons, developer conferences |
  | Full-Stack DApp Developer | Front-end interaction + on-chain calls, wallet integration | SDK usability, API stability, demo examples | Developer technical | Hackathons, workshops |
  | ZK / Cryptography Engineer | Zero-knowledge proofs, privacy computation, L2 Rollup | Proof system maturity, engineering complexity, performance | Developer technical | Deep-dive technical sessions |
  | Smart Contract Auditor / Security Researcher | Code audits, vulnerability research, security reports | Audit process rigor, historical case references | Security & compliance | Security summits, Bug Bounty events |
  | On-Chain Data Analyst | Dune / Flipside dashboards, on-chain behavior analysis | Data accessibility, metric definition accuracy | Developer technical, user growth | Data analysis sharing sessions |
  | DevRel (Developer Relations) | Documentation writing, SDK maintenance, developer community management | Documentation completeness, onboarding pathway design | Developer technical | Developer conferences, workshops |
  | Protocol Researcher | Consensus mechanism research, MEV analysis, protocol governance | Research depth, academic influence | Developer technical | Academic conferences, research forums |

  ### End User Tier

  > **Default contexts: Community Meetups, AMAs, and other user-facing events.**
  > **⚠️ Exception: If the promotional focus is PLG and the event signal points to the general user direction (Direction B), end users may also serve as the core tier in large-scale events such as summits and forums.**

  | Role | Crypto Knowledge Depth | Core Pain Points | Applicable Event Formats |
  |---|---|---|---|
  | Web3-native retail user / on-chain veteran | Deep | Gas costs, multi-chain asset fragmentation, frequent phishing attacks | Community Meetups, AMAs |
  | Web2 newcomer / crypto beginner | Shallow | Private key complexity, inability to interpret on-chain data, fear of being scammed | Community Meetups, user education events |
  | NFT creator / collector | Moderate | Copyright ownership challenges, secondary market liquidity issues | NFT exhibitions, creator days |
  | Blockchain game player / guild member | Moderate | Play-to-earn economic collapse, Gas fees eroding earnings | Gaming conferences, player communities |
  | Liquidity provider / DeFi user | Deep | Impermanent loss quantification, protocol security risk | DeFi summits, protocol communities |

  ### Amplification / Influence Tier

  | Role | Key Responsibilities | Core Concerns | Applicable Signal Categories | Typical Event Contexts |
  |---|---|---|---|---|
  | Crypto KOL / Twitter influencer | Project reviews, alpha information, conversion-driving content | Verified project data, exclusive access | Community operations, ecosystem partnership | Brand events, KOL showcases |
  | Crypto media journalist / editor | In-depth reporting, industry analysis, project interviews | Newsworthiness, data verifiability | Strategic trends, investment & fundraising | Media days, press conferences |
  | On-chain researcher / content creator | Research reports, thread analysis, tutorial production | Data accessibility, product differentiation highlights | Developer technical | Content summits |
  | NFT artist / creator | NFT issuance, IP partnerships, community culture | Copyright protection mechanisms, creator economy revenue sharing | Community operations | NFT exhibitions, creator days |

  ---

  ## Section 2: Track Segmentation

  | Track | Corresponding Signals | Core Audience | Typical Pain Point Keywords | Preferred Event Formats |
  |---|---|---|---|---|
  | DeFi | Developer technical + user growth | Quant traders, liquidity providers, protocol developers | Impermanent loss, contract risk, MEV front-running | Technical workshops, protocol summits |
  | NFT / Digital Collectibles | Community operations | Creators, collectors, IP operators, brand teams | Copyright ownership, secondary market liquidity, community cold-start | Exhibitions, creator days |
  | GameFi / Blockchain Gaming | Community operations + user growth | Game producers, player guilds, game economists | Player retention, play-to-earn economic collapse | Gaming conferences, player communities |
  | Layer 1 / Layer 2 Infrastructure | Developer technical + strategic trends | Protocol developers, node operators, cross-chain bridge teams | TPS bottlenecks, cross-chain security, developer ecosystem cold-start | Hackathons, developer conferences |
  | RWA (Real-World Assets) | Institutional compliance | Traditional financial institutions, compliance lawyers, asset issuers | Unclear legal framework, institutional access barriers | Institutional closed-door sessions, regulatory forums |
  | AI + Crypto | Developer technical + strategic trends | AI engineers, decentralized compute teams | Compute costs, data privacy, model verifiability | Cross-sector summits, research forums |
  | Wallet / Gateway | Developer technical + security & compliance | Product managers, front-end engineers, security teams | High private key management barrier, phishing attacks | Product launches, security workshops |
  | DAO Governance Tools | Community operations | DAO operators, governance researchers, legal advisors | Low voter turnout, proposal execution gaps, ambiguous legal entity status | Governance forums, community conferences |

  ---

  ## Section 3: Typical Decision / Partnership Paths

  ### Path 1: Developer-Led Organic Adoption
  ```
  Developer discovers tool via GitHub / documentation → Local demo test
  → Integration into project → Internal team advocacy → Official Grant support
  ```
  - Key decision factors: Documentation quality, developer community activity, Grant incentive strength
  - Messaging focus: Technical reliability + ecosystem resources

  ### Path 2: Organic User Growth
  ```
  KOL recommendation / airdrop campaign → User trial → On-chain behavior retention
  → Word-of-mouth growth + community expansion → Protocol TVL / DAU organic growth
  ```
  - Key decision factors: Verified KOL influence, airdrop user retention quality, core product experience
  - Messaging focus: User growth metrics + authentic community feedback

  ### Path 3: Project Team-Initiated Vendor Selection
  ```
  BD initial outreach → Technical team capability evaluation
  → Founder compares pricing and reputation → Contract signed
  ```
  - Key decision factors: Past case studies, industry reputation, response speed
  - Messaging focus: Client references + team credibility

  ### Path 4: Institutional Compliance Onboarding
  ```
  Compliance team evaluates regulatory fit → Legal review
  → Senior leadership decision → IT security assessment → Pilot program initiated
  ```
  - Key decision factors: Regulatory credentials, audit reports, data isolation architecture
  - Messaging focus: Compliance proof + security assurance; emphasize certainty in a bear market mindset

  ### Path 5: Community Proposal-Driven Adoption
  ```
  Contributor submits proposal in governance forum → Community discussion
  → Token holder vote → Treasury funding execution
  ```
  - Key decision factors: Whether the proposal aligns with community values; whether the execution plan is transparent and traceable
  - Messaging focus: Alignment with decentralization ethos + execution transparency

  ---

  ## Section 4: Industry-Specific Pain Point Vocabulary

  > **Usage rule: Match the audience identity to the signal parsing results; select pain points from the corresponding tier. Cross-tier mixing is strictly prohibited.**

  ### Pain Points Facing Developers
  - High Gas fees make micro-transactions economically unviable, blocking mainstream DApp adoption
  - Trust concerns caused by smart contract upgrades (transparency issues with the Proxy pattern)
  - Frequent cross-chain bridge security incidents make integration risk difficult to assess
  - Liquidity fragmentation across L2 networks forces developers to maintain multiple separate implementations
  - ZK proof generation latency is too high, degrading product interaction experience
  - Documentation quality is inconsistent; debugging typically requires asking in Discord

  ### Pain Points Facing On-Chain Users / Retail Participants
  - Wallet operations are complex; a single mistake can cause irreversible loss
  - Phishing attacks are pervasive; signature authorization prompts are incomprehensible to most users
  - MEV bots systematically extract value from ordinary users — buying high and selling low
  - Multi-chain assets are scattered across platforms, making unified management and visibility a significant burden
  - Web2 habits are hard to migrate; seed phrase management and transaction confirmation flows are counterintuitive

  ### Pain Points Facing Project Teams / Founders
  - Cold-start user acquisition is difficult; users attracted by airdrops have poor retention rates
  - VC market has cooled; fundraising timelines have extended and angel round valuations have compressed significantly
  - Post-token-launch sell pressure is severe; market cap management and community confidence are difficult to sustain
  - KOL partnerships are often inflated; verified conversion impact is hard to measure
  - Audit pricing varies widely with no standard framework for assessing audit quality

  ### Pain Points Facing Institutions
  - Regulatory policy uncertainty (MiCA, SEC enforcement actions) makes it difficult to determine the right time to enter the market
  - Legal liability for on-chain asset custody remains ambiguous
  - Integration costs for adapting existing IT infrastructure to on-chain systems are high
  - Institutional-grade KYC / AML requirements are inherently in conflict with DeFi's permissionless architecture

  ### Pain Points Facing DAO Operators
  - Governance voting participation rates continue to decline; proposal execution lacks enforceability
  - Transparency of treasury fund usage — on-chain and off-chain — is difficult to guarantee
  - Contributor incentive design is complex; non-code contributions are difficult to quantify
  - Ambiguous legal entity status makes contract signing and external partnerships structurally difficult for DAOs

  ---

  ## Section 5: Web3 Audience-Specific Behavioral Characteristics

  | Characteristic | Specific Manifestations | Impact on Events / Messaging |
  |---|---|---|
  | **Pseudonymous culture** | A large share of participants use pseudonymous identities and are uncomfortable with real-name registration | Event sign-up flows should minimize data collection; clearly differentiate from traditional KYC-required events |
  | **Heavy KOL dependency** | Project cold-start and user decision-making rely heavily on KOL endorsement | A KOL's presence and endorsement at an event carries far greater weight than the organizer's own brand messaging |
  | **Community consensus over product features** | Users first ask "do I identify with this community?" before evaluating product functionality | Messaging should establish ideological alignment first (decentralization, censorship resistance, etc.) before presenting product advantages |
  | **Extremely fast information processing** | Audience is accustomed to fast-format content: Twitter threads, short videos, AMAs | Event content design should avoid lengthy slide presentations; favor conversational and interactive formats |
  | **Divergent views on decentralization ideology** | Experienced participants strongly identify with decentralization; newcomers prioritize usability and returns | For experienced users: emphasize "trustlessness" and "self-sovereignty"; for newcomers: emphasize ease of use and security |
  | **Bear market flight / bull market FOMO** | Audience sentiment is tightly correlated with market cycles | Messaging must be calibrated to the current market cycle (see Section 0: Market Cycle Awareness) |
  | **Acute sensitivity to "Web2 packaging"** | Audience can identify projects that are "fake decentralized" or "buzzword-chasing" | Messaging and event positioning must be authentic; avoid over-packaging; data must be on-chain verifiable |

  ---

  ## Section 6: Event Type Validation Table

  | Event Type | Scale | Core Audience Tier | Prohibited Audience Roles | Applicable Signal Categories |
  |---|---|---|---|---|
  | Closed-door session / private roundtable | < 100 | Decision-makers (manager level and above) | ❌ Engineers, retail users, community operations executors | Institutional compliance, investment & fundraising, ecosystem partnership |
  | Industry Summit | > 300 | Decision-makers + execution tier mixed | No restrictions; describe by topic track | Strategic trends, all categories |
  | Hackathon | 100–1,000 | Technical development tier | ❌ Founders, investors, CXOs (not core) | Developer technical |
  | Demo Day / Pitch Day | 50–300 | Project Founders + investors | ❌ General developers, retail users | Investment & fundraising |
  | Side Event / Satellite | 50–200 | Vertical track execution tier | No special restrictions; track signals take precedence | Ecosystem partnership, developer technical |
  | Community Meetup | 20–100 | User tier + community members | ❌ Institutional compliance officers, CXO-level roles | Community operations |
  | Workshop / Technical Session | 20–80 | Technical execution tier | ❌ Senior decision-makers (not hands-on participants) | Developer technical, security & compliance |
  | Governance Forum | 50–200 | DAO contributors + token holders | ❌ Traditional institutions, non-crypto audiences | Community operations |
  | Institutional Closed-Door Session | 20–80 | Traditional institutional decision-makers | ❌ On-chain retail participants, developers, KOLs | Institutional compliance |
  | NFT Exhibition / Creator Day | 100–500 | Artists, collectors, brand teams | ❌ DeFi technical audience, institutional compliance roles | Community operations |
  | AMA / Online Community Event | Unlimited | Community members, retail users | No special restrictions | Community operations, user growth |

  ---

  ## Section 7: Industry Key Metrics

  **Technical Tier / Investor Focus:**
  - TVL (Total Value Locked): Core health metric for DeFi protocols
  - On-chain transaction volume / Gas consumption: Network utilization rate
  - Developer count / GitHub commit frequency: Public chain ecosystem vitality
  - Audit coverage rate: Security and compliance standard
  - Grant disbursement volume and count: Ecosystem incentive strength

  **Operations Tier / Project Team Focus:**
  - DAU / MAU: DApp user activity
  - Token holder address count: Community scale
  - Post-airdrop retention rate: Genuine user stickiness
  - KOL-driven conversion rate: Influencer marketing effectiveness
  - Community member count (Discord / Telegram): Community size

  **Institutional Tier Focus:**
  - AUM (Assets Under Management): Institutional business scale
  - Number of compliance certifications (SOC 2, ISO, etc.): Security credentials
  - Institutional client count / client distribution: Client portfolio composition

  **Fundraising & Project Stage (Founder / Investor Focus):**
  - Fundraising amount and valuation: Project development stage
  - Token FDV vs. market cap ratio: Sell-pressure expectations
  - Team vesting schedule: Long-term alignment of interests

