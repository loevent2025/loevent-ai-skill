  | 16:40-17:00 | Closing + Raffle | 20min | Wrap-up |
  | 17:00-19:00 | After Party | 120min | Dinner social |

  **Time Allocation:**
  - Content: ~5 hours (55%)
  - Networking/Exhibition/Matching: ~4 hours (45%)

  ---

  ### Template C: Full-Day Summit — Multi-Track (7-8 hours)

  | Time | Main Stage | Breakout Room |
  |------|-----------|---------------|
  | 08:30-09:00 | Check-in + Morning Tea | Check-in + Morning Tea |
  | 09:00-09:15 | Opening Remarks | - |
  | 09:15-10:00 | Keynote 1 | - |
