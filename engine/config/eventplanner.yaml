  ## Scale Definition

  ### Mid-Scale Event Characteristics

  - **Scale**: 100-300 people
  - **Event Formats**: Industry forums, themed summits, professional seminars, mid-scale product launches
  - **Core Value**: **Brand exposure and conversion in equal measure, industry influence building**

  ---

  ## Mid-Scale Event Marketing Core Principles

  ### Principle 1: Exposure and Conversion in Equal Measure

  Mid-scale events need to balance two goals:

  - **Brand Exposure**: Let more target audience members know about the event
  - **Registration Conversion**: Convert exposure into actual registrations

  ### Principle 2: Channel Combination Strategy

  | Channel Type | Function | Recommended Count |
  |-------------|----------|-------------------|
  | Core Channels | Primary exposure + conversion | 2-3 |
  | Supplementary Channels | Additional reach | 1-2 |
  | Community Channels | Deep operations + conversion | 2-3 communities |

  ### Principle 3: Content Tiering

  | Content Type | Function | Applicable Phase |
  |-------------|----------|-----------------|
  | Announcement | Build awareness | Launch phase |
  | Highlight | Spark interest | Warm-up phase |
  | Speaker | Build trust | Build-up phase |
  | Urgency | Drive conversion | Sprint phase |
  | Atmosphere | Expand influence | Event day |

  ### Principle 4: KOL Assistance

  Mid-scale events should moderately leverage KOL influence:

  - 3-5 vertical-domain KOLs
  - Focus on mid-tier KOLs for best cost-effectiveness
  - Supplement with long-tail KOLs for expanded coverage

  ---

  ## Mid-Scale Event Channel Strategy

  ### Channel Priority Matrix

  | Priority | Channel Type | Notes | Resource Investment |
  |----------|-------------|-------|---------------------|
  | P0 | Official Social Media | Essential home base | High |
  | P0 | Event Community | Conversion core | High |
  | P1 | KOL Collaboration | Expand exposure | Medium |
  | P1 | Partner Channels | Leverage distribution | Medium |
  | P2 | Vertical Communities | Targeted reach | Medium |
  | P2 | Media Partnerships | Endorsement + exposure | Low-Medium |
  | P3 | Paid Promotion | Supplementary (optional) | As needed |

  ### Core Channel Detailed Strategies

  #### Channel 1: Official Social Media

  **Account Matrix:**

  | Account Type | Function | Content Direction |
  |-------------|----------|-------------------|
  | Official account | Authoritative publishing | Event info, speaker announcements |
  | Founder/core team | Personal endorsement | Personal perspective recommendations |
  | Speaker accounts | Expand coverage | Speaker-initiated sharing |

  **Publishing Cadence:**

  | Phase | Frequency | Content Type |
  |-------|-----------|-------------|
  | Launch phase | 2-3 per week | Event announcements, registration open |
  | Warm-up phase | 3-4 per week | Speaker reveals, highlight previews |
  | Build-up phase | Daily | Agenda, countdown |
  | Sprint phase | 1-2 daily | Final call, urgency |
  | Event day | Real-time | On-site photos/videos |

  #### Channel 2: Event Community

  **Community Structure:**

  | Community Type | Count | Purpose |
  |---------------|-------|---------|
  | Official registration group | 1-2 | Registrant communications, event info |
  | VIP/speaker group | 1 (optional) | Important speaker exclusive service |
  | Distribution groups | Multiple | Leverage external communities for distribution |

  **Operations Focus:**

  - Respond promptly to community questions
  - Regularly publish event progress updates
  - Design in-community engagement activities
  - Never miss event reminders

  #### Channel 3: KOL Collaboration

  **KOL Selection Criteria:**

  - Strongly related to event theme
  - Follower demographics match target audience
  - Healthy engagement rate (>3%)
  - Good past collaboration reputation

  **KOL Tier Distribution:**

  | Tier | Follower Count | Count | Collaboration Format |
  |------|---------------|-------|---------------------|
  | Mid-Tier KOLs | 30K-100K | 2-3 | Original content/deep collaboration |
  | Long-Tail KOLs | 10K-30K | 2-3 | Repost/brief recommendation |
  | Industry Experts | Any | 1-2 | Attend + endorse |

  ### Supplementary Channel Strategies

  #### Partner Channels

  - Request partners to distribute through their official channels
  - Provide ready-made distribution materials
  - Design partner-exclusive messaging

  #### Vertical Communities

  - Post in communities where target audience gathers
  - Follow community rules; avoid hard selling
  - Present in a valuable content format

  #### Media Partnerships

  - Select 1-2 vertical media outlets
  - Use event coverage/advertorial format
  - Focus on endorsement rather than traffic

