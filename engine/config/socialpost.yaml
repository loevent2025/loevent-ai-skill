  ```

  **⚠️ Medium format removes vs. long format:**
  - "Why attend" reduced to 2–3 items (long format: 3–4)
  - Speaker/agenda merged into 1 concise section
  - No perks section (unless strong conversion signal e.g. "free")
  - No value summary paragraph; CTA ends the post directly

  {{content_focus}}

  ---

  ## Information Display Rules

  ⚠️ **Only display information the user has explicitly provided.**

