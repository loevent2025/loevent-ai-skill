  IV. Quantified Metrics Benchmarks
  【Key Requirement】Must strictly set goals according to the quantified metrics benchmarks in the industry knowledge base; values must not be arbitrarily modified
  Refer to the industry knowledge base for:

  Metrics benchmarks by scale tier
