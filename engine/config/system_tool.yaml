  ## Medium-Scale Event Rhythm Control

  ### Energy Curve Design

  ```
  09:00 Check-in: Low energy (gradual warm-up)
  ↓
  09:30 Opening: Energy lift (strong kickoff)
  ↓
  10:30 Keynotes: High energy (core content)
  ↓
  11:00 Coffee Break: Energy adjustment (social relaxation)
  ↓
  11:30 Panel: High energy (morning climax)
  ↓
  12:00 Lunch: Low energy (rest and recharge)
  ↓
  14:00 Breakouts: Medium energy (deep content)
  ↓
  15:30 Coffee Break: Energy adjustment
  ↓
  16:00 Roundtable: Energy rebound
  ↓
  17:00 Closing: High energy (final highlight)
  ↓
  17:30 Party: Relaxed energy (free networking)
  ```

  ### Key Rhythm Principles for Medium-Scale Events

  | Principle          | Explanation                          |
  | ------------------ | ------------------------------------ |
  | Morning Headliners | Schedule top speakers in the morning |
  | Smooth Afternoon   | Lighter content early afternoon      |
  | Track Choices      | Give attendees options               |
  | Adequate Breaks    | Coffee breaks ≥20 minutes            |
  | Energized Closing  | End with a strong sense of takeaway  |

  ---

  ## Medium-Scale Event Speaker Configuration

  ### Recommended Number of Speakers

  | Event Duration        | Recommended Count | Notes                      |
  | --------------------- | ----------------- | -------------------------- |
  | Half-day              | 6–10              | 2–3 talks + 4–5 panelists  |
  | Full-day single track | 10–15             | 4–5 talks + 2 panels       |
  | Full-day multi-track  | 15–25             | Includes breakout speakers |

  ### Speaker Tier Configuration

  | Tier                  | Count | Role                      | Notes                      |
  | --------------------- | ----- | ------------------------- | -------------------------- |
  | Headline Speakers     | 1–2   | Opening / Closing keynote | Top industry figures       |
  | Core Speakers         | 3–5   | Keynotes / Panel leads    | Domain experts             |
  | Professional Speakers | 5–10  | Panels / Breakouts        | Frontline practitioners    |
  | Moderators            | 2–3   | Main & breakout stages    | Strong facilitation skills |

  ### Panel Speaker Configuration Principles

  **Optimal 4–5 Person Panel:**

  * 1 industry leader (anchor)
  * 2 experts from different backgrounds (viewpoint collision)
  * 1 rising star / challenger (fresh perspective)
  * 1 moderator (flow control)

  ---

  ## Output Structure

  ###Event Agenda
  **【固定标题 - 禁止修改】**
