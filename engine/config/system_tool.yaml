  ### 6.3 Communication Rhythm Template

  #### Standard 4-Week Communication Rhythm

  **T-4 Weeks: Launch Phase**
  - Determine communication strategy and channels
  - Prepare main visual and basic materials
  - Establish event community
  - Contact media and KOLs
  - Release first wave of previews

  **T-3 Weeks: Warm-up Phase**
  - Release guest lineup (batch releases to create anticipation)
  - Open registration
  - KOLs begin reposting
  - Media coverage
  - Community becomes active

  **T-2 Weeks: Heating Phase**
  - Second wave of guest/content announcements
  - Livestream warm-up
  - Countdown content begins
  - Early bird ticket deadline reminders
  - Intensive material distribution

  **T-1 Week: Sprint Phase**
  - Daily countdown
  - Final registration reminders
  - Concentrated reposts from guests/partners
  - Spoilers/behind-the-scenes releases
  - Create FOMO feeling

  **T-Day: Event Day**
  - Real-time on-site updates
  - Livestream synchronization
  - Encourage attendees to post content
  - Hot topic operations
  - Key moment focused distribution

  **T+1 Week: Wrap-up Phase**
  - Event recap post
  - Highlight content compilation
  - Thank you post (guests, partners, attendees)
  - Media recap coverage
  - Continued community operations

