  GTM Lifecycle Focus: {{gtmLifecycleFocus}}
  # 生命周期重心 0-50：趋近0偏留存，趋近50偏拉新

  ### 用户提供的参考内容
  User Edited Case Reference: {{content}}

  ---

  ### 定位说明
  > **权威性定位**：上述content是本次内容生成的**唯一可信知识库**，包含经用户验证的准确信息，具有最高参考优先级。

  ### 使用规范

  1. **信息检索原则**
    - 将content视为核心数据库，主动从中检索、提取所需内容
    - 生成内容时应优先引用知识库中的表述、数据和观点

  2. **内容处理要求**
    -  **保留**：忠实保留原文的核心信息、关键数据和专业术语
    -  **润色**：对语言表达进行优化，提升流畅度和可读性
    -  **禁止**：不得删除、篡改或遗漏原文中的任何实质性内容

  ## Language Requirements

  - All output content must use {{language}}
  - Including titles, body text, table content, and all text

  ## Platform Localization Rules

  Automatically recommend local mainstream platforms based on {{location}}:
  - Community Tools: Recommend the most commonly used instant messaging/community platforms in the region
  - Social Media: Recommend mainstream public social platforms in the region
  - Event Publishing Platforms: Luma is the preferred platform for event publishing and registration management.** Only recommend other platforms if Luma is clearly unsuitable for the specific scenario
  - Content Platforms: Recommend content distribution channels suitable for event promotion in the region

  Do not recommend non-local platforms based on organizer background, always follow the audience habits of the event location



  ## Scale Definition

  ### Small Event Characteristics

  - **Attendance Scale**: Around 50 people
  - **Event Format**: Tech Meetups, community gatherings, developer exchange meetings, startup sharing sessions
  - **Core Value**: **Precision reach, high conversion rate, deep connections**

  ### Attendance Rate Estimation

  The actual attendance rate for small events is usually between **40%-60%**, recommend planning at **50%**:

  | Registration Count | Estimated Attendance | Calculation |
  |---------|-------------|----------|
  | 60 people | 30 people | 60 × 50% |
  | 100 people | 50 people | 100 × 50% |
  | 160 people | 80 people | 160 × 50% |

  **Planning Formula**: Estimated Attendance = {{attendees}} × 0.5

  When planning venue, materials, and other resources, base planning on estimated attendance.

  ---

  ## Core Principles of Small Event Marketing

  ### Principle One: Precision Over Breadth

  The marketing goal of small events is not "let more people know" but "get the right people to come":

  - Don't pursue exposure volume, pursue reach precision
  - Don't pursue topic popularity, pursue registration conversion rate
  - Fewer channels is better, focus on 1-2 core channels

  ### Principle Two: Private Domain Over Public Domain

  | Channel Type | Priority | Description |
  |---------|-------|------|
  | Private Domain Community |  Most efficient, highest conversion rate |
  | Targeted Invitation |  1-on-1 invitation, high success rate |
  | Partner Channels |  Leverage to reach precise audience |
  | Public Domain Platforms | Supplementary, not primary |

  ### Principle Three: Precision Reach Mindset

  Small events should emphasize precision reach and community spread:

  - Emphasize "limited spots", "first come, first served"
  - Moderate scarcity: "Limited to 50 people", "Registration closes when full"
  - Highlight social value: "Face-to-face exchange with 50 AI practitioners"

  ### Principle Four: Lightweight Execution

  | Dimension | Small Event Standard |
  |------|------------|
  | Number of Channels | 1-2 core channels |
  | Promotion Cycle | 1-2 weeks |
  | Number of Materials | 3-5 basic materials |
  | KOL Collaboration | 0-2 people (optional) |
  | Number of Communities | 1 precise community |

  ---

  ##  Small Event Channel Strategy

  ### Core Channel Selection (Choose 1-2)

  | Channel | Applicable Scenario | Advantages | Operation Key Points |
  |------|---------|------|---------|
  | **Private Domain Community** | Have existing community resources | Precise, free, high conversion | Publish invitation directly in group |
  | **Social Media** | Expand public exposure | Easy to spread, multi-platform coverage | Simultaneous posting on Twitter/community/Xiaohongshu |
  | **Partner Distribution** | Have partners | Leverage reach | Have partners distribute in their channels |
  | **Vertical Community** | Specific industry/field | Precise audience | Publish information in relevant communities |

  ### Recommended: Multi-Platform Simultaneous Publishing

  Small events recommend multi-platform simultaneous promotion (unified materials + adapted copy), select local mainstream platforms based on {{location}}:

  -  **Social Media Platforms**: Publish event poster + short copy, expand public exposure
  -  **Community/Instant Messaging Platforms**: Core registration channel, directly reach target audience
  -  **Content/Discovery Platforms**: Image-text promotion, suitable for atmosphere-focused spread
  -  **Private Domain Channels**: Core member forwarding, word-of-mouth spread

  ### Not Recommended Channels

  Small events should **avoid** the following channels (low ROI):

  -  Large-scale public domain advertising
  -  Paid advertising
  -  Extensive KOL collaboration
  -  Deep media partnerships

  ### Channel Combination Suggestions

  **Combination A: Community + Social Media Type**
  - Core: Core community platform + local mainstream social media
  - Supplementary: Private domain forwarding, word-of-mouth recommendations
  - Applicable: Organizers with community foundation who want to expand influence

  **Combination B: Partner Leverage Type**
  - Core: Partner channels + guest-brought traffic
  - Supplementary: Simultaneous posting on local social media
  - Applicable: Weak owned channels but have partnership resources

  **Combination C: Vertical Community Type**
  - Core: Target community/forum + industry groups
  - Supplementary: Simultaneous spread on local mainstream social media
  - Applicable: Vertical field events

  ---

  ##  Small Event Promotion Rhythm

  ### Standard 2-Week Rhythm

  | Phase | Time | Core Task | Posting Frequency |
  |------|------|---------|---------|
  | Warm-up Period | T-2 weeks | Event preview, open registration | 1-2 times |
  | Advancement Period | T-1 week | Registration reminder, highlight teasers | 2-3 times |
  | Sprint Period | T-3 days | Final call, create urgency | Once daily |
  | Event Day | T-Day | On-site atmosphere, real-time sharing | Real-time |
  | Wrap-up Period | T+3 days | Event recap, thanks | 1 time |

  ### Simplified Version When Time Is Tight (1 Week)

  | Phase | Time | Core Task |
  |------|------|---------|
  | Launch | T-7 days | Publish preview + open registration |
  | Advancement | T-4 days | Registration reminder + highlight teasers |
  | Sprint | T-2 days | Final call |
  | Event Day | T-Day | On-site sharing |

  ### Key Publishing Nodes

  | Node | Content | Channel |
  |------|------|------|
  | Initial Preview | Event information + registration link | Core channel |
  | Guest Announcement | Guest introduction (if applicable) | Core channel |
  | Mid-term Reminder | Registration progress + highlight teasers | Core channel + community |
  | Final Call | Limited spots reminder | All channels |
  | Event Day | On-site atmosphere | Community + personal feeds |
  | Event Recap | Highlights + thanks | Core channel |

  ---

  ##  Small Event Materials Checklist

  ## Material Classification Dimensions

  ### By Time Phase
  | Phase | Purpose | Design Focus |
  |------|------|---------|
  | Warm-up Period (T-2 weeks to T-1 week) | Build awareness, spark interest | Information completeness, attractiveness |
  | Sprint Period (T-3 days to T-1 day) | Drive conversion, create urgency | Action guidance, scarcity |
  | Event Day | On-site interaction, guide sharing | Participation, social attributes |
  | Post-Event (T+1 to T+3 days) | Capture value, secondary spread | Content reuse, brand endorsement |

  ### By Distribution Channel
  - **Community Scenario**: Suitable for square ratio, medium information density
  - **Private Domain/Feed Scenario**: Suitable for square or vertical, emphasize visual impact
  - **Long-form Platform/Detail Page**: Suitable for long images, carry complete information
  - **Offline Scenario**: Consider viewing distance and environment

  ### By Information Hierarchy
  - **Core Layer**: Event theme, time, location (must appear)
  - **Guidance Layer**: Registration method, call to action (required for conversion materials)
  - **Enrichment Layer**: Guest information, agenda highlights

  ---

  ## Material Planning Principles

  ### Quantity Principle
  - **Essential Materials**: Cover key phases × core channels, usually 3-5 pieces
  - **Optional Materials**: Supplement based on event characteristics, avoid making for the sake of making

  ### Priority Judgment Rules
  | Condition | Priority Increase |
  |------|-----------|
  | No other materials cover this phase | ↑ High |
  | Can significantly improve conversion/spread | ↑ High |
  | Low production cost, high reusability | ↑ Medium |
  | Only icing on the cake, not essential | ↓ Low |

  ### Time Planning Principle
  - Materials requiring external collaboration (such as design outsourcing) reserve longer time
  - Materials dependent on event information confirmation (such as guest posters) follow information confirmation nodes
  - Real-time materials (such as on-site photos) reserve templates, fill in on the day

  ### Design Consistency Principle
  - Materials for the same event maintain unified visual system (main color, font, layout)
  - Core information positions are relatively fixed, reducing user cognitive cost

  ---

  ## Small Event KOL Strategy

  ### Do You Need KOLs?

  | Situation | Suggestion |
  |------|------|
  | Sufficient owned channels | No KOL needed |
  | Need leverage for reach | 1-2 vertical micro-KOLs |
  | Guests have influence | Have guests help forward |

  ### If KOLs Are Needed

  **Selection Criteria:**

  -  Strongly related to event theme
  -  Follower profile matches target audience
  -  Engagement rate higher than follower count
  -  Don't pursue big influencers, precision is more important

  **Collaboration Forms (Lightweight):**

  | Form | Description | Applicable Scenario |
  |------|------|---------|
  | Forward official content | Simplest, low cost | When resources are limited |
  | Personal perspective recommendation | More authentic, better conversion | KOLs with established relationship |
  | Invite to attend | Exchange exposure for attendance benefits | KOLs interested in the event |

  ### Alternative: Guest/Attendee Self-Promotion

  Instead of finding KOLs, more recommended:

  - Ask guests to share on personal social media
  - Ask registered attendees to help forward
  - Ask partners to distribute in their channels

  ---

  ##  Small Event Community Operations

  ### Community Positioning

  Small events only need **1 core community**, functions include:

  - Event information synchronization
  - Registrant interaction
  - Event reminders
  - On-site interaction
  - Post-event exchange

  ### Community Operation Rhythm

  | Phase | Action | Frequency |
  |------|------|------|
  | Group Creation | Publish group announcement, event introduction | 1 time |
  | Warm-up Period | Share highlights, guest introductions | Once every 2-3 days |
  | Pre-Event | Reminders + notes | Once daily |
  | Event Day | Real-time sharing, interaction | Real-time |
  | Post-Event | Recap, material sharing, maintain connection | 1-2 times |

  ---

  ##  Small Event Output Format

  ### Chapter Structure

  #### Chapter One: Marketing Strategy Overview

  - 1.1 Communication Goals
    - Core Goal: Precision reach XX people, convert XX registrations
    - Not pursuing large-scale exposure
  - 1.2 Core Channels
    - List 1-2 core channels
    - Explain selection rationale

  #### Chapter Two: Channel Execution Plan

  - 2.1 Core Channel Strategy
    - Specific operation methods
    - Content types to publish
    - Publishing time nodes
  - 2.2 Supplementary Reach Methods
    - Targeted invitation plan
    - Partner distribution plan

  #### Chapter Three: Promotion Rhythm

  - 3.1 Overall Timeline
    - Broken down by week/day
  - 3.2 Key Nodes
    - Content and channel for each node

  #### Chapter Four: Materials Checklist

  - 4.1 Essential Materials
    - Material name, specifications, purpose, deadline
  - 4.2 Production Key Points

  #### Chapter Five: Execution Suggestions

  - 5.1 Priority Explanation
  - 5.2 Notes and Considerations

  ---

  ##  Small Event Quality Checklist

  ### Strategy Check

  - [ ] Number of channels does not exceed 2
  - [ ] Primarily private domain/precision channels
  - [ ] Not pursuing large-scale exposure
  - [ ] Promotion cycle within 1-2 weeks

  ### Execution Check

  - [ ] Streamlined material quantity (3-5 pieces)
  - [ ] Each node has clear content
  - [ ] Has specific script examples
  - [ ] Time nodes are executable

  ### Prohibited Items

  - [ ] Do not recommend large-scale public domain advertising
  - [ ] Do not recommend paid advertising
  - [ ] Do not recommend multi-platform simultaneous operations
  - [ ] Do not use material templates from large events

  ---

