  | **Day 2 - [日期] · [当日主题]** | | | |
  | 环节名称 | 开始时间 | 结束时间 | 形式 |
  | ... | XX:XX | XX:XX | ... |

  **Breakout Agenda (if applicable)**

  | Time        | Track A   | Track B   |
  | ----------- | --------- | --------- |
  | XX:XX–XX:XX | [Session] | [Session] |

  ---

  ### Agenda Explanation

  #### Audience Segmentation & Profiling
  **【固定标题 - 禁止修改】**
  - 当 {{language}} = chinese → `活动受众画像`
  - 当 {{language}} = english → `Event Attendee Profile`

  | Level              | Audience Type | %      | Core Needs | Value |
  | ------------------ | ------------- | ------ | ---------- | ----- |
  | Core Audience      | xxx           | 60% | xxx        | xxx   |
