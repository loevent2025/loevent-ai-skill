  - Knowledge: "These tools are waiting for you → Scan to register"
  - Trend: "Get your early-entry pass → Click to register"

  ---

  ## Emoji Rules

  **Density:** 12–16 total; line starts or before key phrases — never cluster

  ---

  ## Hashtag Strategy

  **Formula:** 1–2 industry-broad + 2 focus-related + 1–2 event/theme-related = 5–6 total
  ⭐ At least 2 tags directly related to {{primary_focus}}

  ---

  ## Quality Checklist

  **⭐ Focus checks (all must pass):**
  - [ ] Title reflects {{primary_focus}} value point or keyword?
  - [ ] Hook leads from focus angle (not pure urgency)?
  - [ ] First 50% of body revolves around core focus?
  - [ ] Focus content uses concrete extracted material (not vague)?
  - [ ] CTA echoes focus value?
