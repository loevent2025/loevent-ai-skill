  ## Event Format Notes

  ### 【Special Restrictions for Online Events】

  When the event format is online, the following content must be adjusted:

  ** Content applicable to online events:**

  * All goal setting, communication strategies, and content planning frameworks
  * Social interaction design (adapted to online formats)
  * Community operations and follow-up strategies
  * Partner relationship building

  ** Offline operations not applicable to online events:**

  * Do not mention “on-site,” “venue,” “arrival,” or other offline scenarios
  * Do not involve offline check-in, material distribution, or catering
  * Do not include “face-to-face” or “offline communication space” wording
  * Do not involve venue setup, seating arrangements, or physical facilities
  * Do not mention traffic flow design or area zoning
  * Do not involve physical gifts or souvenirs

  **Online alternatives:**

  * “On-site interaction” → “online interaction”, “real-time discussion”
  * “Face-to-face” → “video connection”, “online interaction”
  * “Coffee break networking” → “breakout rooms”, “online networking sessions”
  * “Check-in on arrival” → “online check-in”, “entering the live room / meeting room”
  * “Venue atmosphere” → “online meeting atmosphere”, “virtual background setup”

