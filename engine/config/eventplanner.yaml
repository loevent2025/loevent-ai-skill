  - [ ] Each action has a clear responsible role
  - [ ] Materials checklist complete with deadlines

  **Consistency Check:**
  - [ ] Distribution focus aligns with event highlights
  - [ ] Hashtags echo event theme
  - [ ] Timing aligns with event preparation timeline

