  - **Scalable User Value**: Balance of acquisition scale and quality
  - **Brand Value Acceleration**: Generate industry-level influence and discussion
  - **Ecosystem Expansion**: Connect diverse value chain participants
  - **Rich Content Value**: Multi-format sustained content distribution

  ---

  ## Mid-Scale Event Key Operating Principles

  ### Objective-Setting Principles

  | Principle | Description | Requirement |
  |-----------|-------------|-------------|
  | Balance | Optimal balance of scale and quality | Do not sacrifice quality for scale |
  | Tiering | Tiered attendee operations | VIP differentiated experience |
  | Content-Driven | Content as core attraction | Content quality first |
  | Ecosystem Thinking | Connect all value chain roles | Create network effects |
  | Commercial Viability | Ticket + sponsorship feasibility | Financial sustainability |
  | Sustainability | Foundation for event series | Long-term IP mindset |

  ### Must-Do Items

  - **Thoughtful agenda design**: Main stage + breakout sessions/workshops, balancing depth and breadth
  - **Sufficient networking time**: At least 30% free interaction time
  - **Attendee tiering**: VIP exclusive experience, tiered pricing, differentiated service
  - **Comprehensive sponsorship framework**: Multi-tier sponsorship benefits, clear value delivery
  - **Online-offline integration**: Livestream for expanded coverage, online interaction design
  - **Commercial conversion design**: Clear conversion path, business matching support

  ### Avoid

  - Pursuing scale at the expense of experience quality
  - Overpacked agenda leading to insufficient networking time
  - Over-diluting sponsor benefits
  - Neglecting VIP exclusive experiences
  - Stopping operations immediately after the event
  - Focusing only on headcount rather than audience quality
  - Homogeneous content without differentiation
  - Neglecting post-event conversion follow-up

  ---

  ## Baseline Adjustment Coefficients

  ### Scale Coefficient (100-200 people)

  | Headcount | Adjustment Coefficient | Notes |
  |-----------|----------------------|-------|
  | 100-120 | 0.85-0.95x | Entry mid-scale |
  | 120-150 | 0.95-1.05x | Standard mid-scale |
  | 150-180 | 1.05-1.15x | Upper mid-scale |
  | 180-200 | 1.15-1.25x | Approaching large-scale |

  ### Organizer Coefficient

  | Organizer Type | Adjustment Coefficient | Notes |
  |---------------|----------------------|-------|
  | Industry-leading brand | 1.3-1.5x | Built-in traffic and trust |
  | Well-known startup | 1.1-1.3x | Established brand foundation |
  | New brand, first event | 0.7-0.9x | Requires more investment |
  | Industry association | 1.2-1.4x | Credibility endorsement |
  | Media/community | 1.1-1.3x | Distribution advantage |

  ### Event Type Coefficient

  | Event Type | Adjustment Coefficient | Notes |
  |-----------|----------------------|-------|
  | Industry Summit | 1.1-1.3x | High influence |
  | Product Launch | 1.0-1.2x | High attention |
  | User Conference | 1.0x | Standard baseline |
  | Tech Conference | 0.9-1.1x | Targeted audience |
  | Community Annual Gathering | 0.9-1.0x | Community-oriented |

  ### Regional Coefficient

  | Region | Adjustment Coefficient | Notes |
  |--------|----------------------|-------|
  | Tier-1 Cities | 1.1-1.2x | High audience density |
  | New Tier-1 Cities | 1.0x | Standard baseline |
  | Tier-2/3 Cities | 0.8-0.9x | Adjust downward |
  | International Events | 0.8-1.3x | Market-dependent |

  ### Industry Momentum Coefficient

  | Industry Momentum | Adjustment Coefficient | Notes |
  |-------------------|----------------------|-------|
  | Hot Trend | 1.3-1.5x | High attention |
  | Steady Growth | 1.0-1.2x | Sustained interest |
  | Mature and Stable | 0.9-1.0x | Standard baseline |
  | Niche/Emerging | 0.7-0.9x | Lower expectations |

  ---

  ## Quality Requirements

  ### Background Section Requirements
  - Industry background tightly aligned with event theme, covering **multiple sub-domains**
  - Insightful perspective and trend awareness
  - Organizer background clearly explains "why we can integrate this ecosystem"
  - Timing and venue selection logic is clear, reflecting influence and operational convenience
  - Total word count: 2,000-2,500 words

  ### Objectives Section Requirements
  - Each metric must have a quantified definition, referencing mid-scale event baselines
  - Data must match 100-200 person scale
  - Short, mid, and long-term objectives build progressively and support each other
  - Brand exposure, user conversion, and ecosystem building are balanced
  - Reflect tiered operations thinking

  ### Value Section Requirements
  - Articulate both organizer and attendee value
  - Highlight the balanced advantages of mid-scale events
  - Quantified expectations are reasonable
  - ROI logic is clear, including both direct and indirect returns
  - Sponsor value considered independently

  ### Important Notes
  - **Pragmatic Principle**: Objectives match resources — do not over-promise
  - **Localization**: Consider regional ecosystem maturity and regulatory environment
  - **Differentiation**: Highlight uniqueness, create memorable moments
  - **Actionable**: Objectives are measurable, trackable, and reviewable
  - **Series Mindset**: Build momentum for subsequent events
  - **Commercial Mindset**: Focus on financial sustainability

