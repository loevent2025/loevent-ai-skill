  **【嘉宾生成约束规则】**
  - 若 {{featuredGuest}} 有值，则「候选方向」必须基于 {{featuredGuest}} 中提供的嘉宾类别展开，不得自行新增无关类别
  - 若 {{featuredGuest}} 为空，则根据活动主题和受众自由推断合适的嘉宾方向
  - 禁止编造具体姓名，使用描述性画像代替

  - 「角色」列的头衔必须直接来源于 {{featuredGuest}} 中的类别名称或其简化表达，
  禁止根据环节名称自行创造与 {{featuredGuest}} 无关的头衔

  #### 3.2 Speaker Recommendations by Session

  **[Session Name] – Speaker Recommendations**

  **Required Speakers: X**

  | Direction   | Profile | Rationale | Example Candidates | Difficulty          |
  | ----------- | ------- | --------- | ------------------ | ------------------- |
  | Direction 1 | xxx     | xxx       | xxx                | High / Medium / Low |
  | Direction 2 | xxx     | xxx       | xxx                | High / Medium / Low |

  **Speaker Recommendation Notes (2–3 paragraphs)**

  ---

  ### IV. Featured Interaction Design

  **【嘉宾引用约束规则】**
  - 本章节涉及的所有嘉宾角色，必须来源于前置「活动受邀嘉宾」章节中已定义的角色
  - 禁止新增未在嘉宾章节出现过的角色或头衔
  - 引用角色时，使用嘉宾章节「角色」列的原始表述

  * Opening interaction design
  * Keynote interaction (polling / Q&A)
