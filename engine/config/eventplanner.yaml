  ## Small Event Interaction Design

  ### Deep Interaction Design

  When designing group collaboration interaction sessions, generate interaction format proposals suited to the scenario.

  **Design Constraints**
  - Naming style should lean toward tech/systems-oriented expression; avoid traditional conference terminology
  - Emphasize structured, reusable, and iterative approaches
  - Prioritize balancing information flow efficiency and engagement

  ---

  ## Small Event Pacing Control

  ### Energy Curve Design

  ```
  Event Start: Medium energy (check-in)
  ↓ Gradual warm-up
  First Peak: Discussion momentum after topic introduction
  ↓ Slight adjustment
  Core Session: Panel discussion/workshop (high-engagement state)
  ↓ Tea break relaxation
  Second Peak: Outcome showcase/brilliant Q&A
  ↓ Warm closing
  Networking Time: Relaxed but quality deep conversations
  ```

  ### Small Event Pacing Key Points

  | Key Point | Description |
  |-----------|-------------|
  | Don't overfill | Leave white space for natural conversation to occur |
  | Flexible timing | Extend excellent discussions as appropriate |
  | Real-time adjustment | Adjust the next session based on audience response |
  | Depth first | Better to cover fewer topics thoroughly than many superficially |
  | Full participation | Watch for quiet attendees; invite them to share when appropriate |

  ### Common Small Event Issues

  | Issue | Solution |
  |-------|----------|
  | Dead air | MC prepares guiding questions; invite specific people when needed |
  | One person dominating | Politely redirect; invite others to share |
  | Off-topic drift | Gently guide back; note off-topic items for future discussion |
  | Overtime | Set time rules in advance; use time reminders |
  | Surface-level discussion | Ask "why" follow-ups; guide deeper exploration |

  ---

  ## Small Event Speaker Configuration

  ### Speaker Quantity Guidelines

  | Event Duration | Recommended Speakers | Notes |
  |---------------|---------------------|-------|
  | 2-3 hours | 2-4 | 1 keynote + 2-3 panelists |
  | Half-day | 3-5 | 2 presenters + 3 panelists |
  | Full-day | 5-8 | Distributed across sessions |

  ### Small Event Speaker Characteristics

  | Characteristic | Description |
  |---------------|-------------|
  | Conversational ability | Not just skilled at presenting — must engage in deep dialogue |
  | Willingness to share real experiences | Including failures, unpublished information |
  | Peer-level or slightly senior to attendees | Minimize distance, promote equal dialogue |
  | Time for full participation | Not just present-and-leave; participate in networking |

  ### Speaker Role Configuration

  | Role | Count | Core Requirements |
  |------|-------|-------------------|
  | Keynote Speaker | 1-2 | Deep content, willingness to share |
  | Panelists | 3-4 | Distinctive viewpoints, skilled at discussion |
  | MC/Facilitator | 1 | Strong moderation, skilled at guiding |
  | Featured Attendees | Several | High-quality attendees as valued participants |

  ---

  ## Thinking Order vs Output Order

  **CRITICAL**: Your internal thinking order and your output order are DIFFERENT.

  **Step 1 — Think first (do NOT output yet)**: Internally decide the exact featured interactions for Chapter 4. Determine their names, formats, and quantity based on event duration:
  - Half-day event (3-4 hours): 1-2 featured interactions
  - Full-day event (6-9 hours): 2-3 featured interactions
  - Multi-day event: 2-3 featured interactions per day
  Hold these in mind before writing any output.

  **Step 2 — Output in document order**: Now write the full document starting from Chapter 1 (Event Agenda). When writing the agenda, embed the pre-decided featured interactions as named sessions. All other sessions must use standard naming and formats.

  This ensures the agenda and Chapter 4 are perfectly consistent because you already know the featured interactions before writing the agenda.

  ## Output Structure

  ### Event Agenda

  **[Fixed Title — Do Not Modify]** → `{{title_agenda}}`

  **[Output Rules]**
  - **Single-day events**: Output one agenda table
  - **Multi-day events**: Split by day; insert separator rows within the same table:

  | **Day 1 - [Date] · [Day Theme]** | | | |
  | Session Name | Start Time | End Time | Format |
  | ... | XX:XX | XX:XX | ... |
  | **Day 2 - [Date] · [Day Theme]** | | | |
