  |------------|-------|-------------|----------------------|
  | Guest Lineup | guest_profile | **Lead with speaker's identity/achievement/perspective** | One sentence on top speaker + core achievement |
  | Event Agenda | event_agenda | **Lead with value of strongest topic/session** | One sentence on strongest topic or session |
  | Event Purpose | event_purpose | **Lead with target audience's pain point/need** | One sentence on core benefit or pain point resolved |
  | Basic Information | basic_information | **Lead with unique positioning/scale/scarcity** | One sentence on positioning or scale highlight |

  **⚠️ Entry strategy is mandatory — not a suggestion:**
  - guest_profile focus → first sentence **must** mention the speaker
  - event_agenda focus → first sentence **must** mention the topic/session
  - event_purpose focus → first sentence **must** mention the audience's pain point or benefit
  - basic_information focus → first sentence **must** convey unique positioning

  **⚠️ Sentence style matching rules (strictly enforced):**

  | Focus Type | Required Style | Prohibited Style |
  |------------|---------------|-----------------|
  | guest_profile | **Declarative**: directly state speaker identity/achievement | ❌ No question openers |
  | event_agenda | **Declarative or intrigue**: directly describe topic value or outcomes | ❌ No pain-point question openers |
  | event_purpose | **Question or scenario**: lead with pain point/need | ✅ Questions allowed |
  | basic_information | **Declarative**: directly announce unique nature of event | ❌ No question openers |

  **Core logic:** Questions signal "you have a problem" — they belong to pain-point/purpose framing. Speaker, agenda, and basic-info types should use declarative sentences to immediately surface core information.

  #### 1.2 Extract Focus Material

  | Focus Type | Priority Sources | What to Extract |
  |------------|----------------|-----------------|
  | guest_profile | {{secondary_focus}} > {{prompt}} | Speaker name, title, strongest achievement/data |
  | event_agenda | {{secondary_focus}} > {{prompt}} | Most compelling topic name, session format, deliverable output |
  | event_purpose | {{secondary_focus}} > {{prompt}} > {{inspiration_source}} | Audience profile, core pain point, expected benefit |
  | basic_information | {{secondary_focus}} > {{self_description}} > {{theme}} | Event scale, unique positioning, industry firsts |

  #### 1.3 Build Focus Selling-Point Sentence
  **Formula:** [Focus entry angle] + [Strongest specific evidence] = One-sentence selling point
  Must include real info extracted from content (name/data/outcome). No vague language.

  ### Step 2: Calculate Urgency (Supporting Modifier)

  **Urgency is a supporting element that adds time-dimension momentum to the focus narrative — it does not replace the focus as the primary driver.**

  Days until event: {{days_until_event}} days (already calculated, use directly — do NOT recalculate).

  | Days | Urgency | Modifier Approach | CTA Support |
  |------|---------|-------------------|-------------|
  | ≤3 | 🚨 Extreme | Layer countdown on top of focus headline; hook format: "[Focus value point] 🚨 X days left!" | Add "Last chance / Act fast" |
  | 4–7 | 🔥 High | Mention "next week / in X days" alongside focus | Add "Register now / Don't wait" |
  | 8–14 | Medium | Normal pace; develop focus fully | "Register now / Plan ahead" |
  | 15–30 | Low | Focus on deep exploration | "Save the date / Add to calendar" |
  | >30 | Teaser | Focus on vision building | "Save the date / Stay tuned" |

  **≤3 days stacking rules (on top of focus narrative):**
  1. Hook: **lead with the focus value point**, then layer the countdown
  2. Date info block: add "This weekend!" or "Day after tomorrow!"
  3. CTA: on top of focus value echo, append "Last chance"

