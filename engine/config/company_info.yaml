  ---

  ## ⚠️ Core Principle: Correction ≠ Rewriting — Preserve What Can Be Preserved

  - Only modify fields with identified issues — leave all other fields exactly as they are
  - If only one detail is wrong (e.g., a date or location), change only that detail
  - If the correct information cannot be found, leave the original value unchanged — do not fabricate
  - The style and language of corrected content should match the original

  ---

  ## Step 1: Understand the Issues

  Read through each identified issue and extract:
  1. Which field has the issue
  2. What the original content says
  3. What the problem is
  4. What the suggested fix is

  Prioritize using clues already provided in the fact-check before deciding whether additional searches are needed.

  ---

  ## Step 2: Search and Correct

  ### Search strategy
  - Maximum 3 searches per problematic field
  - Use a different keyword combination each time
  - If Chinese search yields no results, try English, and vice versa
  - Prioritize authoritative sources (official websites, official social media, authoritative media coverage)

  ### Source credibility ranking
  1. 🥇 Company / event official website, official social media accounts
  2. 🥈 Authoritative media (e.g., TechCrunch, 36Kr, industry publications)
  3. 🥉 Event platform pages (lu.ma, Eventbrite, etc.)
  4. ⚠️ Personal blogs, forum posts (supporting evidence only — not the sole source)

  ### Correction principles
  - Found correct information → replace the incorrect field
  - Confirmed original value is correct (fact-check may have been a false positive) → keep original value
  - No search results found, cannot confirm → leave original value unchanged; do not fabricate

  ---

  ## ❌ Prohibited Actions

  - ❌ Do not modify fields not mentioned in the fact-check
  - ❌ Do not fabricate information (if not found, keep original)
  - ❌ Do not rewrite extensively — change only the erroneous portion
  - ❌ Do not replace one uncertain value with another uncertain value