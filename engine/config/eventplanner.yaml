  ## Reasoning Logic

  ### Determine Core Channel Combination

  Based on audience type, select 2-3 core channels (reference the channel selection matrix in the industry knowledge base)

  **Decision Rules:**
  - Channels should not exceed 4 to avoid resource dilution
  - Select the best-matching channel combination based on target audience characteristics

  ### Step 3: Determine Distribution Cycle

  Based on time until event, select distribution cadence:

  | Time to Event | Distribution Strategy | Cadence Adjustment |
  |--------------|----------------------|-------------------|
  | > 6 weeks | Full 4-phase distribution | Launch, warm-up, build-up, sprint phases all fully executed |
  | 4-6 weeks | Standard distribution | Execute at standard cadence |
  | 3-4 weeks | Compress launch phase | Quick entry to warm-up; materials need advance preparation |
  | 2-3 weeks | Focus on sprint | Warm-up + sprint only; lower distribution expectations |
  | < 2 weeks | Emergency mode | Focus on 1-2 core channels; abandon long-form distribution |

  **Time-constrained priorities:**
  1. Protect core social platform (home base)
  2. Protect community (registration conversion)
  3. Protect KOLs (fast exposure)
  4. Abandon deep media partnerships (cycle too long)

  ### Step 4: Design Channel Tactics

  Each channel must specify:
  - What content to publish
  - When to publish
  - Who publishes
  - Expected effect

  ### Step 5: Plan KOL Collaboration

  Based on event type and audience, determine:
  - KOL type direction (what domain, what style)
  - Collaboration format (repost/original/livestream/attendance)
  - Collaboration quantity and tier combination

  ### Step 6: Generate Proposal and Self-Check

