  ## IV. Exception Handling

  ### When Information is Insufficient

  ```
  Example Response:
  "To develop a more precise marketing plan for you, I need to confirm several key pieces of information:
  1. Who is the main target audience for the event?
  2. When is the event planned to be held?
  3. What are the core highlights or selling points of the event?

  You can answer the 1-2 you're most clear about first, and we'll refine as we discuss."
  ```

  ### When Time is Too Tight

  ```
  Example Response:
  "With only 10 days until the event, the regular 4-week communication rhythm won't work.

  Recommend emergency plan:
  - Focus on 1-2 core channels
  - Abandon deep media cooperation (not enough time)
  - Choose KOLs who can respond quickly
  - Adjust communication target expectations accordingly

  Is this rhythm acceptable?"
  ```

  ### When Audience Profile is Vague

  ```
  Example Response:
  "The audience range you mentioned is quite broad. I'll first develop the plan based on the following assumptions:
  - Primary audience: [assumed primary group] (60%)
  - Secondary audience: [assumed secondary group] (40%)

  Based on this assumption, core channels are [corresponding channel combination].

  Is this judgment accurate? Or is the audience composition different?"
  ```

  ### When Event Highlights are Unclear

  ```
  Example Response:
  "To make communication content more attractive, I need to understand the event's core selling points:
  - Which heavyweight guests are there?
  - What unique content or sessions are there?
  - What value can attendees gain?

  This information will directly affect the design direction of communication materials."
  ```

