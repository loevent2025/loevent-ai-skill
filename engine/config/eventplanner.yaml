  | Mid-Tier | 30K-100K | Best cost-effectiveness, vertically targeted | Regular event primary force |
  | Long-Tail | 10K-30K | High volume, broad coverage | Volume seeding, topic momentum |
  | Grassroots | <10K | High authenticity | Word-of-mouth, UGC |

  #### Collaboration Formats

  | Format | Description | Effect |
  |--------|------------|--------|
  | Pure Repost | Repost official content | Exposure |
  | Original Content | KOL creates own content | Exposure + trust |
  | Topic Interaction | Participates in topic discussion | Topic momentum |
  | Livestream Connection | Participates in livestream | Deep exposure |
  | On-Site Attendance | Attends in person | Endorsement + content |
  | Content Co-Creation | Interview/joint content | Deep content |

  #### KOL Invitation Strategy

  **Invitation Priority:**
  1. Vertical KOLs strongly related to event theme
  2. KOLs followed by target audience
  3. KOLs with existing relationships with organizer
  4. Cost-effective mid-tier KOLs

  **Invitation Messaging Key Points:**
  - Clearly state event highlights and audience quality
  - Emphasize confirmed speakers/partners
  - Provide clear collaboration format and requirements
  - Offer value exchange (tickets, exposure, networking, etc.)

  ---

  ### 6.3 Distribution Cadence Template

  #### Standard 4-Week Distribution Cadence

  **T-4 Weeks: Launch Phase**
  - Finalize distribution strategy and channels
  - Prepare main visual and basic materials
  - Establish event community
  - Contact media and KOLs
  - Publish first wave of previews

  **T-3 Weeks: Warm-Up Phase**
  - Release speaker lineup (staggered reveals to build anticipation)
  - Open registration
  - KOLs begin reposting
  - Media coverage
  - Community becomes active

  **T-2 Weeks: Build-Up Phase**
  - Second wave of speaker/content reveals
  - Warm-up livestream
  - Countdown content launches
  - Early-bird deadline reminder
  - Intensive material distribution

  **T-1 Week: Sprint Phase**
  - Daily countdown
  - Final registration reminders
  - Speakers/partners concentrated reposting
  - Teasers/behind-the-scenes publishing
  - Create FOMO

  **T-Day: Event Day**
  - Real-time on-site updates
  - Simultaneous livestream
  - Encourage attendee content creation
  - Topic management
  - Concentrated distribution at key moments

  **T+1 Week: Wrap-Up Phase**
  - Event recap post
  - Highlight content compilation
  - Thank-you posts (speakers, partners, attendees)
  - Media recap coverage
  - Ongoing community operations

  ---

  ### 6.4 Materials Checklist Template

  #### Must-Have Materials

  | Material | Specs | Purpose | Recommended Production Time |
  |----------|-------|---------|---------------------------|
  | Main visual poster | 1:1 square + 16:9 landscape | Multi-channel distribution | T-4 weeks |
  | Event introduction long image | Mobile long image | Detailed introduction | T-4 weeks |
  | Speaker posters | Individual poster series | Speaker reveals | T-3 weeks |
  | Countdown posters | 7/3/1 day series | Countdown | T-1 week |
  | Agenda image | Clear and readable | Agenda introduction | T-2 weeks |
  | Registration QR code image | With main visual | Guide registration | T-4 weeks |
  | Social platform images | Platform-adapted sizes | Daily posting | Ongoing |

  #### Nice-to-Have Materials

  | Material | Purpose | Priority |
  |----------|---------|----------|
  | Promotional video | Warm-up distribution | High |
  | Speaker short videos | Build anticipation | Medium |
  | Past event recap | Demonstrate track record | Medium |
  | Behind-the-scenes/teasers | Build anticipation | Low |

