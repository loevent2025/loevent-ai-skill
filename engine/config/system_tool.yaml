  ## Scale Definition

  ### Medium Event Characteristics

  - **Attendance Scale**: 100-300 people
  - **Event Format**: Industry forums, themed summits, professional seminars, medium-sized launches
  - **Core Value**: **Balance of brand exposure and conversion, industry influence building**

  ---

  ## Medium Event Marketing Core Principles

  ### Principle 1: Equal Emphasis on Exposure and Conversion

  Medium events need to balance two objectives:

  - **Brand Exposure**: Let more target audience know about the event
  - **Registration Conversion**: Convert exposure into actual registrations

  ### Principle 2: Channel Combination Strategy

  | Channel Type | Function | Quantity Recommendation |
  |---------|------|---------|
  | Core Channels | Main exposure + conversion | 2-3 |
  | Supplementary Channels | Complementary reach | 1-2 |
  | Community Channels | Deep operations + conversion | 2-3 communities |

  ### Principle 3: Content Layering

  | Content Type | Purpose | Applicable Stage |
  |---------|------|---------|
  | Announcement | Build awareness | Launch period |
  | Highlights | Generate interest | Warm-up period |
  | Guests | Strengthen trust | Heating period |
  | Urgency | Promote conversion | Sprint period |
  | Atmosphere | Expand influence | Event day |

  ### Principle 4: KOL Assistance

  Medium events should moderately leverage KOL power:

  - 3-5 vertical field KOLs
  - Focus on mid-tier KOLs for best ROI
  - Combined with some long-tail KOLs to expand coverage

  ---

  ## Medium Event Channel Strategy

  ### Channel Priority Matrix

  | Priority | Channel Type | Description | Resource Investment |
  |--------|---------|------|---------|
  | P0 | Official Social Media | Essential main position | High |
  | P0 | Event Communities | Conversion core | High |
  | P1 | KOL Collaboration | Expand exposure | Medium |
  | P1 | Partner Channels | Leverage distribution | Medium |
  | P2 | Vertical Communities | Precise reach | Medium |
  | P2 | Media Collaboration | Endorsement + exposure | Low-Medium |
  | P3 | Paid Promotion | Supplementary (optional) | Based on needs |

  ### Core Channel Detailed Strategy

  #### Channel 1: Official Social Media

  **Account Matrix:**

  | Account Type | Function | Content Direction |
  |---------|------|---------|
  | Official Account | Authoritative release | Event information, guest announcements |
  | Founder/Core Members | Personal endorsement | Personal perspective recommendation |
  | Guest Accounts | Expand coverage | Guests' spontaneous sharing |

  **Release Rhythm:**

  | Stage | Frequency | Content Type |
  |------|------|---------|
  | Launch Period | 2-3 times/week | Event announcement, registration opens |
  | Warm-up Period | 3-4 times/week | Guest announcements, highlights preview |
  | Heating Period | Once daily | Agenda, countdown |
  | Sprint Period | 1-2 times daily | Final call, urgency |
  | Event Day | Real-time | On-site images/videos |

  #### Channel 2: Event Communities

  **Community Structure:**

  | Community Type | Quantity | Purpose |
  |---------|------|------|
  | Official Registration Group | 1-2 | Registrant communication, event information |
  | VIP/Guest Group | 1 (optional) | Exclusive service for important guests |
  | Distribution Groups | Multiple | Leverage external communities for distribution |

  **Operations Focus:**

  - Respond promptly to questions in group
  - Regularly publish event progress
  - Design in-group interactive activities
  - Don't miss event reminders

  #### Channel 3: KOL Collaboration

  **KOL Selection Criteria:**

  - Strongly related to event theme
  - Follower profile matches target audience
  - Healthy engagement rate (>3%)
  - Good past collaboration reputation

  **KOL Tier Distribution:**

  | Tier | Follower Count | Quantity | Collaboration Form |
  |------|--------|------|---------|
  | Mid-tier KOL | 30k-100k | 2-3 people | Original content/deep collaboration |
  | Long-tail KOL | 10k-30k | 2-3 people | Repost/simple recommendation |
  | Industry Experts | Unlimited | 1-2 people | Invite to attend + endorsement |

  ### Supplementary Channel Strategy

  #### Partner Channels

  - Ask partners to distribute through their official channels
  - Provide ready-made distribution materials
  - Design partner-specific scripts

  #### Vertical Communities

  - Post in communities where target audience gathers
  - Note community rules, avoid hard advertising
  - Present in valuable content format

  #### Media Collaboration

  - Select 1-2 vertical media outlets
  - In event coverage/advertorial format
  - Focus on endorsement rather than traffic

  ---

  ## Medium Event Promotion Rhythm

  ### Standard 3-Week Promotion Rhythm

  | Stage | Time | Core Tasks | Promotion Focus |
  |------|------|---------|---------|
  | **Launch Period** | T-3 weeks | Build awareness | Event announcement, registration opens |
  | **Warm-up Period** | T-2 weeks | Generate interest | Guest announcements, highlights preview |
  | **Heating Period** | T-1 week | Strengthen intention | Agenda, early bird reminder |
  | **Sprint Period** | T-3 days | Promote conversion | Final call, urgency |
  | **Event Day** | T-Day | Expand influence | On-site atmosphere, real-time sharing |
  | **Closing Period** | T+1 week | Settle value | Recap, gratitude, follow-up |

  ### Detailed Content Calendar

  #### T-3 Weeks: Launch Period

  | Date | Channel | Content | Responsible Person |
  |------|------|------|--------|
  | Day 1 | Official Account | Event announcement premiere | Operations |
  | Day 2 | Community | Create group + post event information | Community |
  | Day 3 | Partners | Sync partners to start distribution | BD |
  | Day 4-5 | Official Account | Registration opens + highlights preview | Operations |

  #### T-2 Weeks: Warm-up Period

  | Date | Channel | Content | Responsible Person |
  |------|------|------|--------|
  | Day 1 | Official Account | First batch of guests announced | Operations |
  | Day 2 | KOL | KOLs start publishing content | Operations |
  | Day 3 | Official Account | Event highlights detailed | Content |
  | Day 4 | Community | In-group interactive activities | Community |
  | Day 5 | Official Account | Second batch of guests announced | Operations |

  #### T-1 Week: Heating Period

  | Date | Channel | Content | Responsible Person |
  |------|------|------|--------|
  | Day 1 | Official Account | Complete agenda announced | Operations |
  | Day 2 | All Channels | 7-day countdown | Operations |
  | Day 3 | Official Account | Early bird deadline reminder | Operations |
  | Day 4 | KOL | KOL second push | Operations |
  | Day 5 | All Channels | 3-day countdown | Operations |

  #### T-3 Days: Sprint Period

  | Date | Channel | Content | Responsible Person |
  |------|------|------|--------|
  | T-3 | All Channels | Final call | Operations |
  | T-2 | Community | Attendance instructions | Community |
  | T-1 | All Channels | See you tomorrow! | Operations |

  #### T-Day: Event Day

  | Time | Channel | Content | Responsible Person |
  |------|------|------|--------|
  | Before Opening | Community + Account | On-site preparation highlights | Operations |
  | During Event | Account | Exciting moments real-time release | Operations |
  | Key Sessions | Account | Key content summary | Operations |
  | After Closing | Account | Event successfully concluded | Operations |

  #### T+1 Week: Closing Period

  | Date | Channel | Content | Responsible Person |
  |------|------|------|--------|
  | Day 1 | Official Account | Event highlights recap | Content |
  | Day 2 | Community | Material sharing + gratitude | Community |
  | Day 3 | Official Account | Valuable content compilation | Content |
  | Day 5 | Partners | Joint recap (optional) | BD |

  ---

  ##  Medium Event Materials List

  ### Essential Materials

  | Material | Specifications | Purpose | Production Time |
  |------|------|------|---------|
  | Main Visual Poster | 1:1 + 16:9 | All-channel distribution | T-3 weeks |
  | Event Details Long Image | Mobile long image | Detailed introduction | T-3 weeks |
  | Guest Posters | Series 1:1 | Guest announcements | T-2 weeks |
  | Agenda Long Image | Mobile long image | Agenda introduction | T-1 week |
  | Countdown Posters | 7/3/1 day series | Countdown | T-1 week |
  | Registration QR Code Image | With main visual | Guide registration | T-3 weeks |
  | Event Recap Image | Mobile long image | Event summary | T+2 days |

  ### Recommended Materials

  | Material | Purpose | Priority |
  |------|------|--------|
  | Promotional Short Video | Warm-up distribution | High |
  | Guest Short Videos | Guest preview | Medium |
  | Moments Invitation | Personalized distribution | Medium |
  | On-site Check-in Background | Encourage sharing | Medium |

  ### Material Specification Requirements

  | Platform | Image Specifications | Video Specifications |
  |------|---------|---------|
  | Twitter/X | 1200x675 (16:9) | Horizontal 16:9 |
  | WeChat Official Account | 900x500 cover | Horizontal 16:9 |
  | Moments | 1080x1080 (1:1) | Vertical 9:16 |
  | Xiaohongshu | 1080x1440 (3:4) | Vertical 9:16 |

  ---

  ##  Medium Event KOL Strategy

  ### KOL Collaboration Goals

  - **Collaboration Quantity**: 5-8 people
  - **Expected Coverage**: 100k-300k targeted users
  - **Expected Engagement**: 500-2000 interactions

  ### KOL Matrix Planning

  | Tier | Quantity | Follower Count | Collaboration Form | Expected Effect |
  |------|------|--------|---------|---------|
  | Mid-tier KOL | 2-3 people | 30k-100k | Original content | High exposure + deep influence |
  | Long-tail KOL | 3-5 people | 10k-30k | Repost + brief comment | Wide coverage |
  | Industry Experts | 1-2 people | Unlimited | Attend + endorsement | Trust boost |

  ### KOL Collaboration Process

  | Stage | Time | Tasks |
  |------|------|------|
  | Selection | T-4 weeks | Determine target KOL list |
  | Invitation | T-3 weeks | Send collaboration invitations |
  | Confirmation | T-3 weeks | Confirm collaboration method and schedule |
  | Materials | T-2 weeks | Provide collaboration materials |
  | Release | T-2~T-1 weeks | KOLs release as planned |
  | Second Push | T-1 week | Key KOLs second push |

  ### KOL Collaboration Material Package

  Prepare the following materials for KOLs:

  - Event introduction document (background information)
  - Main visual poster (multiple sizes)
  - Recommended scripts/copy reference
  - Registration link + tracking code
  - Exclusive discount code (optional)

  ---

  ## Effect Estimation and Monitoring

  ### Effect Estimation Reference

  | Metric | Estimated Range | Monitoring Method |
  |------|---------|---------|
  | Total Exposure | 50k-200k | Platform data aggregation |
  | Topic Discussion Volume | 50-200 posts | Topic tracking |
  | Community Scale | 150-300 people | Community statistics |
  | Registration Count | 120-200 people | Registration system |
  | KOL Coverage | 100k-300k | KOL data |

  ### Key Monitoring Nodes

  | Time Point | Check Content | Adjustment Strategy |
  |--------|---------|---------|
  | T-2 weeks | Registration progress | If less than 50%, increase promotion efforts |
  | T-1 week | Registration progress | If less than 70%, activate KOL second push |
  | T-3 days | Registration progress | If less than 85%, send final call |

  ---

  ## Medium Event Output Format

  ### Chapter Structure

  #### Chapter 1: Marketing Strategy Overview

  - 1.1 Promotion Goals
    - Exposure goal (range value)
    - Conversion goal (registration count)
    - Community goal
  - 1.2 Core Strategy
    - One-sentence summary of promotion strategy
  - 1.3 Channel Combination
    - Core channels (2-3)
    - Supplementary channels (1-2)
    - Positioning and function of each channel

  #### Chapter 2: Detailed Channel Strategy

  - 2.1 Official Social Media Strategy
    - Account matrix
    - Content planning
    - Release rhythm
  - 2.2 Community Operations Strategy
    - Community structure
    - Operations plan
    - Interaction design
  - 2.3 KOL Collaboration Strategy
    - KOL matrix
    - Collaboration methods
    - Execution timeline
  - 2.4 Partner/Media Strategy
    - Distribution plan
    - Collaboration methods

  #### Chapter 3: Promotion Rhythm and Content Calendar

  - 3.1 Overall Rhythm
  - 3.2 Detailed Calendar (expanded by week/day)
  - 3.3 Key Nodes

  #### Chapter 4: Materials List

  - 4.1 Essential Materials (including specifications, purpose, deadline)
  - 4.2 Recommended Materials
  - 4.3 KOL Collaboration Material Package

  #### Chapter 5: Effect Estimation and Monitoring

  - 5.1 Expected Effects
  - 5.2 Monitoring Metrics
  - 5.3 Adjustment Strategies

  #### Chapter 6: Execution Recommendations

  - 6.1 Priority Ranking
  - 6.2 Script Examples
  - 6.3 Risk Alerts and Responses

  ---

  ##  Medium Event Quality Checklist

  ### Strategy Checks

  - [ ] Number of channels within 2-4 range
  - [ ] Clear distinction between core and supplementary channels
  - [ ] KOL quantity within 5-8 range
  - [ ] Promotion cycle within 2-3 weeks range
  - [ ] Effect estimation uses range values

  ### Execution Checks

  - [ ] Content calendar precise to day
  - [ ] Each action has clear responsible person
  - [ ] Materials list complete with deadlines
  - [ ] KOL collaboration has complete process

  ### Consistency Checks

  - [ ] Promotion focus aligns with event highlights
  - [ ] Topic tags echo event theme
  - [ ] Time nodes align with preparation timeline

  ---

  ##  Example Output Reference

  ### Channel Strategy Example

  **Core Channel Combination:**

  - **Twitter (Core)**: Official account daily posts, founder account personal perspective sharing
  - **Event Communities (Core)**: 2 registration groups (100 people each), deep operations
  - **KOL Collaboration (Important)**: 5 vertical field KOLs, covering 150k+ target users

  ### Script Examples

  **Event Announcement Script:**

  > 【Event Announcement】XX Industry Summit Coming!
  > 
  >  Time: XX Month XX Day
  > Location: XX
  > Scale: 150 people
  > 
  > This summit focuses on XX topic, inviting heavyweight guests such as XX, will deeply explore XX.
  > 
  > Early bird registration now open, limited-time discount!
  >  Registration link: XXX
  > 
  > #EventTopic#

  **KOL Collaboration Script:**

  > Hi XX,
  > 
  > I'm the person in charge of XX event. We will host an XX-themed industry summit in XX month, expected 150 people scale, inviting guests such as XX.
  > 
  > Noticed your influence in XX field, would like to invite you to collaborate on promoting this event. We can provide:
  > - 2 VIP tickets
  > - On-site interview opportunity
  > - Joint content collaboration
  > 
  > Wondering if you're interested? Looking forward to your reply!

