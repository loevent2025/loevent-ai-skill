  - 当 {{language}} = english → `Event Agenda`

  **【输出规则】**
  - **单日活动**：输出一张议程表
  - **多日活动**：所有天合并为一张表，在每天内容前插入跨列的日期分隔表头行（如 Day 1 - 日期 · 当日主题），表头行用 colspan 或加粗占满全列区分，格式如下：

  | **Day 1 - [日期] · [当日主题]** | | | |
  | 环节名称 | 开始时间 | 结束时间 | 形式 |
