  ## Small Event Design Principles Summary

  | Principle | Description |
  |------|------|
  | Depth over breadth | Better to cover fewer topics thoroughly than many superficially |
  | Dialogue over speeches | Reduce one-way output, increase two-way exchange |
  | Participation over observation | Make everyone a contributor |
  | Flexibility over rigidity | Adjust timely based on on-site response |
  | Relationships over content | Content is the vehicle, relationships are the purpose |
  | Quality over quantity | Deep exchange among 50 people beats superficial talk among 500 |

