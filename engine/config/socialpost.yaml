  ## Content Expansion Guidance

  ### How to write with substance

  **⭐ Focus expansion principle:** All tweet content must align with the {{primary_focus}} narrative thread. Background tweet builds focus importance; core value tweet unpacks focus details; highlights tweet uses concrete material to support focus; CTA tweet echoes focus value.

  **Hook tweet technique:**
